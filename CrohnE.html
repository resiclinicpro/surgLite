            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
    {
        id: 1, 
        question: "¿Cuál es el gen cuyas mutaciones representan uno de los factores de riesgo genético más firmemente asociados al desarrollo de la enfermedad de Crohn, involucrado fisiopatológicamente en la vía de la autofagia y la función de las células de Paneth?", 
        options: ["NOD2 (CARD15)", "NUDT15", "HLA-DQA105", "TPMT"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento The Lancet 2024, la patogénesis de la enfermedad de Crohn implica una barrera epitelial intestinal disfuncional. Las células de Paneth, una fuente importante de expresión del gen NOD2 en el íleon terminal, juegan un papel central en el control de la invasión bacteriana mediante la secreción de factores antimicrobianos. Las mutaciones en genes como Atg16L1 y NOD2 alteran la vía de la autofagia, lo que deteriora la función de estas células, desregula la microbiota y disminuye la integridad de la barrera mucosa.<br><br>Perla ENARM: \"La expresión del gen NOD2 y la disrupción de la vía de la autofagia a través de mutaciones resultan en un deterioro de la función de las células de Paneth, propiciando la inflamación transmural característica.\"<br><br>Análisis de Distractores: NUDT15 y TPMT son genes que codifican enzimas relacionadas con el metabolismo de las tiopurinas; sus mutaciones elevan el riesgo de mielosupresión por fármacos, no son el mecanismo primario de la enfermedad. HLA-DQA105 es un genotipo que aumenta el riesgo de desarrollar anticuerpos contra terapias anti-TNF (Infliximab/Adalimumab), afectando la farmacocinética pero no la génesis de la inflamación inicial.", 
        source: "Enfermedad de Crohn - The lancet, 2024, Fisiopatología, Página 1178." 
    },
    {
        id: 2, 
        question: "¿Cuál es el factor de riesgo ambiental modificable que se asocia con un mayor incremento en la tasa de recurrencias posquirúrgicas, desarrollo de fenotipo penetrante y necesidad de una primera o subsecuentes cirugías de resección en la enfermedad de Crohn?", 
        options: ["Uso intermitente de antiinflamatorios no esteroideos", "Infección previa por citomegalovirus", "Tabaquismo activo", "Dieta con patrón occidental alta en carnes rojas"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, el tabaquismo activo es el factor de riesgo exógeno más potente para el empeoramiento de la enfermedad de Crohn. Aumenta sustancialmente la incidencia de brotes graves, el riesgo de requerir cirugía mayor abdominal, la formación de estomas y la recurrencia clínica y endoscópica posoperatoria en anastomosis. Interrumpir este hábito modifica drásticamente la historia natural de la patología.<br><br>Perla ENARM: \"Se recomienda asesoramiento preoperatorio aconsejando el cese del tabaquismo. Antes de la cirugía electiva, los pacientes deben ser informados del aumento de los riesgos quirúrgicos, incluyendo mayores tasas de formación de estoma y aumento del riesgo de recurrencia de la enfermedad en fumadores.\"<br><br>Análisis de Distractores: Aunque el uso de AINEs puede desencadenar brotes inflamatorios, y la infección por citomegalovirus complica formas severas de colitis refractaria, ninguno de estos tiene el peso epidemiológico y pronóstico continuo que tiene el tabaco sobre las complicaciones estructurales penetrantes. La dieta occidental eleva el riesgo de aparición inicial (etiología), pero el tabaquismo es el determinante fundamental en la progresión hacia la cirugía.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Tratamiento y Estilo de vida, Página 184." 
    },
    {
        id: 3, 
        question: "¿Cuál es el valor de calprotectina fecal que, al encontrarse por debajo de este límite en el abordaje inicial, excluye de forma fiable el diagnóstico de enfermedad inflamatoria intestinal sintomática frente a un trastorno funcional?", 
        options: ["<150 µg/g", "<250 µg/g", "<100 µg/g", "<40 µg/g"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Biomarcadores fecales 2024, la calprotectina fecal es el biomarcador no invasivo de primera línea para diferenciar causas orgánicas de funcionales (ej. síndrome de intestino irritable). En el análisis estadístico, el valor predictivo máximo para excluir la enfermedad inflamatoria intestinal se logra con niveles de calprotectina fecal <40 µg/g, evitando así endoscopias innecesarias en pacientes de bajo riesgo.<br><br>Perla ENARM: \"La exclusión de síndrome de intestino irritable o trastorno funcional frente a enfermedad inflamatoria intestinal alcanza su máximo valor predictivo con una calprotectina fecal <40 µg/g.\"<br><br>Análisis de Distractores: Cifras de <100 µg/g o <150 µg/g son útiles como metas terapéuticas (remisión endoscópica) en pacientes ya diagnosticados y bajo tratamiento, pero para tamizaje inicial de exclusión absoluta, el corte es más estricto (<40 a 50 µg/g). Cifras de >250 µg/g tienen alta probabilidad de daño endoscópico severo y dictan necesidad de ileocolonoscopia.", 
        source: "Biomarcadores fecales, sanguíneos y urinarios en enfermedades inflamatorias intestinales, 2024, Fecal calprotectin and diagnosis, Página 67." 
    },
    {
        id: 4, 
        question: "¿Cuál es el protocolo endoscópico mínimo de toma de biopsias requerido durante una ileocolonoscopia de primera vez para documentar la extensión y confirmar microscópicamente el diagnóstico de enfermedad de Crohn?", 
        options: ["1 biopsia de íleon terminal y 2 biopsias de colon derecho e izquierdo", "2 biopsias de íleon terminal y ≥4 biopsias de múltiples segmentos colónicos y recto", "4 biopsias seriadas de íleon terminal exclusivamente", "2 biopsias de ciego y 2 biopsias de la unión rectosigmoidea"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR 2025, la enfermedad de Crohn se caracteriza por una afectación focal, discontinua y parcheada que puede involucrar tejido de aspecto endoscópicamente normal. Para asegurar un mapeo completo y no omitir actividad microscópica, es obligatorio sistematizar la toma de tejido.<br><br>Perla ENARM: \"Para el diagnóstico inicial, se deben obtener un mínimo de 2 biopsias del íleon terminal y al menos 4 biopsias de múltiples segmentos colónicos, incluyendo el recto, independientemente de la apariencia de la mucosa.\"<br><br>Análisis de Distractores: Tomar únicamente biopsias del íleon o del colon derecho (opciones A, C, D) es insuficiente, ya que la enfermedad puede afectar el colon transverso, izquierdo o presentar afección perianal/rectal sutil. Se requiere un barrido completo de todos los segmentos topográficos anatómicos mayores del intestino bajo.", 
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 1, 2025, Diagnostics at initial diagnosis, Página 218." 
    },
    {
        id: 5, 
        question: "¿Cuál es el hallazgo histopatológico considerado patognomónico y definitivo para el diagnóstico de la enfermedad de Crohn, el cual confirma la enfermedad aunque solo se identifique en una minoría de los especímenes biopsiados?", 
        options: ["Criptitis neutrofílica con abscesos crípticos", "Distorsión arquitectural severa de criptas", "Granuloma epitelioide no caseificante", "Infiltrado inflamatorio eosinofílico en lámina propia"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, el rasgo de mayor peso diagnóstico para diferenciar la enfermedad de Crohn de la Colitis Ulcerativa u otras colitis es la demostración de inflamación granulomatosa, específicamente el granuloma epitelioide no caseificante. Aunque su sensibilidad es baja (presente en 20-33% de los casos), su especificidad es absoluta tras descartar infecciones como tuberculosis.<br><br>Perla ENARM: \"Los reportes histopatológicos deben mencionar la distribución de células inflamatorias, atrofia críptica, neutrófilos, úlceras, y granulomas epitelioides no caseificantes, siendo estos últimos el sello distintivo morfológico en la enfermedad de Crohn.\"<br><br>Análisis de Distractores: La criptitis y los abscesos crípticos (opción A) son marcadores de actividad aguda (presencia de neutrófilos) comunes tanto en CU como en Crohn. La distorsión arquitectural (opción B) indica cronicidad pero no es patognomónica. Los eosinófilos en lámina propia (opción D) no son un marcador validado de actividad en enfermedad inflamatoria intestinal.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Histopathology, Página 162." 
    },
    {
        id: 6, 
        question: "¿Cuáles son las dos modalidades de imagen de primera línea preferidas en guías internacionales para la evaluación diagnóstica de complicaciones estructurales transmurales (estenosis, fístulas) en intestino delgado, priorizadas por no emitir radiación ionizante?", 
        options: ["Tomografía computarizada enterográfica y tránsito intestinal con bario", "Enteroresonancia magnética y ultrasonido intestinal", "Tomografía por emisión de positrones y endoscopia con cápsula", "Radiografía de abdomen en bipedestación y ultrasonido endoscópico"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, la enfermedad de Crohn requiere escrutinio luminal y transmural debido a la edad joven de los pacientes y la necesidad de valoraciones repetidas. Las técnicas que evitan la radiación ionizante acumulada son el estándar de oro inicial. La enteroresonancia permite ver todo el tracto gastrointestinal, mientras el ultrasonido intestinal se realiza a pie de cama evaluando grosor, flujo Doppler (hiperemia) y grasa mesentérica.<br><br>Perla ENARM: \"El uso de imagen transversal abdominal (específicamente entero-resonancia) y el ultrasonido intestinal deben priorizarse en el diagnóstico y evaluación de estenosis, ya que no exponen a los pacientes a radiación ionizante.\"<br><br>Análisis de Distractores: La enterotomografía computarizada (opción A) es excelente y altamente sensible, pero expone a radiación; se reserva si la RM o el ultrasonido no están disponibles o en urgencias agudas (perforación/megacolon). La endoscopia con cápsula (opción C) no evalúa la pared transmural y está contraindicada si hay sospecha de estenosis sin prueba de permeabilidad previa.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Imaging modalities, Página 161." 
    },
    {
        id: 7, 
        question: "De acuerdo con la clasificación de Montreal para estratificar el fenotipo en pacientes adultos con enfermedad de Crohn, ¿qué sufijo alfanumérico debe añadirse a la nomenclatura de comportamiento (B) para denotar la coexistencia de enfermedad perianal?", 
        options: ["L4", "B3", "p", "A2"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, la clasificación de Montreal clasifica a los pacientes según la edad de inicio (A), la localización (L) y el comportamiento de la enfermedad (B). Debido a que la presencia de enfermedad perianal (fístulas, abscesos perianales) es un marcador pronóstico independiente de severidad que puede coexistir con fenotipos no estenosantes, estenosantes o penetrantes intrabdominales, se añade el sufijo \"p\" al comportamiento principal (ej. B1p, B2p, B3p).<br><br>Perla ENARM: \"Se añade 'p' a los fenotipos B1, B2 o B3 cuando coexiste enfermedad perianal en la clasificación fenotípica de Montreal.\"<br><br>Análisis de Distractores: La opción A (L4) denota localización en el tracto gastrointestinal superior. La opción B (B3) se refiere a enfermedad de comportamiento puramente penetrante (fístulas internas, flemones intrabdominales), no específicamente perianal. La opción D (A2) señala edad al diagnóstico entre 17 y 40 años.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Classifications, Página 158." 
    },
    {
        id: 8, 
        question: "¿Cuál es el tratamiento farmacológico de primera línea recomendado explícitamente para inducir la remisión clínica en pacientes ambulatorios con enfermedad de Crohn de localización ileocecal y actividad sintomática leve a moderada?", 
        options: ["Infliximab 5 mg/kg intravenoso en esquema 0, 2 y 6 semanas", "Mesalazina oral 4 g/día dividida en dos tomas", "Budesonida de liberación ileal 9 mg/día hasta por 12 semanas", "Azatioprina 2.5 mg/kg/día por vía oral"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía ACG 2025, para los brotes leves a moderados localizados en íleon terminal y/o colon ascendente, se prefiere un corticosteroide de alta potencia tópica luminal y bajo efecto sistémico por un corto periodo para minimizar toxicidad. La budesonida alcanza altas concentraciones exactamente en el territorio ileocecal por su recubrimiento.<br><br>Perla ENARM: \"Recomendamos el uso de budesonida de liberación ileal controlada a una dosis de 9 mg diarios para la inducción de remisión sintomática en pacientes con enfermedad de Crohn ileocecal con actividad leve a moderada.\"<br><br>Análisis de Distractores: Infliximab (opción A) se reserva como primera línea en enfermedad severa (top-down) o perianal/fistulizante aguda. Mesalazina (opción B) NO está indicada en enfermedad de Crohn para inducción ni mantenimiento. Azatioprina (opción D) es un agente inmunomodulador de mantenimiento cuyo tiempo de latencia es de semanas a meses, no sirve como monoterapia para inducir remisión aguda.", 
        source: "Guía clínica del ACG, Manejo de la enfermedad de Crohn en adultos, 2025, Mild to moderately severe disease, Página 257." 
    },
    {
        id: 9, 
        question: "¿Qué grupo farmacológico de uso frecuente en patología intestinal está explícitamente NO recomendado por las guías clínicas actuales para la inducción ni el mantenimiento de la remisión en pacientes con enfermedad de Crohn luminal activa?", 
        options: ["Corticosteroides tópicos y sistémicos", "Aminosalicilatos orales (5-ASA)", "Anti-integrinas (Vedolizumab)", "Antibióticos como metronidazol"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía ACG 2025, las formulaciones orales de Mesalazina o Sulfasalazina (5-ASA), pilares históricos en el tratamiento de la Colitis Ulcerativa, han demostrado de manera contundente en múltiples ensayos y metaanálisis que no tienen mayor eficacia que el placebo en inducir o mantener la remisión clínica en la enfermedad de Crohn, por lo que su prescripción debe evitarse.<br><br>Perla ENARM: \"Recomendamos en contra del uso de mesalazina oral para inducción o mantenimiento en pacientes con enfermedad de Crohn con actividad leve a moderadamente activa.\"<br><br>Análisis de Distractores: Los corticosteroides (opción A) sí están indicados pero únicamente para inducción de remisión a corto plazo (máximo 8 semanas). Las anti-integrinas (opción C) son terapias avanzadas aprobadas y altamente efectivas en la patología. Los antibióticos (opción D) no son terapia primaria de remisión, pero son útiles temporalmente en el escenario de abscesos intraabdominales o enfermedad perianal fistulizante con sepsis.", 
        source: "Guía clínica del ACG, Manejo de la enfermedad de Crohn en adultos, 2025, Mild to moderately severe disease, Página 257." 
    },
    {
        id: 10, 
        question: "¿Cuál es el abordaje inicial recomendado para un paciente con diagnóstico de enfermedad de Crohn penetrante intraabdominal que presenta fiebre, dolor focalizado y un absceso cuantificado por tomografía de >2 cm de diámetro?", 
        options: ["Laparotomía exploradora de urgencia para resección de segmento y estoma terminal", "Drenaje percutáneo guiado por imagen apoyado con antibióticos intravenosos", "Inicio inmediato de terapia combinada con Infliximab y Azatioprina", "Terapia médica exclusiva con metilprednisolona intravenosa a dosis altas"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, el manejo agudo de un flemón o absceso grande (>2 cm) debe enfocarse en controlar la sepsis y resolver el estado inflamatorio antes de considerar una resección intestinal. Operar sobre una cavidad abdominal séptica y edematosa aumenta dramáticamente el riesgo de morbilidad, fuga anastomótica y pérdida de intestino corto.<br><br>Perla ENARM: \"Sugerimos el uso de antibióticos intravenosos y drenaje percutáneo guiado por imagen como tratamiento de primera línea para abscesos intraabdominales relacionados a Enfermedad de Crohn, reservando la resección intestinal una vez controlada la sepsis.\"<br><br>Análisis de Distractores: La cirugía de urgencia (opción A) se reserva para falla de drenaje percutáneo, sepsis incontrolable, peritonitis generalizada o perforación libre. Iniciar inmunosupresores biológicos o esteroides sistémicos (opciones C y D) en presencia de un absceso no drenado está absolutamente contraindicado por el riesgo inminente de diseminación séptica fatal.", 
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Complicaciones, Página 1567." 
    },
    {
        id: 11, 
        question: "En un paciente con patrón fibroestenosante del intestino delgado, la estenoplastia (strictureplasty) es una alternativa preservadora de intestino frente a la resección. ¿Cuál es la longitud máxima recomendada de la estenosis para realizar una estenoplastia de manera convencional y segura?", 
        options: ["≤5 cm", "≤20 cm", "≤15 cm", "≤10 cm"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024 (and BSG 2025 equivalent context), la estenoplastia tiene como objetivo principal prevenir el síndrome de intestino corto en pacientes que requerirían resecciones repetidas a lo largo de su vida. El procedimiento estándar (ej. Heineke-Mikulicz) es la alternativa segura y con mejor rendimiento biomecánico en segmentos aislados cortos de intestino delgado que no excedan los 10 cm de longitud.<br><br>Perla ENARM: \"Recomendamos que la estenoplastia es una alternativa a la resección en pacientes con estenosis de enfermedad de Crohn de intestino delgado con longitud más corta que 10 cm, siendo útil cuando hay múltiples estenosis.\"<br><br>Análisis de Distractores: Una lesión estenótica mayor a 10 cm, o estenosis contiguas extensas (ej. >20 cm o flemones inflamatorios) presentan alto riesgo de falla técnica por rigidez de pared, fuga y dehiscencia, siendo preferible la resección del segmento afectado o configuraciones complejas (Finney / Michelassi), pero el estándar para la técnica básica dicta el punto de corte en 10 cm.", 
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento médico / quirúrgico (base knowledge from guidelines), Perlas de Resumen Quirúrgico (Punto 4 de Perlas Clínicas)." 
    },
    {
        id: 12, 
        question: "Con el objetivo anatómico y fisiopatológico de disminuir drásticamente el riesgo de recurrencia posoperatoria de la enfermedad de Crohn, ¿cuál técnica de anastomosis está recomendada tras realizar una resección ileocecal?", 
        options: ["Anastomosis funcional término-terminal antimesentérica cosida a mano (Kono-S)", "Anastomosis latero-lateral mecánica con engrapadora lineal", "Anastomosis término-terminal invaginante con sutura continua", "Anastomosis término-lateral mecánica en dos planos"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, la prevención de la recurrencia anastomótica es vital, ya que la inflamación suele reactivarse en el sitio de la unión. La técnica Kono-S está diseñada para mantener el mesenterio, principal sitio de tejido adiposo inflamatorio, excluido del lumen funcional de la anastomosis, además de proveer una boca amplia que previene la estenosis temprana secundaria a fibrosis tisular.<br><br>Perla ENARM: \"La configuración de la anastomosis, específicamente la técnica funcional término-terminal antimesentérica cosida a mano (Kono-S) o la resección extensa del mesenterio, previene recurrencias en sitios de anastomosis.\"<br><br>Análisis de Distractores: Las técnicas convencionales término-terminales, término-laterales y latero-laterales (opciones B, C y D) han sido las técnicas estándar históricas; sin embargo, en ensayos clínicos recientes y consensos de EII, ninguna ha superado en profilaxis de recurrencia clínica y endoscópica a las configuraciones anatómicas exclusivas como Kono-S.", 
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Manejo Quirúrgico (Prevención de recurrencia)." 
    },
    {
        id: 13, 
        question: "Durante la Exploración Bajo Anestesia (EUA) primaria en un paciente con fístula perianal compleja por enfermedad de Crohn, ¿qué hallazgo local anatómico dictamina peores tasas de curación, prohíbe la realización de colgajos de avance (AF) y obliga a mantener drenaje temporal a largo plazo o considerar estoma?", 
        options: ["Ausencia de absceso submucoso o isquiorrectal", "Presencia de proctitis severa concomitante", "Trayecto fistuloso único de tipo interesfintérico", "Involucro superficial del esfínter anal interno"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, la evaluación endoscópica del recto es obligatoria durante la cirugía anal en enfermedad de Crohn. La presencia de inflamación macroscópica (proctitis) contraindica rotundamente técnicas de cierre definitivo como el colgajo de avance (Advancement Flap) o el LIFT, debido a que el tejido está friable y enfermo, garantizando la dehiscencia y sepsis pélvica si se cierran los trayectos.<br><br>Perla ENARM: \"Recomendamos que la examinación bajo anestesia incluya evaluación de la mucosa rectal, ya que la presencia de proctitis está fuertemente asociada a tasas menores de curación y contraindica reparaciones reconstructivas.\"<br><br>Análisis de Distractores: La ausencia de abscesos (opción A) es el estado ideal para permitir técnicas de reconstrucción definitivas. Un trayecto interesfintérico bajo o superficial (opciones C y D) generalmente corresponde a fístulas simples, las cuales pueden tratarse con fistulotomía segura sin riesgo elevado de incontinencia ni falla, siempre que el recto esté sano.", 
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Perianal fistula Algorithm, Página 1568." 
    },
    {
        id: 14, 
        question: "En el seguimiento de un paciente que fue sometido a resección intestinal por enfermedad de Crohn, ¿en qué intervalo de tiempo está obligatoriamente recomendada la realización de la primera ileocolonoscopia de control para aplicar el Score de Rutgeerts?", 
        options: ["Entre 1 y 3 meses posoperatorios", "Entre 6 y 12 meses posoperatorios", "A los 24 meses posoperatorios exactos", "Solamente si el paciente reanuda con diarrea"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR 2025, la recurrencia endoscópica precede inevitablemente a la recurrencia clínica por varios meses. El Score de Rutgeerts evalúa la anastomosis y el neoterminal ileal. Detectar tempranamente lesiones (i2b, i3, i4) a los 6-12 meses tras la cirugía permite escalar oportunamente a terapia biológica (ej. Anti-TNF) antes de que el daño estructural cause síntomas o re-estenosis irreversible.<br><br>Perla ENARM: \"Es obligatorio realizar una valoración endoscópica mediante colonoscopia a los 6 a 12 meses posteriores a la cirugía de resección para evaluar los marcadores de recurrencia tempranos (Score de Rutgeerts) e individualizar la terapia biológica.\"<br><br>Análisis de Distractores: De 1 a 3 meses (opción A) es muy temprano y la mucosa podría presentar edema reactivo puramente quirúrgico, alterando la interpretación. Retrasarlo a 24 meses (opción C) o esperar síntomas (opción D) pierde la \"ventana de oportunidad\" para iniciar profilaxis biológica, resultando frecuentemente en re-estenosis establecida.", 
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Endoscopic scoring systems (Rutgeerts), Página 223." 
    },
    {
        id: 15, 
        question: "¿Cuál intervención es altamente eficaz y se recomienda como terapia de inducción de remisión clínica de primera línea en niños con enfermedad de Crohn intraluminal activa, sirviendo adicionalmente como optimización preoperatoria si cursan desnutrición severa?", 
        options: ["Restricción de consumo de lácteos por 12 semanas", "Nutrición Enteral Exclusiva (EEN) por 6 a 8 semanas", "Dieta baja en hidratos de carbono fermentables (FODMAP)", "Ayuno con nutrición parenteral total exclusiva por 10 días"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Consenso Dietético ECCO 2025, la Nutrición Enteral Exclusiva (EEN) que utiliza fórmulas poliméricas orales al 100% (eliminando temporalmente todos los alimentos sólidos habituales) ha demostrado altas tasas de curación endoscópica y de inducción de remisión equiparables a los esteroides, sin la toxicidad de éstos, haciéndola el estándar en pediatría.<br><br>Perla ENARM: \"La nutrición enteral exclusiva (EEN) es efectiva para la inducción de la remisión clínica y endoscópica en niños y adultos con enfermedad de Crohn luminal leve a moderada.\"<br><br>Análisis de Distractores: La dieta baja en FODMAP (opción A) mitiga síntomas de intestino irritable sobrepuesto (gases/distensión) pero no desinflama la mucosa. Restringir lácteos (opción A) solo aplica si hay deficiencia de lactasa. La nutrición parenteral total (opción D) está reservada estrictamente para estados de fallo intestinal total o íleo prolongado, ya que presenta mayor morbilidad asociada al catéter que la ruta enteral trófica.", 
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, Exclusive enteral nutrition, Página 33." 
    },
    {
        id: 16, 
        question: "Con base en los lineamientos de mantenimiento de la salud preventiva, ¿qué inmunización debe prescribirse a todo paciente adulto con enfermedad inflamatoria intestinal que cumpla 50 años, independientemente de estar bajo terapia inmunosupresora?", 
        options: ["Vacuna de virus vivos contra rotavirus", "Vacuna contra virus de varicela-zóster de cepa atenuada", "Vacunación neumocócica conjugada (PCV20 o PCV21)", "Vacuna antimeningocócica recombinante serie B"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Prevención ACG 2025, los pacientes con EII cursan con alteraciones del sistema inmune per se y agravadas por fármacos. Las infecciones invasivas por Streptococcus pneumoniae imponen un grave riesgo. El colegio americano insta a vacunar de manera estandarizada a la población con vacunas conjugadas modernas.<br><br>Perla ENARM: \"En todos los pacientes adultos con enfermedad inflamatoria intestinal de 50 años o más y sin vacunación neumocócica previa, sugerimos la inmunización con vacuna PCV20 o PCV21.\"<br><br>Análisis de Distractores: Las vacunas de virus vivos atenuados (ej. varicela-zóster atenuada, fiebre amarilla, rotavirus - opciones A y B) están formalmente contraindicadas en pacientes bajo inmunosupresión biológica o corticoterapia, debiendo usarse cepas recombinantes inactivadas. La antimeningocócica (opción C) está indicada en poblaciones cerradas (universidades/militares) o con asplenia, no siendo un mandato universal a los 50 años para todo EII.", 
        source: "ACG - Atención preventiva en la enfermedad inflamatoria intestinal, 2025, Recommendations, Página 2." 
    },
    {
        id: 17, 
        question: "Tras someterse a una resección luminal significativa que incluyó íleon terminal por enfermedad de Crohn estenosante, un paciente desarrolla cólico litósico recurrente. ¿Qué restricción dietética combinada con suplementos de citrato de calcio está fisiopatológicamente recomendada para evitar esta complicación extracólica?", 
        options: ["Dieta baja en fibra insoluble", "Dieta baja en fructooligosacáridos", "Dieta baja en purinas y ácido úrico", "Dieta baja en oxalato"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Consenso Dietético ECCO 2025, la malabsorción de sales biliares tras la pérdida del íleon terminal ocasiona que los ácidos grasos libres colónicos se unan al calcio intraluminal de la dieta. Esto deja al oxalato dietético libre, el cual se absorbe masivamente en el colon, se filtra en orina y precipita formando nefrolitiasis severa.<br><br>Perla ENARM: \"En personas con enfermedad de Crohn que han sufrido resección intestinal, sugerimos que la hidratación adecuada, calcio dietético incrementado, citrato de calcio suplementario y una dieta baja en oxalatos reducen la absorción y la formación de cálculos de oxalato.\"<br><br>Análisis de Distractores: La restricción de purinas (opción C) atiende la litiasis por ácido úrico, la cual no es el disturbio de malabsorción selectiva pos-ileal. La dieta baja en FODMAP (opción B) alivia meteorismo en sobreposición con intestino irritable. La fibra baja (opción A) se usa pre-operatoriamente en estenosis puras con síntomas oclusivos mecánicos, no previene litos renales.", 
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, Intestinal resection and stones, Página 47." 
    },
    {
        id: 18, 
        question: "Antes de iniciar terapia inmunomoduladora de mantenimiento con Tiopurinas en un paciente que logró inducción con esteroides sistémicos, ¿qué estudio de cribado es obligatorio realizar para advertir toxicidad hematológica potencialmente letal?", 
        options: ["Medición de genotipo HLA-DQA105", "Actividad de la tiopurina metiltransferasa (TPMT)", "Niveles séricos basales de calprotectina", "Cuantificación de anticuerpos antinucleares (ANA)"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, la azatioprina y la 6-mercaptopurina son metabolizadas intensamente en el cuerpo humano por la enzima TPMT. Una deficiencia genética homocigótica de esta enzima deriva en la acumulación de metabolitos tóxicos citotóxicos masivos (6-TGN), causando supresión medular fulminante (leucopenia, trombocitopenia extrema) si se administran dosis estándar.<br><br>Perla ENARM: \"Los especialistas requieren de forma mandatoria la evaluación del genotipo o actividad fenotípica de la tiopurina metiltransferasa (TPMT) previa a la prescripción para ajustar posología y prevenir mielosupresión aguda.\"<br><br>Análisis de Distractores: El tamizaje de HLA-DQA105 (opción A) es reciente y predice riesgo de formar anticuerpos contra los bloqueadores del TNF, no para tiopurinas. La calprotectina basal (opción C) mide inflamación intestinal de control, no toxicidad metabólica hepática. Los ANA (opción D) detectan riesgo de lupus inducido por drogas, pero no es tamizaje rutinario pre-inmunomodulador.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Pre-assessment screening, Página 165." 
    },
    {
        id: 19, 
        question: "Un paciente de 67 años con enfermedad de Crohn extensa dependiente de Infliximab, hipertensión mal controlada e historia de tabaquismo pesado acude para optimización de terapia biológica ante pobre respuesta secundaria. ¿Qué clase de moléculas novedosas conllevan advertencia estricta en este perfil por aumento de Riesgo Adverso Cardiovascular Mayor (MACE) y trombosis venosa?", 
        options: ["Anti-Interleucinas 23 (Risankizumab)", "Anti-Integrina α4β7 (Vedolizumab)", "Inhibidores de la Janus cinasa (Tofacitinib / Upadacitinib)", "Moduladores de receptores de esfingosina-1-fosfato (Ozanimod)"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, los inhibidores orales JAK (pequeñas moléculas) han demostrado eficacia notable y rápida en rescatar actividad severa; no obstante, el ensayo clínico ORAL Surveillance levantó advertencias \"Black Box\" regulatorias por un aumento sustancial de eventos isquémicos cardiovasculares (infarto agudo, EVC), tromboembolismo pulmonar y neoplasias malignas frente al uso de anti-TNF, específicamente limitando su perfil de seguridad en personas >65 años, fumadores crónicos y cardiópatas.<br><br>Perla ENARM: \"Los inhibidores de JAK deben usarse con extrema precaución en pacientes mayores de 65 años, personas con mayor riesgo cardiovascular o tromboembolismo venoso (VTE), y aquellos con historial extenso de tabaquismo activo.\"<br><br>Análisis de Distractores: El Vedolizumab (opción B) posee selectividad intestinal exclusiva y tiene un perfil de seguridad prístino para infecciones y eventos sistémicos, ideal para el paciente geriátrico. Risankizumab/Ustekinumab (opción A) bloquean IL-12/23 con un excelente historial en pacientes mayores sin elevar alertas trombogénicas marcadas. Ozanimod (opción D) requiere electrocardiograma basal por riesgo de bradicardia inicial, no MACE estructural.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Table Implementation considerations, Página 168." 
    },
    {
        id: 20, 
        question: "Todo paciente con diagnóstico documentado de enfermedad de Crohn o Colitis Ulcerativa que sea admitido al área de urgencias médicas por una exacerbación severa no quirúrgica debe recibir rutinariamente la siguiente indicación, salvo que exista sangrado mayor activo:", 
        options: ["Antibióticos de amplio espectro intravenosos empíricos", "Nutrición parenteral total desde el ingreso", "Profilaxis farmacológica universal para tromboembolismo venoso", "Transfusión preventiva de plaquetas aféresis"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024 / BSG 2025, el estado inflamatorio sistémico hipercoagulante intrínseco de la enfermedad inflamatoria intestinal eleva exorbitantemente el riesgo de presentar trombosis venosa profunda o tromboembolismo pulmonar fatal durante un internamiento y en posoperatorios, dictaminando que la profilaxis química con heparinas de bajo peso molecular es vital e ineludible.<br><br>Perla ENARM: \"Recomendamos profilaxis médica para tromboembolismo venoso en todos los pacientes ingresados al hospital con patología inflamatoria intestinal activa aguda o posquirúrgicos, extendiéndose posterior al alta.\"<br><br>Análisis de Distractores: Los antibióticos empíricos (opción A) en una exacerbación inflamatoria luminal de Crohn están contraindicados ya que promueven disbiosis o infección por Clostridioides, a menos que haya absceso intraabdominal, peritonitis o megacolon. La desnutrición se maneja primeramente con enteral (opción B). La transfusión plaquetaria preventiva (opción D) es irracional ya que estos pacientes comúnmente exhiben trombocitosis reactiva por la tormenta de citoquinas inflamatorias.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Acute Severe Colitis/General care, Página 181." 
    },
    {
        id: 21, 
        question: "En un paciente con sospecha clínica de enfermedad de Crohn de intestino delgado, con hallazgos negativos en enteroresonancia magnética y síntomas intermitentes de oclusión intestinal, ¿cuál es el paso obligatorio previo a la realización de una endoscopia con cápsula diagnóstica?", 
        options: ["Realizar enterotomografía computarizada urgente", "Administrar procinéticos intestinales de acción central", "Utilizar una cápsula de permeabilidad de prueba", "Proceder con ileoscopia retrógrada de doble balón"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento, la endoscopia con cápsula está indicada cuando hay sospecha de afección de intestino delgado no demostrada por otros métodos. Sin embargo, su principal complicación es la retención en zonas de estenosis inadvertida. En pacientes con síntomas obstructivos, es mandatorio evaluar la permeabilidad intestinal (patency capsule) para evitar la retención que podría requerir rescate quirúrgico.<br><br>Perla ENARM: \"Los pacientes con síntomas obstructivos deben someterse a imágenes de intestino delgado o a una evaluación con cápsula de permeabilidad antes de la endoscopia con cápsula de video para disminuir el riesgo de retención.\"<br><br>Análisis de Distractores: La enterotomografía computarizada (opción A) expone innecesariamente a radiación cuando ya existe evaluación transversal previa. Los procinéticos (opción B) no resuelven estenosis mecánicas fibróticas. La enteroscopia de doble balón (opción D) es un procedimiento invasivo de segunda línea reservado para toma de biopsias o dilatación de lesiones previamente documentadas.", 
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Endoscopy, Página 218." 
    },
    {
        id: 22, 
        question: "Una paciente de 28 años con enfermedad de Crohn en remisión inducida bajo mantenimiento con metotrexato acude a consulta de planificación familiar deseando concebir. ¿Cuál es la indicación médica absoluta respecto a su terapia de mantenimiento?", 
        options: ["Reducir la dosis a 15 mg semanales hasta el parto", "Suspender el fármaco un mínimo de 1 a 3 meses previos", "Cambiar a administración subcutánea estrictamente", "Iniciar altas dosis de ácido fólico y continuar terapia"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Declaración de consenso mundial sobre el embarazo en EII 2025, el metotrexato es altamente teratogénico y está asociado con aborto espontáneo y defectos del tubo neural. Se recomienda su suspensión total y el inicio de suplementación con ácido fólico al menos de 1 a 3 meses antes de intentar la concepción para permitir la eliminación completa de los conjugados del fármaco.<br><br>Perla ENARM: \"En mujeres con enfermedad inflamatoria intestinal, recomendamos suspender la terapia de mantenimiento con metotrexato al menos 1 a 3 meses antes de la concepción debido a su perfil de teratogenicidad.\"<br><br>Análisis de Distractores: Reducir la dosis (opción A), cambiar la vía de administración (opción C) o compensar únicamente con ácido fólico (opción D) son medidas insuficientes e inaceptables, ya que cualquier nivel de exposición sistémica al metotrexato en el primer trimestre contraindica el embarazo por el riesgo inminente de malformaciones.", 
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Medications during pregnancy, Página 15." 
    },
    {
        id: 23, 
        question: "Al iniciar la terapia biológica con un agente bloqueador del factor de necrosis tumoral (infliximab) en un paciente con enfermedad de Crohn moderada a severa, ¿cuál es la estrategia farmacológica recomendada para reducir significativamente el riesgo de formación de anticuerpos contra el fármaco y prolongar su eficacia?", 
        options: ["Premedicación rutinaria con hidrocortisona intravenosa", "Administración simultánea con terapia de anti-integrinas", "Iniciar tratamiento concomitante con azatioprina", "Duplicar la dosis de inducción inicial a 10 mg/kg"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025 (y Guía ACG 2025), la inmunogenicidad (desarrollo de anticuerpos antidroga) es la causa principal de la pérdida secundaria de respuesta a los anticuerpos monoclonales quiméricos. La terapia combinada, es decir, la adición de un inmunomodulador como una tiopurina (azatioprina/6-mercaptopurina) o metotrexato, reduce de manera drástica este riesgo y mejora la farmacocinética al incrementar los niveles valle del biológico.<br><br>Perla ENARM: \"Se recomienda considerar el inicio de un inmunomodulador concomitante con o antes del inicio de la terapia anti-TNF para reducir el riesgo de desarrollo de anticuerpos contra el fármaco y aumentar las tasas de remisión.\"<br><br>Análisis de Distractores: La premedicación con hidrocortisona (opción A) previene reacciones infusionales agudas, pero no evita la inmunogenicidad a largo plazo. Duplicar la dosis (opción D) sin inmunomodulador no previene la formación de anticuerpos de forma sostenida. Combinar dos terapias biológicas simultáneas de forma primaria (opción B) aumenta el riesgo de infecciones oportunistas y no es el estándar de cuidado.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Drug monitoring, Página 186." 
    },
    {
        id: 24, 
        question: "En un paciente con factores de riesgo elevados (tabaquismo, enfermedad penetrante) sometido recientemente a resección ileocecal por enfermedad de Crohn, ¿cuál es la clase terapéutica que ha demostrado mayor eficacia y es fuertemente recomendada para prevenir la recurrencia endoscópica posquirúrgica?", 
        options: ["Corticosteroides orales de liberación prolongada", "Derivados del ácido 5-aminosalicílico", "Moduladores de receptores de esfingosina-1-fosfato", "Agentes bloqueadores del factor de necrosis tumoral"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Guía clínica del ACG 2025, en pacientes con alto riesgo de recurrencia (ej. tabaquismo activo, perforación, segunda cirugía), el inicio temprano de terapia biológica profiláctica es el estándar de cuidado. La evidencia más fuerte y consistente de modificación del curso natural de la enfermedad posoperatoria respalda a los inhibidores del TNF (infliximab/adalimumab).<br><br>Perla ENARM: \"En pacientes con enfermedad de Crohn de alto riesgo, recomendamos la terapia anti-TNF para prevenir la recurrencia endoscópica posoperatoria, ya que altera significativamente la probabilidad de reintervención.\"<br><br>Análisis de Distractores: Los corticosteroides y los derivados del 5-ASA (opciones A y B) son ineficaces para mantener la remisión posquirúrgica y se desaconsejan fuertemente. Las pequeñas moléculas (opción C) aún carecen de ensayos prospectivos robustos a largo plazo específicos para el contexto de prevención de recurrencia en el posoperatorio inmediato.", 
        source: "Guía clínica del ACG, Manejo de la enfermedad de Crohn en adultos, 2025, Postoperative CD, Página 260." 
    },
    {
        id: 25, 
        question: "Una mujer embarazada en su tercer trimestre tratada con azatioprina desarrolla prurito palmar y plantar intenso con elevación de enzimas hepáticas y ácidos biliares. ¿Qué alteración metabólica inducida por la gestación explica la toxicidad de este fármaco?", 
        options: ["Aceleración de la depuración renal del metabolito activo", "Reactivación de hepatitis viral latente por inmunosupresión", "Derivación metabólica hacia nucleótidos de metilmercaptopurina", "Toxicidad directa inducida por deficiencia de ácido fólico"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Declaración de consenso mundial sobre el embarazo en EII 2025, el metabolismo de las tiopurinas se altera significativamente durante las etapas tardías del embarazo. Ocurre una derivación (shunting) hacia metabolitos tóxicos, aumentando la relación de nucleótidos de metilmercaptopurina frente a los de tioguanina. Esta acumulación metabólica es responsable de desencadenar colestasis intrahepática del embarazo y hepatotoxicidad, ameritando vigilancia estricta de las enzimas hepáticas.<br><br>Perla ENARM: \"El metabolismo de las tiopurinas se altera en el embarazo, con un mayor riesgo de derivación (shunting) de los metabolitos hacia niveles altos de 6-metilmercaptopurina en el tercer trimestre, lo cual puede desencadenar colestasis intrahepática.\"<br><br>Análisis de Distractores: Las opciones A, B y D son incorrectas fisiopatológicamente. La colestasis intrahepática del embarazo en este contexto es un efecto directo de la toxicidad por metabolitos hepáticos de la tiopurina, y no se debe a infecciones reactivadas ni a depleción de folato.", 
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Medications during pregnancy, Página 16." 
    },
    {
        id: 26, 
        question: "Un paciente con fenotipo estenosante y desnutrición severa está programado para una resección intestinal electiva. ¿Cuál es el soporte nutricional preoperatorio óptimo, recomendado para disminuir el riesgo de complicaciones sépticas e inflamatorias en el posoperatorio?", 
        options: ["Nutrición enteral exclusiva por un mínimo de 2 a 4 semanas", "Nutrición parenteral total exclusiva por 7 días", "Ayuno intermitente con hidratación intravenosa", "Dieta mediterránea suplementada con zinc y selenio"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento Consenso de la ECCO sobre el manejo dietético 2025, la nutrición enteral exclusiva preoperatoria administrada por al menos 2 a 4 semanas no solo corrige las deficiencias calórico-proteicas, sino que disminuye la carga inflamatoria mesentérica, reduciendo dramáticamente las tasas de abscesos, fugas anastomóticas y en ocasiones permitiendo evitar el estoma.<br><br>Perla ENARM: \"Para reducir el riesgo de complicaciones posoperatorias en personas con enfermedad de Crohn que esperan intervención quirúrgica, se recomienda la provisión de nutrición enteral exclusiva preoperatoria por un periodo mínimo de 2 a 4 semanas.\"<br><br>Análisis de Distractores: La nutrición parenteral total (opción B) se reserva estrictamente si la vía enteral está absolutamente contraindicada u obstruida por el riesgo elevado de infección por catéter y atrofia de vellosidades. El ayuno y dietas específicas no calóricas (opciones C y D) no aportan el soporte nutricional completo y carecen de las propiedades curativas intraluminales de las fórmulas elementales/poliméricas de la EEN.", 
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, Preoperative nutritional care, Página 18." 
    },
    {
        id: 27, 
        question: "En un paciente adulto con diagnóstico reciente de ileítis terminal localizada menor a 40 cm y refractaria a tratamiento convencional, ¿cuál intervención proporciona tasas similares de calidad de vida y se considera una alternativa razonable frente al inicio de terapia con biológicos?", 
        options: ["Terapia combinada con metotrexato a dosis plenas", "Procedimiento derivativo con ileostomía en asa", "Estenoplastia múltiple con configuración Kono-S", "Resección ileocecal por abordaje laparoscópico"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025 y a los resultados del estudio LIR!C, en la enfermedad de Crohn ileocecal aislada no complicada y de segmento corto (<40 cm), la cirugía resectiva laparoscópica temprana ha demostrado ser igual de efectiva en mantener la calidad de vida que el tratamiento médico escalonado con infliximab, minimizando el tiempo de exposición a drogas y hospitalizaciones.<br><br>Perla ENARM: \"Se debe considerar una resección laparoscópica en la enfermedad de Crohn ileocecal localizada en pacientes que no responden a la terapia médica inicial, ofreciendo niveles equivalentes de calidad de vida en comparación con el inicio de agentes biológicos.\"<br><br>Análisis de Distractores: La estenoplastia (opción B) se reserva para intestino delgado proximal o intestino muy corto, no es de elección primaria para el íleon terminal aislado donde la resección es curativa a corto plazo. La derivación (opción C) no reseca la enfermedad activa y requiere múltiples cirugías posteriores. El metotrexato (opción A) como monoterapia de inducción en este escenario tiene evidencia muy baja y no es curativo estructuralmente.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Surgical considerations for luminal Crohn's disease, Página 171." 
    },
    {
        id: 28, 
        question: "Tras realizar la exploración bajo anestesia y colocación de setones no cortantes en un absceso perianal por enfermedad de Crohn, ¿cuál es la terapia biológica de primera línea sugerida para inducir el cierre y cicatrización de los trayectos fistulosos restantes?", 
        options: ["Risankizumab infusión intravenosa", "Vedolizumab subcutáneo mensual", "Infliximab por vía intravenosa", "Certolizumab pegol subcutáneo"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, una vez asegurado el drenaje de sepsis perineal mediante cirugía, se debe iniciar agresivamente el tratamiento médico inmunosupresor. El único agente biológico que ha demostrado prospectiva y consistentemente eficacia contundente para el cierre y mantenimiento de fístulas perianales complejas es el infliximab.<br><br>Perla ENARM: \"Sugerimos el uso de infliximab como terapia biológica de primera línea para la enfermedad de Crohn perianal, debiendo iniciarse tan pronto como se logre el drenaje quirúrgico adecuado de la sepsis pélvica.\"<br><br>Análisis de Distractores: Aunque medicamentos como el vedolizumab (opción B) o risankizumab (opción A) son altamente eficaces para la enfermedad luminal, su nivel de evidencia para cicatrizar directamente la enfermedad fistulizante profunda y destructiva es considerablemente menor. El certolizumab (opción D) tiene tasas de respuesta inferiores en cicatrización estructural comparado con infliximab.", 
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Combined approaches, Página 1563." 
    },
    {
        id: 29, 
        question: "¿Qué agente biológico, clasificado como un anticuerpo monoclonal antagonista dirigido contra la interleucina-23 (anti-IL-23), ha sido aprobado recientemente y es fuertemente recomendado para la inducción y mantenimiento en enfermedad de Crohn refractaria?", 
        options: ["Adalimumab", "Tofacitinib", "Risankizumab", "Infliximab"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía clínica del ACG 2025, el risankizumab es un anticuerpo monoclonal humano de última generación que se une de manera selectiva a la subunidad p19 de la interleucina-23. Ha demostrado una eficacia y seguridad superiores en ensayos recientes (ej. ADVANCE y MOTIVATE) induciendo y manteniendo la remisión clínica y endoscópica, incluso en pacientes que han fallado previamente a terapias anti-TNF.<br><br>Perla ENARM: \"Recomendamos el uso de risankizumab para la inducción y el mantenimiento de la remisión en pacientes con enfermedad de Crohn con actividad moderada a severa, incluyendo aquellos con exposición previa a agentes anti-TNF.\"<br><br>Análisis de Distractores: Adalimumab e Infliximab (opciones A y D) son antagonistas del TNF alfa, no de interleucinas. El tofacitinib (opción B) es un inhibidor de la vía intracelular de la Janus cinasa (JAK), no es un anticuerpo biológico directo contra la IL-23.", 
        source: "Guía clínica del ACG, Manejo de la enfermedad de Crohn en adultos, 2025, Medical Management, Página 263." 
    },
    {
        id: 30, 
        question: "En un paciente masculino de 35 años con enfermedad de Crohn perianal severa, progresiva y destructiva, que ha agotado sin éxito múltiples terapias médicas y drenajes locales con afectación incesante de la calidad de vida, ¿qué intervención quirúrgica paliativa se sugiere para detener el daño estructural y retrasar la proctectomía definitiva?", 
        options: ["Reparación primaria con colgajo de avance endorrectal", "Aplicación tópica de tapón de matriz de colágeno", "Formación de una ileostomía de derivación fecal", "Fistulectomía extensa con conservación esfinteriana"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, en el fenotipo más severo y refractario de enfermedad de Crohn perianal donde hay destrucción muscular o sepsis incontrolable, los intentos de reparación anatómica (colgajos, tapones biológicos) fracasarán irremediablemente y empeorarán la incontinencia. La derivación del tránsito fecal mediante una ostomía proximal (ileostomía o colostomía) es mandatoria para desfuncionalizar la zona, mitigar la sepsis, preservar temporalmente la continencia y dar tiempo a que los tratamientos médicos actúen, evitando la proctectomía inminente.<br><br>Perla ENARM: \"Sugerimos la derivación fecal con una ileostomía o colostomía desfuncionalizante para el tratamiento de la enfermedad perianal compleja y refractaria en la enfermedad de Crohn, con el fin de retrasar o evitar la colectomía.\"<br><br>Análisis de Distractores: Las opciones reconstructivas locales como el colgajo de avance (opción A) o el tapón biológico (opción B) están absolutamente contraindicadas ante inflamación activa y falta de control de sepsis perianal grave. La fistulectomía extensa (opción D) en Crohn resulta en heridas de no cicatrización (ulceración crónica perineal) e incontinencia permanente.", 
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Management of complex fistulae, Página 1565." 
    },
    {
        id: 31, 
        question: "En pacientes bajo tratamiento prolongado de mantenimiento con tiopurinas, las guías internacionales enfatizan que existe un incremento independiente y estadísticamente significativo del riesgo de desarrollar ¿qué tipo de neoplasia específica?", 
        options: ["Adenocarcinoma de intestino delgado", "Cáncer de piel no melanoma", "Linfoma de células T hepatoesplénico primario", "Sarcoma de Kaposi metastásico"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Prevención ACG 2025, el uso de inmunosupresores convencionales, particularmente la exposición a tiopurinas (azatioprina/6-mercaptopurina) a lo largo del tiempo, se asocia directamente con un aumento significativo del riesgo de desarrollar cáncer de piel no melanoma (carcinoma de células basales y carcinoma espinocelular). El riesgo persiste durante la duración de la terapia y es dosis dependiente. Se recomienda evaluación dermatológica anual.<br><br>Perla ENARM: \"En pacientes con enfermedad inflamatoria intestinal que reciben terapias inmunomoduladoras, específicamente tiopurinas, sugerimos un examen de detección anual de cáncer de piel no melanoma mientras utilizan estos agentes, dado su riesgo significativamente elevado.\"<br><br>Análisis de Distractores: El linfoma de células T hepatoesplénico (opción C) ocurre con tiopurinas pero es extraordinariamente raro (casos aislados, sobre todo en hombres jóvenes bajo terapia combinada), no es la neoplasia sólida más prevalente asociada. El riesgo de adenocarcinoma (opción A) es inherente a la inflamación transmural crónica del Crohn, no inducido directamente por la tiopurina.", 
        source: "ACG 2025 - Atención preventiva en la enfermedad inflamatoria intestinal, NMSC with thiopurine use, Página 3." 
    },
    {
        id: 32, 
        question: "Un paciente diagnosticado con colitis por enfermedad de Crohn acude al área de emergencias con fiebre, taquicardia y distensión abdominal masiva progresiva. Ante la fuerte sospecha clínica de megacolon tóxico, ¿cuál es el estudio de imagen preferido por las guías actuales para su evaluación inmediata y diagnóstico?", 
        options: ["Colonoscopia total para toma urgente de biopsias", "Radiografía simple de abdomen en posición de pie", "Tomografía computarizada de abdomen", "Tránsito intestinal con administración de bario"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR-ESP-IBUS 2025 sobre diagnóstico, históricamente la radiografía abdominal evaluaba la dilatación colónica (>6 cm); sin embargo, en el contexto actual de complicaciones agudas por EII y sospecha inminente de megacolon tóxico, la tomografía computarizada (TC) ha desplazado a la radiografía debido a su alta sensibilidad (>90%) para evaluar de inmediato complicaciones amenazantes de la vida, como perforación libre oculta, neumatosis intestinal o abscesos ocultos peridiverticulares.<br><br>Perla ENARM: \"En caso de sospecha clínica de megacolon tóxico, sugerimos la realización de tomografía computarizada (TC) en lugar de una radiografía abdominal simple para un diagnóstico y evaluación precisa de la pared intestinal.\"<br><br>Análisis de Distractores: La colonoscopia total (opción A) y el tránsito con bario (opción D) están absolutamente contraindicados en el megacolon tóxico por el altísimo riesgo de perforación iatrogénica por barotrauma o contraste. La radiografía simple (opción B) tiene escasa utilidad para definir el espesor de la pared isquémica y no descarta perforaciones localizadas tempranas.", 
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 1, 2025, Imaging in Specific Situations, Página 219." 
    },
    {
        id: 33, 
        question: "Una mujer embarazada de 24 semanas de gestación diagnosticada con enfermedad de Crohn se encuentra en tratamiento de mantenimiento con adalimumab y en remisión clínica sostenida. De acuerdo con el consenso mundial, ¿qué conducta terapéutica debe tomarse respecto a su medicación biológica?", 
        options: ["Cambiar la pauta terapéutica por metotrexato a dosis bajas", "Sustituir el biológico por budesonida oral y mesalazina", "Suspender las dosis del fármaco a partir de la semana 26", "Continuar la terapia de mantenimiento sin interrupción"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Declaración de consenso mundial sobre el embarazo en EII 2025, el factor de riesgo más importante para un desenlace adverso del embarazo (parto pretérmino, bajo peso, muerte fetal) es la reactivación de la enfermedad inflamatoria intestinal. Por tanto, se recomienda contundentemente mantener la terapia con agentes Anti-TNF (adalimumab, infliximab) a lo largo del embarazo si la paciente está en remisión, evaluando riesgos de transferencia placentaria individualmente pero priorizando el control del brote materno.<br><br>Perla ENARM: \"En mujeres con enfermedad inflamatoria intestinal que están embarazadas o intentando concebir, recomendamos continuar la terapia de mantenimiento con agentes anti-factor de necrosis tumoral durante todo el embarazo para evitar reactivación clínica.\"<br><br>Análisis de Distractores: Cambiar a metotrexato (opción A) está absolutamente contraindicado por riesgo de aborto. Cambiar a corticosteroides (opción B) incrementa el riesgo materno-fetal respecto a mantener la remisión biológica. Suspender empíricamente (opción C) en fases tardías propicia rebrotes severos al término y puerperio.", 
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Medications during pregnancy, Página 15." 
    },
    {
        id: 34, 
        question: "Para prevenir complicaciones de pérdida ósea en pacientes adultos con enfermedad inflamatoria intestinal, ¿en cuál de los siguientes escenarios está indicada la evaluación temprana mediante densitometría ósea (DXA scan)?", 
        options: ["Cifras de calprotectina fecal elevadas crónicamente", "Presencia de patrón de distribución colónica izquierda", "Uso concurrente y repetido de corticosteroides sistémicos", "Desarrollo de fístulas perianales complejas y sepsis"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Prevención ACG 2025, los pacientes con EII presentan tasas más elevadas de osteopenia y osteoporosis secundaria a la propia cascada inflamatoria, mala absorción y de manera pronunciada por la yatrogenia derivada del uso histórico o recurrente de glucocorticoides (prednisona/metilprednisolona). Se sugiere realizar despistaje temprano de densidad ósea en ellos para prevenir fracturas por fragilidad.<br><br>Perla ENARM: \"En adultos con enfermedad inflamatoria intestinal y factores de riesgo convencionales para anomalías en la densidad mineral ósea (específicamente uso recurrente o prolongado de corticosteroides), sugerimos el tamizaje para osteoporosis mediante densitometría ósea al momento del diagnóstico o evaluación.\"<br><br>Análisis de Distractores: La calprotectina (opción A), localización distal (opción B) y fenotipo fistulizante (opción D) determinan el control del manejo intestinal primario y no dictan guías directas de tamizaje metabólico óseo.", 
        source: "ACG 2025 - Atención preventiva en la enfermedad inflamatoria intestinal, 2025, Bone Health, Página 3." 
    },
    {
        id: 35, 
        question: "Un paciente con fenotipo de enfermedad de Crohn estenosante intraabdominal documentada acude refiriendo distensión, dolor abdominal ocasional tipo cólico y paso disminuido de flatos. En espera de intervención definitiva, ¿cuál medida dietética paliativa disminuye fisiopatológicamente el riesgo de oclusión total?", 
        options: ["Prescribir una dieta rica en oligosacáridos no fermentables", "Implementar una dieta con aporte hídrico y baja en oxalato", "Instaurar una dieta estrictamente libre de gluten y lácteos", "Recomendar una dieta baja en fibra insoluble formadora de masa"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Consenso Dietético ECCO 2025, aunque no previenen ni reducen la carga fibrótica de la enfermedad estenosante, el fundamento mecanicista sugiere fuertemente prescribir una reducción dietética de fibras insolubles que aportan volumen/residuo (bulking fibre). Esto evita la impactación mecánica intraluminal contra el segmento estenosado que podría precipitar un íleo u obstrucción intestinal quirúrgica inminente.<br><br>Perla ENARM: \"El razonamiento basado en el mecanismo fisiopatológico sugiere que una dieta baja en fibra formadora de volumen (bulking fibre) en personas con enfermedad de Crohn estenosante y síntomas obstructivos podría reducir el riesgo de desarrollar una oclusión intestinal inminente.\"<br><br>Análisis de Distractores: Restringir gluten o lácteos (opción C) no es útil frente a una barrera mecánica. La dieta baja en oxalato (opción B) previene nefrolitiasis pero no impacta en la luz del tubo digestivo. Añadir FODMAP u oligosacáridos (opción A) incrementaría la fermentación gasífera exacerbando el dolor y la distensión proximal al área ocluida.", 
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, Strictures, Página 18." 
    },
    {
        id: 36, 
        question: "En pacientes sometidos a una resección de íleon distal a causa de estenosis por enfermedad de Crohn, ¿qué fármaco antimicrobiano se encuentra sugerido para usarse como profilaxis posoperatoria en los primeros meses para prevenir la recurrencia anastomótica temprana?", 
        options: ["Amoxicilina con ácido clavulánico", "Vancomicina administrada por vía oral", "Metronidazol a dosis de 1 a 2 g al día", "Ciprofloxacino en terapia de pulsos semanales"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía clínica del ACG 2025, dentro de las medidas adyuvantes en pacientes sin un perfil de riesgo inminente para biológicos o en transición posoperatoria, los antibióticos del grupo de los imidazoles (especialmente el metronidazol) han demostrado reducir moderadamente la carga bacteriana luminal y la disbiosis en el sitio de la anastomosis, disminuyendo las tasas de recurrencia clínica posoperatoria inicial, aunque limitados por el advenimiento de toxicidad periférica y neurológica a largo plazo.<br><br>Perla ENARM: \"Sugerimos el uso de antibióticos imidazólicos (metronidazol) a dosis entre 1 y 2 g diarios después de una resección de intestino delgado en pacientes con enfermedad de Crohn como medida adyuvante para prevenir la recurrencia.\"<br><br>Análisis de Distractores: Vancomicina oral (opción B) se usa estrictamente para Clostridioides difficile. Amoxicilina (opción A) y Ciprofloxacino en monoterapia pulsátil (opción D) no tienen aval prospectivo sólido en la modulación del microbioma para profilaxis estructurada de la enfermedad de Crohn.", 
        source: "Guía clínica del ACG, Manejo de la enfermedad de Crohn en adultos, 2025, Postoperative Medical Therapy, Página 260." 
    },
    {
        id: 37, 
        question: "¿Cuál de las siguientes terapias intervencionistas está explícitamente NO recomendada en el tratamiento primario y definitivo de las fístulas perianales complejas en la enfermedad de Crohn debido a sus decepcionantes resultados curativos a largo plazo?", 
        options: ["Instalación de tapones biológicos de fibrina (fibrin glue)", "Colocación inicial de setones no cortantes para sepsis", "Ligadura del trayecto interesfintérico de la fístula (LIFT)", "Cobertura con colgajo de avance endorrectal sin proctitis"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, a pesar de tener un excelente perfil de seguridad, el uso de pegamentos de fibrina o tapones biológicos en cavidades fistulosas crónicas de Crohn tiene una tasa de cicatrización a largo plazo muy pobre con recurrencia temprana, ya que la fibrina se expulsa o se sobreinfecta si el tracto sigue inflamado y en continua supuración patológica, dictando las guías en contra de su uso primario.<br><br>Perla ENARM: \"Recomendamos en contra del uso de pegamento de fibrina (fibrin glue) o tapones de colágeno en el tratamiento de pacientes con fístulas perianales complejas de enfermedad de Crohn debido a las altas tasas de falla documentadas.\"<br><br>Análisis de Distractores: El setón no cortante (opción B) es indispensable para el manejo inicial séptico. Las técnicas de LIFT (opción C) y el colgajo de avance (opción D) son las terapias resectivas de preservación esfinteriana aceptadas para buscar curación en fístulas complejas en ausencia de proctitis y control inflamatorio óptimo.", 
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Local treatment options, Página 1560." 
    },
    {
        id: 38, 
        question: "Para estandarizar la evaluación de la recurrencia posoperatoria temprana en enfermedad de Crohn tras una resección ileocólica, la endoscopia emplea un sistema de puntuación para diferenciar úlceras de la línea anastomótica de úlceras en íleon proximal. ¿A qué sistema corresponde esta estratificación validada?", 
        options: ["Índice de Lémann modificado (LM)", "Score endoscópico simple de Crohn (SES-CD)", "Puntuación de Rutgeerts modificada (i2a/i2b)", "Índice de severidad de Harvey-Bradshaw"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR 2025 Parte 2, la evaluación posoperatoria a los 6-12 meses se basa en la puntuación de Rutgeerts. Sin embargo, su versión original fallaba en predecir progresiones si solo había pequeñas lesiones en el anillo isquémico-quirúrgico. La modificación reciente distingue entre el \"i2a\", donde las lesiones están confinadas estrictamente a la anastomosis ileocólica con bajo riesgo de progresión, y el \"i2b\", con múltiples úlceras en el neoterminal ileal, presagiando alto riesgo inminente de recidiva y ameritando biológicos.<br><br>Perla ENARM: \"La puntuación modificada de Rutgeerts incluye el estadio i2a para lesiones confinadas a la anastomosis ileocólica y el estadio i2b para lesiones más grandes en el íleon neoterminal, abordando la heterogeneidad de riesgo y progresión del score original.\"<br><br>Análisis de Distractores: El SES-CD (opción B) evalúa la gravedad segmentaria endoscópica global, pero no clasifica predictivamente la anastomosis. Lémann (opción A) evalúa daño estructural por radiología. Harvey-Bradshaw (opción D) es clínico poblacional.", 
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Post-operative endoscopic recurrence, Página 218." 
    },
    {
        id: 39, 
        question: "Un paciente de 48 años con antecedente de enfermedad de Crohn extensa de colon presenta enzimas colestásicas elevadas persistentes y se confirma el diagnóstico de colangitis esclerosante primaria (CEP). Por la interrelación de estas patologías, ¿cuál medida de tamizaje clínico es prioritaria y rigurosa en su seguimiento?", 
        options: ["Realizar escrutinio genético de mutaciones TPMT bianualmente", "Efectuar enteroresonancia magnética de protocolo cada 6 meses", "Programar colonoscopia anual para escrutinio de cáncer colorrectal", "Obtener concentraciones séricas de calprotectina mensual"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía Clínica del ACG 2025 / ECCO, la coexistencia de enfermedad inflamatoria intestinal con compromiso colónico y la colangitis esclerosante primaria impone el riesgo más alto e inminente en gastroenterología para el desarrollo de displasia y cáncer colorrectal avanzado en adultos jóvenes. Para estos pacientes específicos se elimina la ventana habitual de espera de 8 a 10 años, exigiendo colonoscopias profilácticas y toma sistemática de biopsias desde el diagnóstico de la CEP de forma anual.<br><br>Perla ENARM: \"Recomendamos vigilancia endoscópica de rutina anual para cáncer colorrectal en pacientes con colitis de Crohn y comorbilidad de colangitis esclerosante primaria, con el fin de asegurar una supervivencia libre de neoplasia.\"<br><br>Análisis de Distractores: Las RM cada 6 meses (opción B) y calprotectina mensual (opción D) sobreutilizan recursos para actividad luminal y no enfocan en displasia, que es silente. Las pruebas genéticas TPMT (opción A) se realizan pre-medicación, no de seguimiento en CEP.", 
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 1, 2025, Cancer risk in IBD, Página 223 / ACG Clinical Guidelines." 
    },
    {
        id: 40, 
        question: "Aunque clásicamente documentado para colitis ulcerativa, en escenarios de enfermedad de Crohn colónica severa fulminante y refractaria (con toxicidad sistémica y sin respuesta tras de 3 a 5 días de corticosteroides intravenosos), ¿cuál de las siguientes opciones constituye la terapia de rescate de segunda línea sugerida por las guías en pacientes hospitalizados antes de proceder a la cirugía de urgencia?", 
        options: ["Azatioprina 2.5 mg/kg vía oral cada 24 horas", "Terapia anti-TNF con infliximab intravenoso", "Mesalazina tópica y oral a dosis superiores a 4 gramos", "Incremento a metilprednisolona 1 gramo en bolo"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía BSG 2025 y Guía ACG 2025, para pacientes internados con colitis fulminante refractaria que no muestran respuesta a dosis máximas de esteroides intravenosos (evaluados al día 3 o 5), se debe activar una terapia de rescate biológica urgente o inmunomodulación agresiva. El infliximab intravenoso (o alternativamente ciclosporina IV en CU) ofrece un control inmunológico potente para intentar evitar una colectomía de emergencia u otras catástrofes estructurales inminentes.<br><br>Perla ENARM: \"Sugerimos que los pacientes que no respondan a al menos 3 a 5 días de corticosteroides intravenosos deben ser tratados con terapia médica de rescate intensiva en forma de infliximab o ciclosporina intravenosa.\"<br><br>Análisis de Distractores: La azatioprina (opción A) requiere semanas para iniciar su latencia. Los derivados de 5-ASA (opción C) son fútiles para controlar cuadros fulminantes que amenazan la vida y la toxicidad gástrica previene la dosis. Seguir escalando esteroides y metilprednisolona en megadosis (opción D) no revertirá el daño molecular subyacente y aumentará riesgos isquémicos u oportunistas.", 
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Acute Severe Colitis, Página 183." 
    },
    {
        id: 41,
        question: "¿Cuál es la definición estandarizada del concepto de \"remisión profunda\" (deep remission) en los pacientes con enfermedad de Crohn?",
        options: ["Remisión clínica, curación de la mucosa y suspensión de corticosteroides por ≥8 semanas", "Ausencia de síntomas, calprotectina fecal <40 µg/g y PCR en rangos de normalidad", "Resolución de fístulas perianales y cierre del trayecto evaluado por resonancia magnética", "Curación transmural documentada por ultrasonido y remisión clínica sostenida por 12 meses"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, el concepto emergente de remisión profunda va más allá de la simple ausencia de síntomas e incorpora objetivos biológicos estructurados. Su impacto clínico, derivado de estudios como el CALM, radica en que los pacientes que cumplen estos tres criterios reducen drásticamente el riesgo de progresión y daño estructural.<br><br>Perla ENARM: \"El concepto emergente de remisión profunda se refiere a la presencia tanto de remisión clínica como de curación de la mucosa, acompañadas de la ausencia de terapia con corticosteroides por un lapso ≥8 semanas.\"<br><br>Análisis de Distractores: La opción B representa una remisión clínica y bioquímica, pero omite la confirmación endoscópica (curación mucosa). La opción C describe remisión de la enfermedad fistulizante, no el constructo global de \"remisión profunda\". La opción D menciona la curación transmural, la cual es un objetivo emergente y deseable, pero actualmente la definición estandarizada de remisión profunda se basa en la evaluación mucosa (endoscópica) y clínica libre de esteroides.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Endoscopy, Página 161."
    },
    {
        id: 42,
        question: "En mujeres con enfermedad de Crohn en edad reproductiva, ¿cuál de las siguientes clases de fármacos se encuentra absolutamente contraindicada durante la concepción, el embarazo y la lactancia debido a malformaciones graves documentadas?",
        options: ["Antagonistas del factor de necrosis tumoral alfa", "Moduladores de los receptores de esfingosina-1-fosfato", "Bloqueadores de la subunidad p19 de la interleucina-23", "Anticuerpos monoclonales anti-integrina alfa4-beta7"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Consenso mundial embarazo en EII 2025, las pequeñas moléculas como los moduladores del receptor de esfingosina-1-fosfato (Ozanimod, Etrasimod) y los inhibidores de la Janus Cinasa (Tofacitinib, Upadacitinib) tienen advertencias estrictas de teratogenicidad basadas en estudios animales y están formalmente contraindicadas. Se deben suspender semanas o meses previos a la concepción.<br><br>Perla ENARM: \"Tofacitinib, filgotinib, upadacitinib, ozanimod y etrasimod están contraindicados durante la concepción, el embarazo y la lactancia debido a malformaciones graves encontradas en estudios con animales.\"<br><br>Análisis de Distractores: Las opciones A, C y D corresponden a terapias biológicas (Infliximab, Risankizumab, Vedolizumab) que, a pesar de atravesar la placenta en distintos grados, han demostrado ser seguras y se recomienda fuertemente continuarlas durante todo el embarazo para evitar la reactivación letal de la enfermedad.",
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Table 2 Consensus Statements, Página 6."
    },
    {
        id: 43,
        question: "En un paciente con enfermedad de Crohn de afectación colónica, ¿en qué momento exacto de la historia natural de la enfermedad se debe iniciar el programa de vigilancia endoscópica sistemática para la detección temprana de cáncer colorrectal?",
        options: ["A los 3 años del diagnóstico histopatológico", "A los 8 años tras el inicio de los primeros síntomas", "Inmediatamente tras requerir el primer rescate con esteroides", "Al cumplir 50 años de edad, independientemente del diagnóstico"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR 2025 Parte 1, la inflamación crónica del colon predispone al desarrollo de displasia y adenocarcinoma independientemente de si es colitis ulcerativa o enfermedad de Crohn colónica. El riesgo se incrementa exponencialmente tras la primera década de actividad inflamatoria, por lo que el escrutinio debe arrancar puntualmente a los 8 años del inicio clínico.<br><br>Perla ENARM: \"La colonoscopia de tamizaje debe realizarse en todos los pacientes con enfermedad inflamatoria intestinal a los 8 años posteriores a la aparición de los primeros síntomas para evaluar la extensión de la enfermedad y excluir displasia.\"<br><br>Análisis de Distractores: La opción A es demasiado temprana para el fenotipo clásico (salvo que exista colangitis esclerosante primaria concomitante, donde se inicia al diagnóstico de la patología hepática). La opción C no tiene correlación oncológica directa. La opción D (50 años) es la indicación de tamizaje para población general sin factores de riesgo, no para pacientes con EII que frecuentemente debutan jóvenes y requieren tamizaje acelerado.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 1, 2025, Colorectal cancer screening, Página 223."
    },
    {
        id: 44,
        question: "¿Cuál es el índice validado que tiene como objetivo específico medir integralmente el daño estructural intestinal acumulado a lo largo del tiempo (estenosis, fístulas, resecciones quirúrgicas) en pacientes con enfermedad de Crohn?",
        options: ["Índice de Lémann (Lémann Index)", "Score endoscópico simple para Crohn (SES-CD)", "Índice de severidad de Harvey-Bradshaw (HBI)", "Puntuación de Rutgeerts modificada (i2b)"],
        answer: 0,
