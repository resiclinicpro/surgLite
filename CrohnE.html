        justification: "Justificación: De acuerdo al documento Enfermedad de Crohn - The Lancet 2024, la naturaleza progresiva de la enfermedad de Crohn se caracteriza por un avance inexorable desde la inflamación hacia complicaciones fibróticas o penetrantes. El Lémann Index fue desarrollado y validado prospectivamente para evaluar de manera integral el daño estructural del tracto digestivo, combinando hallazgos clínicos, endoscópicos, quirúrgicos y de imagen transversal.<br><br>Perla ENARM: \"La validación y actualización del índice de Lémann permite medir el daño estructural intestinal acumulativo en la enfermedad de Crohn, evaluando la progresión de la enfermedad más allá de la simple actividad inflamatoria.\"<br><br>Análisis de Distractores: El SES-CD (opción B) mide únicamente inflamación mucosa macroscópica en un momento dado, no daño transmural ni resecciones. El HBI (opción C) es un índice puramente clínico-sintomático. La Puntuación de Rutgeerts (opción D) es de uso exclusivo para evaluar la anastomosis neoterminal postquirúrgica.",
        source: "Enfermedad de Crohn - The lancet, 2024, Diagnosis and disease monitoring, Página 1184."
    },
    {
        id: 45,
        question: "En pacientes con exacerbación grave de la enfermedad inflamatoria intestinal que requieren hospitalización y resultan clínicamente refractarios al tratamiento inicial con corticosteroides intravenosos, ¿qué etiología infecciosa debe descartarse obligatoriamente mediante tejido colónico?",
        options: ["Infección invasiva por Salmonella enterica", "Sobrecrecimiento por Clostridioides difficile", "Infección por citomegalovirus (CMV)", "Reactivación de virus de Epstein-Barr (EBV)"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, un brote severo que no responde al rescate con esteroides en 3 a 5 días o que empeora paradójicamente debe despertar la alta sospecha de una colitis por inclusión viral. La reactivación de CMV en el tejido inflamado agrava la necrosis mucosa, y su diagnóstico amerita biopsias profundas con inmunohistoquímica o PCR para cambiar el manejo a Ganciclovir.<br><br>Perla ENARM: \"Los pacientes con un brote de EII que requieren hospitalización o con EII refractaria de moderada a severa que no responden a las terapias inmunosupresoras deben enviar tejido colónico para inmunohistoquímica o PCR en búsqueda de citomegalovirus.\"<br><br>Análisis de Distractores: Clostridioides difficile (opción B) y toxinas bacterianas (opción A) deben descartarse al momento del ingreso en urgencias a través de pruebas en heces (coprocultivo, toxinas, PCR fecal), no requiriendo esperar a la refractariedad esteroidea ni tejido biopsiado. El EBV (opción D) preocupa a largo plazo por riesgo de linfoma al iniciar tiopurinas, no como causa de megacolon o colitis fulminante refractaria aguda.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Specific infections, Página 186."
    },
    {
        id: 46,
        question: "En pacientes con enfermedad de Crohn que presentan estenosis ileocolónicas anastomóticas sintomáticas, ¿cuál es el límite de longitud máximo de la lesión para considerar la dilatación endoscópica con balón como un tratamiento inicial apropiado frente a la cirugía?",
        options: ["<10 cm", "<2 cm", "<4 cm", "<7 cm"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, la dilatación endoscópica es un tratamiento puente efectivo, menos invasivo que la cirugía, que previene la pérdida de segmento intestinal. Las lesiones ideales para este abordaje son estenosis únicas, no anguladas, libres de fístulas concomitantes y cuya extensión longitudinal no exceda los 4 a 5 cm.<br><br>Perla ENARM: \"Sugerimos que la dilatación endoscópica con balón es un tratamiento apropiado para estenosis anastomóticas ileocolónicas de menos de 4 cm de longitud, sin angulación aguda y sin enfermedad penetrante.\"<br><br>Análisis de Distractores: Una longitud <10 cm (opción A) es el límite para realizar una técnica quirúrgica preservadora como la estenoplastia (Heineke-Mikulicz), pero excede los márgenes seguros para dilatación endoscópica debido al alto riesgo de perforación y fracaso de permeabilidad a corto plazo.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Interventional endoscopy, Página 172."
    },
    {
        id: 47,
        question: "Durante la planificación familiar en mujeres con enfermedad de Crohn, ¿cuál es el periodo mínimo de tiempo recomendado de remisión sostenida libre de esteroides que debe documentarse antes de intentar la concepción para optimizar los resultados materno-fetales?",
        options: ["1 a 2 meses", "3 a 6 meses", "9 a 12 meses", "18 a 24 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Consenso mundial embarazo en EII 2025, la actividad de la enfermedad al momento de la concepción es el principal factor predictivo de recaída y complicaciones durante el embarazo. La remisión clínica y bioquímica consolidada durante al menos 3 a 6 meses reduce la incidencia de parto pretérmino y restricción del crecimiento intrauterino a tasas comparables con la población general.<br><br>Perla ENARM: \"Las mujeres con enfermedad inflamatoria intestinal deben estar en remisión documentada (clínica y bioquímica) y médicamente optimizadas idealmente de 3 a 6 meses previos a la concepción electiva.\"<br><br>Análisis de Distractores: De 1 a 2 meses (opción A) es el tiempo de suspensión sugerido para fármacos teratogénicos (metotrexato) previo al embarazo, pero no garantiza la estabilidad del control inmunológico de la patología. Tiempos prolongados de 9 a 24 meses (opciones C y D) retrasan innecesariamente el potencial reproductivo de las pacientes en una etapa donde la fertilidad ya declina con la edad.",
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Preconception Disease Optimization, Página 4."
    },
    {
        id: 48,
        question: "Durante la evaluación mediante ultrasonido intestinal en pacientes adultos con enfermedad de Crohn, ¿a partir de qué grosor de la pared intestinal (BWT) se considera un hallazgo anormal primario indicativo de inflamación transmural activa?",
        options: [">1.5 mm", ">3.0 mm", ">5.0 mm", ">7.5 mm"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 2 2025, el ultrasonido intestinal (IUS) permite evaluar rápidamente en el consultorio el daño estructural. En todas las métricas de puntuación validadas (como IBUS-SAS, SUS-CD), un grosor de la pared intestinal (Bowel Wall Thickness, BWT) estrictamente mayor a 3.0 mm se clasifica como el umbral universal de inflamación activa en íleon terminal y colon.<br><br>Perla ENARM: \"En el ultrasonido intestinal, un grosor de la pared intestinal (BWT) ≤3 mm se clasifica como normal, mientras que un grosor >3 mm indica actividad inflamatoria de la enfermedad.\"<br><br>Análisis de Distractores: Medidas mayores a 5.0 mm o 7.5 mm (opciones C y D) ya representan estenosis francas, edema severo o inflamación hiperaguda penetrante, pero el punto de corte diagnóstico base se establece en 3.0 mm. La opción A (1.5 mm) corresponde al grosor fisiológico normal de un intestino sano en distensión.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Intestinal ultrasound indices, Página 224."
    },
    {
        id: 49,
        question: "¿Cuál de las siguientes vacunas se recomienda administrar de forma estandarizada a todos los pacientes adultos con enfermedad inflamatoria intestinal al cumplir 50 años, o desde los 18 años si van a iniciar terapia con inhibidores JAK?",
        options: ["Vacuna recombinante inactiva contra herpes zóster", "Vacuna atenuada de virus vivos contra varicela", "Vacuna conjugada heptavalente contra neumococo", "Vacuna de subunidades contra rotavirus"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025 (y Prevención ACG 2025), el uso de inmunomoduladores y biológicos altera el control de infecciones latentes. Particularmente, los inhibidores de la Janus cinasa (JAK) confieren un riesgo altísimo e independiente de reactivación del virus varicela-zóster. La vacuna recombinante Shingrix (no viva) ha demostrado gran seguridad y es mandataria.<br><br>Perla ENARM: \"La vacunación con zóster recombinante (Shingrix) debe considerarse en todos los pacientes ≥50 años que reciben inmunomoduladores o terapias avanzadas, y en pacientes ≥18 años que inician inhibidores de JAK.\"<br><br>Análisis de Distractores: La vacuna viva contra varicela (opción B) y el rotavirus vivo (opción D) están absolutamente contraindicados en pacientes bajo inmunosupresión activa debido al riesgo de infección diseminada vacunal. El neumococo (opción C) se indica en esquema universal (idealmente PCV20), pero la recomendación imperativa asociada específicamente a edad (50 años) y uso de anti-JAKs es exclusiva para la prevención de herpes zóster.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Specific Vaccinations, Página 186."
    },
    {
        id: 50,
        question: "Para prevenir la preeclampsia pretérmino, una complicación endotelial con mayor incidencia en mujeres embarazadas con enfermedad inflamatoria intestinal, ¿qué intervención profiláctica recomiendan las directrices mundiales implementar entre la semana 12 y 16 de gestación?",
        options: ["Suplementación de ácido fólico a 5 mg/día", "Inicio de ácido acetilsalicílico a dosis bajas", "Administración de heparina de bajo peso molecular", "Terapia de mantenimiento con sulfasalazina oral"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Consenso mundial embarazo en EII 2025, los estados inflamatorios crónicos como la EII condicionan un ambiente pro-trombótico y disfunción placentaria, elevando los desenlaces adversos como la preeclampsia. Las guías recomiendan estratificar a estas pacientes como de alto riesgo obstétrico y el uso de ácido acetilsalicílico a bajas dosis tempranamente (antes de la semana 16) reduce significativamente la morbilidad mediada por la placenta.<br><br>Perla ENARM: \"Sugerimos que las mujeres embarazadas con enfermedad inflamatoria intestinal tomen dosis bajas de aspirina entre las 12 y 16 semanas de gestación para prevenir la preeclampsia pretérmino.\"<br><br>Análisis de Distractores: El ácido fólico a 5 mg/día (opción A) previene defectos del tubo neural, en particular si usan sulfasalazina, pero no previene preeclampsia. La heparina (opción C) está indicada para tromboprofilaxis venosa si están hospitalizadas o durante brote activo profundo. La sulfasalazina (opción D) es una terapia luminal.",
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Management of Pregnancy, Página 8."
    },
    {
        id: 51,
        question: "En un paciente posoperado de proctocolectomía total con anastomosis ileoanal con reservorio por colitis (IBD inespecífica / CU) que desarrolla síntomas de inflamación pélvica crónica, ¿qué abordaje inicial está indicado por las guías para diagnosticar y diferenciar \"pouchitis\" aguda de una patología de Crohn de novo del reservorio?",
        options: ["Tomografía por emisión de positrones, coprocultivo y tránsito intestinal", "Resonancia magnética pélvica, ensayo de Clostridioides y endoscopia del reservorio", "Calprotectina sérica, ultrasonido endorrectal y manometría anorrectal", "Radiografía simple abdominal, perfil de hierro y biopsia de mucosa anal"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, ante disfunción del \"pouch\" (bolsitis/pouchitis), se debe descartar obligatoriamente causas infecciosas intraluminales (como toxinas de C. difficile), descartar o confirmar complicaciones extraluminales ocultas (como sepsis pélvica, abscesos o fístulas, altamente sugestivas de fenotipo Crohn mediante RM pélvica) y confirmar inflamación mucosa con la pouchoscopia y biopsias de la zona de transición.<br><br>Perla ENARM: \"Los pacientes con síntomas continuos posteriores a la cirugía de reservorio deben someterse a una resonancia magnética pélvica, cultivo de heces y ensayo de Clostridioides difficile, además de una pouchoscopia para evaluar el reservorio y el íleon pre-reservorio.\"<br><br>Análisis de Distractores: Evaluar el reservorio a ciegas o sin descartar complicaciones pélvicas profundas (opciones A, C y D) puede conducir a falla terapéutica e ignorar una fístula o absceso presacro agudo que requeriría drenaje quirúrgico antes del inicio de biológicos. La manometría (opción C) evalúa función esfinteriana, no causa inflamatoria.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Pouchitis, Página 154."
    },
    {
        id: 52,
        question: "En pacientes con enfermedad de Crohn sometidos a resección quirúrgica que presentan un patrón de bajo riesgo para recurrencia (ej. edad >50 años al diagnóstico, no fumador, primera cirugía en segmento corto), ¿cuál es la conducta terapéutica recomendada de primera línea en el posoperatorio inmediato?",
        options: ["Iniciar profilaxis profiláctica con biológicos top-down", "Prescribir mesalazina oral o derivados 5-ASA a dosis altas", "Administrar tiopurinas como monoterapia continua", "Mantener observación clínica y realizar ileocolonoscopia a los 6 meses"],
        answer: 3,
        justification: "Justificación: De acuerdo al documento Guía ACG 2025 (y Consenso Quirúrgico ECCO 2024), exponer a un paciente de \"bajo riesgo\" a toxicidad de inmunosupresores o biológicos sin evidencia de lesión mucosa es injustificado, dado que un porcentaje permanecerá en remisión clínica asintomática por años. Se prescribe la observación sin medicamentos de mantenimiento y endoscopia a los 6 meses (Score de Rutgeerts) para redirigir la terapia en caso de que existan lesiones tempranas.<br><br>Perla ENARM: \"En pacientes con enfermedad de Crohn con bajo riesgo de recurrencia de la enfermedad posoperatoria, sugerimos la observación continua sin terapia médica de mantenimiento inmediato, priorizando la evaluación endoscópica a los 6 a 12 meses.\"<br><br>Análisis de Distractores: Tanto los biológicos preventivos como las tiopurinas (opciones A y C) están estrictamente indicados en el posoperatorio de pacientes con perfil de ALTO riesgo (fumadores empedernidos, cirugías repetidas, variante penetrante). Los aminosalicilatos (opción B) son fútiles para mantener la remisión o prevenir recurrencia.",
        source: "Guía clínica del ACG, Manejo de la enfermedad de Crohn en adultos, 2025, Postoperative CD, Página 260."
    },
    {
        id: 53,
        question: "Para los pacientes adultos con enfermedad inflamatoria intestinal que inician terapia de mantenimiento inmunomoduladora con tiopurinas, ¿cuál es el esquema de monitorización paraclínica obligatoria para vigilar complicaciones mielosupresoras durante los primeros 3 meses?",
        options: ["Biometría hemática y pruebas de función hepática a las semanas 2, 4, 8 y 12", "Calprotectina fecal y proteína C reactiva mensuales por 3 meses", "Niveles séricos de 6-tioguanina y creatinina cada 14 días por 6 meses", "Genotipificación seriada de TPMT cada 4 semanas"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025 (Drug monitoring), la azatioprina y la mercaptopurina conllevan riesgos graves tempranos de leucopenia progresiva, pancitopenia severa y hepatotoxicidad idiosincrásica o dosis-dependiente, de tal forma que las normativas estandarizadas de seguridad clínica exigen revisar la biometría hemática (FBC) y panel hepático (LFT) de manera estrecha a las 2, 4, 8 y 12 semanas tras el inicio, y posteriormente cada 3 meses.<br><br>Perla ENARM: \"Sugerimos monitorizar la biometría hemática completa, electrolitos y pruebas de función hepática a las semanas 2, 4, 8 y 12 posteriores al inicio de tiopurinas y luego, al menos, trimestralmente para detectar mielotoxicidad y hepatotoxicidad.\"<br><br>Análisis de Distractores: La calprotectina (opción B) monitoriza la actividad de la enfermedad mucosa, no la toxicidad hematológica hepática de un fármaco. Los niveles de 6-tioguanina (opción C) son valiosos anualmente o si hay recaída/intolerancia para optimizar dosis. El genotipo de TPMT (opción D) es genético de base, no muta con el tiempo, se realiza una única vez antes del inicio de la droga.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Table 10 Drug monitoring, Página 185."
    },
    {
        id: 54,
        question: "¿Cuál es el umbral estandarizado en el Índice de Actividad de la Enfermedad de Crohn (CDAI) que define clínicamente la ausencia de inflamación sistémica o \"remisión clínica\" en la atención de adultos?",
        options: ["<50", "<100", "<150", "<220"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, el índice validado histórico y más utilizado en ensayos para medir el control del padecimiento es el CDAI. La barrera clínica universal que indica inactividad clínica asintomática satisfactoria frente a exacerbación se ubica por debajo de 150 puntos. Valores por encima de 450 representan enfermedad severamente activa.<br><br>Perla ENARM: \"La remisión clínica en la enfermedad de Crohn se define por una puntuación en el Índice de Actividad de la Enfermedad de Crohn (CDAI) menor a 150 puntos.\"<br><br>Análisis de Distractores: Puntuaciones entre 150-219 corresponden a enfermedad levemente activa, y 220-450 a moderadamente activa. Un punto de corte de <50 (opción A) o <100 (opción B) no es una división clínica formal del algoritmo de CDAI.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Table 5 Crohn’s disease activity index, Página 160."
    },
    {
        id: 55,
        question: "En pacientes con enfermedad de Crohn, la terapia biológica altamente eficaz con el anticuerpo Ustekinumab ejerce su efecto antiinflamatorio y de curación mucosa profunda interrumpiendo directamente ¿cuál de las siguientes vías de señalización inmunológica?",
        options: ["Integrina alfa-4 beta-7 (α4β7) en el endotelio", "Subunidad p40 compartida de las interleucinas 12 y 23", "Vía intracelular de la Janus cinasa 1 y 3 (JAK)", "Factor de necrosis tumoral alfa en macrófagos y linfocitos"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024 / ECCO Médico 2024 (conocimiento cruzado de ensayos de mantenimiento), Ustekinumab es un anticuerpo monoclonal IgG1 kappa totalmente humano que bloquea la subunidad proteica p40, la cual es común a las citoquinas proinflamatorias interleucina-12 e interleucina-23. Esta neutralización suprime la diferenciación de células TH1 y TH17 en la lámina propia mucosa, deteniendo el brote inflamatorio.<br><br>Perla ENARM: \"Ustekinumab, un anticuerpo dirigido a la subunidad p40 de la IL-12/23, es recomendado como terapia de inducción y mantenimiento en enfermedad de Crohn moderada a severa.\"<br><br>Análisis de Distractores: El bloqueo de la integrina alfa-4 beta-7 (opción A) corresponde a Vedolizumab. Los inhibidores intracelulares (opción C) corresponden a las pequeñas moléculas Tofacitinib o Upadacitinib. La opción D denota el mecanismo de Infliximab y Adalimumab. Risankizumab y Mirikizumab, por otro lado, bloquean específicamente la subunidad p19 de la IL-23, siendo fármacos distintos a Ustekinumab.",
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento médico, 2024, IL-12/IL-23 inhibitors, Página 1538."
    },
    {
        id: 56,
        question: "Con base en los consensos dietéticos de vanguardia para la inflamación intestinal, ¿cuál patrón nutricional de moda metabólica carece de evidencia suficiente para ser recomendado como monoterapia de inducción de remisión en la enfermedad de Crohn activa?",
        options: ["Nutrición enteral exclusiva", "Fórmulas oligopeptídicas (semi-elementales)", "Dieta mediterránea", "Fórmulas enterales poliméricas orales"],

        justification: "Justificación: De acuerdo al documento Consenso Dietético ECCO 2025, si bien la dieta mediterránea tiene beneficios probados en síndrome metabólico, longevidad y quizás ayude en la Colitis Ulcerativa como adyuvante para mantenimiento, las guías internacionales son claras en que \"no existe evidencia suficiente\" para recomendarla para intentar apagar un brote activo de enfermedad de Crohn como terapia de inducción clínica y endoscópica.<br><br>Perla ENARM: \"No hay evidencia suficiente para recomendar la dieta mediterránea como terapia de inducción para la remisión de la enfermedad de Crohn o la colitis ulcerativa.\"<br><br>Análisis de Distractores: La Nutrición Enteral Exclusiva (opción A) mediante el uso temporal pero total de fórmulas poliméricas (opción D) o semi-elementales (opción B) tiene un nivel de evidencia sólido como la primera línea no farmacológica altamente eficaz para la inducción de la remisión clínica y curación mucosa, predominantemente en enfermedad pediátrica y en adultos para optimización preoperatoria.",
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, The Mediterranean diet, Página 5."
    },
    {
        id: 57,
        question: "De acuerdo con los registros de neonatología mundial sobre lactancia y biológicos en enfermedad inflamatoria intestinal, ¿cuál es el impacto primario documentado de la lactancia materna exclusiva sobre la historia natural de la enfermedad materna en el periodo posparto?",
        options: ["Aumenta dramáticamente el riesgo de brote inflamatorio agudo a las 4 semanas", "Modifica la farmacocinética acelerando la eliminación de los anticuerpos biológicos", "No está asociada de ninguna manera con un aumento del riesgo de exacerbación de la enfermedad", "Exige incrementar preventivamente las dosis de corticosteroides sistémicos posparto"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Consenso mundial embarazo en EII 2025, la lactancia natural proporciona ventajas inmensas sobre el desarrollo del microbioma neonatal e inmunidad temprana (limitando la incidencia de EII futura en la descendencia) y es categóricamente segura para la madre sin que la deprivación nutricional o los picos de prolactina / oxitocina provoquen recaídas inmunológicas sistémicas.<br><br>Perla ENARM: \"Recomendamos la lactancia materna ya que NO está asociada con un mayor riesgo de exacerbación clínica de la enfermedad inflamatoria intestinal en la madre.\"<br><br>Análisis de Distractores: Las opciones A y D disuaden de un acto natural e implican toxicidad y agravamiento clínico iatrogénico materno por un fenómeno fisiológico, algo que estudios como PIANO han refutado por completo. Múltiples biológicos pasan en minúsculas concentraciones por la leche, pero su metabolismo gástrico en el recién nacido inactiva los compuestos impidiendo inmunosupresión sistémica perjudicial (opción B es irrelevante fisiológicamente para la madre).",
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Use of IBD Medications During Lactation, Página 11."
    },
    {
        id: 58,
        question: "En el abordaje integral sobre planeación familiar, ¿cuál es la razón fisiopatológica principal por la cual las tasas globales de fertilidad pueden verse significativamente mermadas en mujeres portadoras de enfermedad de Crohn comparadas con la población sin la enfermedad?",
        options: ["Destrucción folicular progresiva y directa causada a largo plazo por el uso de biológicos (anti-TNF)", "Inflamación activa pélvica extensa en ovarios, reducción de la reserva ovárica y cirugías previas en pelvis", "Alteración endometrial inducida únicamente por niveles valle tóxicos del ácido 5-aminosalicílico", "Falta de respuesta neuroendocrina hipotalámica-pituitaria por fatiga adrenal asintomática crónica"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Consenso mundial embarazo en EII 2025, las mujeres con enfermedad de Crohn que logran remisión temprana con terapia médica tienen índices de fertilidad equiparables al público general. Sin embargo, en cohortes de pacientes, la fertilidad global decae debido a factores anatómicos (adherencias y cicatrices posquirúrgicas que distorsionan las trompas, o inflamación activa transmural no controlada) y biológicos (reducción de la hormona antimülleriana e impacto en la reserva ovárica).<br><br>Perla ENARM: \"Se debe orientar a que las mujeres con enfermedad inflamatoria intestinal pueden experimentar una reducción en la fertilidad comparada con mujeres sin la enfermedad, atribuido a cirugías previas e inflamación activa que impacta en la reserva ovárica.\"<br><br>Análisis de Distractores: La medicación biológica anti-TNF y aminosalicilatos (opciones A y C) no causan atrofia folicular permanente ni alteran adversamente el estroma uterino, siendo seguras y deseables. Los tratamientos reproductivos como fertilización in vitro (recuperación de ovocitos) no están contraindicados y no aumentan el riesgo de exacerbación.",
        source: "Declaración de consenso mundial sobre el tratamiento del embarazo en la enfermedad inflamatoria intestinal, 2025, Fertility Consensus Statements, Página 3."
    },
    {
        id: 59,
        question: "En un paciente adulto con enfermedad inflamatoria intestinal en aparente remisión asintomática que recibe tratamiento estable, se utiliza la monitorización con calprotectina fecal para vigilar inflamación subclínica. ¿A partir de qué límite general estratificado (marcador de alerta) se correlaciona con una baja probabilidad de mantener remisión endoscópica, exigiendo reevaluación estructural?",
        options: [">40 µg/g", ">100 µg/g", ">150 µg/g", ">250 µg/g"],
        answer: 3,
        justification: "Justificación: De acuerdo al documento Biomarcadores fecales 2024 / Guía BSG 2025, en la vigilancia del mantenimiento, los valores oscilantes <100 µg/g confirman curación de la mucosa y remisión; valores entre 100-200 obligan a repetir pruebas seriadas; pero la elevación confirmada sostenida superior a 250 µg/g es el umbral que descarta un evento reactivo leve y exige proceder imperativamente a evaluación endoscópica con escalamiento inminente de la terapia para detener la recaída clínica posterior.<br><br>Perla ENARM: \"En el mantenimiento asintomático, una calprotectina fecal con elevación sostenida por encima de 250 µg/g tiene baja probabilidad de presentar remisión endoscópica subyacente y debe desencadenar optimización de tratamiento o ileocolonoscopia.\"<br><br>Análisis de Distractores: Un valor <40 µg/g (opción A) excluye patología inflamatoria versus funcional de inicio. Un valor alrededor de 100-150 µg/g (opciones B y C) es un área gris \"intermedia\", que en muchos ensayos predice bien respuesta clínica temprana, pero el salto formal inminente a daño estructural reactivado profundo que exige intervenir con imagen y cambio de biológicos está estratificado firmemente >250.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Interpretation of calprotectin, Página 159."
    },
    {
        id: 60,
        question: "Las complicaciones carenciales son críticas tras la afección ileal extensa en la enfermedad de Crohn. ¿Cuál de las siguientes modalidades de terapia de reposición de hierro es la de elección recomendada explícitamente en el paciente que cursa con inflamación intestinal activa y anemia ferropénica concomitante?",
        options: ["Fumarato ferroso de liberación prolongada vía oral", "Reposición mediante hierro intravenoso sistémico", "Eritropoyetina humana recombinante subcutánea profiláctica", "Sulfato ferroso disuelto en tomas tres veces al día"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR (ECCO EIM / Nutritional 2025), la biodisponibilidad y absorción del hierro oral se encuentran completamente abolidas debido a la elevación de la hepcidina durante la inflamación activa en enfermedad de Crohn. Asimismo, el hierro oral en el lumen agrava el estrés oxidativo intestinal y altera la microbiota, induciendo disbiosis y exacerbación de la diarrea, haciendo de la formulación intravenosa el estándar seguro y de acción rápida.<br><br>Perla ENARM: \"Para los pacientes con enfermedad inflamatoria intestinal crónicamente activa que presentan anemia ferropénica documentada o intolerancia a la vía oral, la administración de hierro intravenoso es el tratamiento de primera línea.\"<br><br>Análisis de Distractores: Las sales orales de sulfato y fumarato ferroso (opciones A y D) están proscritas en la fase inflamatoria aguda grave y en intolerancia severa. La eritropoyetina (opción C) no repone las reservas tisulares vacías y solo se requiere secundariamente ante falla de resíntesis con hierro adecuado en presencia de anemia de enfermedad crónica subyacente profunda con bajo recuento de reticulocitos.",
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, Micronutrient Deficiencies, Página 53."
    },
    {
        id: 61,
        question: "¿Cuál es el factor dietético documentado en grandes estudios de cohorte prospectivos que incrementa significativamente el riesgo preclínico de desarrollar enfermedad de Crohn?",
        options: ["Consumo de alimentos ultraprocesados", "Dieta alta en grasas poliinsaturadas", "Consumo exclusivo de carbohidratos", "Ingesta de fibras insolubles vegetales"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Consenso Dietético ECCO 2025, la exposición a dietas de patrón occidental está fuertemente ligada a la patogénesis de la enfermedad. Múltiples metaanálisis han revelado que los alimentos clasificados como ultraprocesados (UPF según la escala NOVA) alteran el microbioma y comprometen la barrera intestinal mucínica, incrementando la incidencia de enfermedad de Crohn y colitis ulcerativa.<br><br>Perla ENARM: \"Los patrones de alimentación saludables se asocian con un menor riesgo de enfermedad inflamatoria intestinal, mientras que el alto consumo de alimentos ultraprocesados y bebidas azucaradas incrementa significativamente el riesgo de desarrollo.\"<br><br>Análisis de Distractores: Las dietas altas en poliinsaturados (opción B), como el aceite de oliva, reducen el riesgo por sus propiedades cardioprotectoras. El consumo de fibras insolubles y solubles (opciones C y D) presentes en frutas, verduras y legumbres está robustamente asociado a una disminución en la incidencia de la enfermedad, no a un incremento.",
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, Diet as prevention of IBD development, Página 32."
    },
    {
        id: 62,
        question: "En el manejo de fístulas perianales complejas por enfermedad de Crohn, ¿qué tipo de terapia celular autóloga sugiere el consenso quirúrgico para promover la cicatrización tisular?",
        options: ["Fracción vascular estromal celular", "Células madre derivadas del tejido adiposo", "Factores derivados de plaquetas recombinantes", "Células progenitoras hematopoyéticas circulantes"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, la inyección local de células madre mesenquimales tiene potentes efectos inmunomoduladores y cicatrizantes en los trayectos fistulosos. Las células madre autólogas derivadas del tejido adiposo (ASC) presentan la ventaja de ser fácilmente obtenibles del propio paciente, disminuyendo costos e inmunogenicidad en comparación a terapias alogénicas, y pueden combinarse con fibrina o matrices disolvibles.<br><br>Perla ENARM: \"Sugerimos que las células madre autólogas derivadas de tejido adiposo pueden ser utilizadas como una opción de tratamiento en la enfermedad de Crohn perianal compleja.\"<br><br>Análisis de Distractores: La fracción vascular estromal (opción A) y los factores derivados de plaquetas (opción C) carecen actualmente de evidencia suficiente (Nivel 5) para ser recomendados sistemáticamente. Las células hematopoyéticas periféricas (opción D) se utilizan en trasplantes para leucemias o esclerosis, no en enfermedad fistulizante anal.",
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Local treatment options, Página 1560."
    },
    {
        id: 63,
        question: "En pacientes con enfermedad de Crohn que presentan una fístula perianal compleja de trayecto único y epitelizado, en ausencia de proctitis, ¿cuál es la técnica anatómica recomendada que evita la manipulación y corte de la mucosa rectal enferma?",
        options: ["Fistulectomía amplia con esfinterotomía", "Colgajo de avance endorrectal", "Ligadura del trayecto interesfintérico", "Sellador biológico de fibrina sintética"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, la técnica LIFT (Ligation of the Intersphincteric Fistula Tract) busca el cierre abordando quirúrgicamente el espacio interesfintérico para ligar y seccionar el trayecto cerca de su orificio primario. Su ventaja teórica fundamental en pacientes con Crohn frente al colgajo de avance es que el cirujano no necesita movilizar ni suturar tejido mucoso, lo cual es crítico en un ambiente con inflamación subyacente.<br><br>Perla ENARM: \"Recomendamos la ligadura del trayecto fistuloso interesfintérico como una opción de tratamiento para pacientes seleccionados con enfermedad de Crohn y fístulas perianales complejas.\"<br><br>Análisis de Distractores: El colgajo de avance (opción B) sí moviliza y sutura directamente la mucosa rectal. La fistulectomía con esfinterotomía (opción A) es mutilante, causa incontinencia irreversible y úlceras crónicas en el fenotipo Crohn. El sellador de fibrina (opción D) no es una técnica de ligadura y está formalmente desaconsejado por altísimas tasas de expulsión y recaída.",
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, LIFT procedure, Página 1560."
    },
    {
        id: 64,
        question: "Durante la resección quirúrgica ileocólica por enfermedad de Crohn estenosante, ¿cuál es la técnica de anastomosis convencional que se sugiere utilizar para minimizar complicaciones oclusivas mecánicas y favorecer el flujo?",
        options: ["Anastomosis mecánica latero-lateral", "Anastomosis manual término-terminal", "Anastomosis mecánica término-lateral", "Anastomosis manual invaginante seromuscular"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, dentro de las configuraciones anatómicas clásicas que no son de exclusión mesentérica pura (como Kono-S), el consenso quirúrgico apoya abrumadoramente la confección de una anastomosis mecánica latero-lateral [side-to-side] con engrapadora lineal. Esta técnica garantiza un estoma amplio que retrasa el impacto mecánico de la fibrosis recurrente temprana, superando a las reconstrucciones colineales estrechas.<br><br>Perla ENARM: \"Sugerimos la realización de anastomosis mecánicas latero-laterales en las resecciones de intestino delgado o ileocólicas por enfermedad de Crohn.\"<br><br>Análisis de Distractores: Las anastomosis término-terminales manuales convencionales (opción B) y término-laterales (opción C) presentan tasas de reestenosis fibrótica sintomática más tempranas debido al diámetro reducido de la unión. La invaginación (opción D) no es una práctica vascular anatómica estandarizada en EII por riesgo de isquemia de los bordes.",
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Surgical techniques, Página 1570."
    },
    {
        id: 65,
        question: "¿Cuál es la periodicidad requerida para la medición de calprotectina fecal con el objetivo de monitorizar objetivamente la actividad inflamatoria intestinal en una paciente embarazada con enfermedad de Crohn?",
        options: ["Cada 4 semanas exactas", "Exclusivamente en el primer trimestre", "Cada trimestre de la gestación", "Únicamente durante el puerperio"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 2 2025, el embarazo altera de forma natural biomarcadores séricos como la proteína C reactiva (la cual puede elevarse fisiológicamente) y la hemoglobina, disminuyendo su valor predictivo. La calprotectina fecal se mantiene estable y altamente sensible a la inflamación mucosa, dictando la normativa internacional su medición mandatoria en cada uno de los tres trimestres para prevenir brotes agudos intrauterinos.<br><br>Perla ENARM: \"Recomendamos la realización de pruebas de calprotectina fecal cada trimestre para monitorizar la actividad de la enfermedad en mujeres embarazadas con enfermedad inflamatoria intestinal.\"<br><br>Análisis de Distractores: Monitorear exclusivamente al principio o final del embarazo (opciones B y D) omite la ventana de mayor transferencia biológica y riesgo de parto pretérmino en el segundo y tercer trimestre. Realizarlo mensualmente (opción A) sobreutiliza recursos y aumenta la ansiedad materna sin cambiar directrices terapéuticas a menos que exista sintomatología de alarma intercurrente.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Specific Situations, Página 223."
    },
    {
        id: 66,
        question: "Ante la sospecha clínica de un brote severo intraabdominal de enfermedad de Crohn en una mujer cursando la semana 22 de embarazo, ¿cuáles son las dos modalidades estructurales de primera línea recomendadas para descartar complicaciones penetrantes sin inducir riesgo teratogénico?",
        options: ["Tomografía computarizada y tránsito intestinal", "Ileocolonoscopia total con sedación profunda", "Ultrasonido intestinal o enteroresonancia sin gadolinio", "Radiografía abdominal y ecografía endoscópica"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 2 2025, frente a síntomas de alarma en la gestación, es imprescindible evaluar la pared intestinal descartando estenosis o abscesos. El ultrasonido intestinal a pie de cama y la enteroresonancia magnética brindan exquisita resolución transmural sin radiación ionizante. Debe omitirse el contraste intravenoso de gadolinio por su capacidad de atravesar la barrera placentaria y sus efectos biológicos deletéreos en el feto.<br><br>Perla ENARM: \"En mujeres embarazadas con características de enfermedad inflamatoria intestinal activa, sugerimos el ultrasonido intestinal o la enteroresonancia magnética [sin el uso de gadolinio] para evaluar el intestino, evitando la exposición fetal.\"<br><br>Análisis de Distractores: La enterotomografía y radiografías (opciones A y D) exponen al feto a radiación ionizante inaceptable durante el segundo trimestre. La ileocolonoscopia total (opción B) se reserva estrictamente para confirmación de displasia o hemorragia masiva, ya que la sedación profunda y la insuflación incrementan el estrés hemodinámico uteroplacentario.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Imaging in specific situations, Página 223."
    },
    {
        id: 67,
        question: "Un paciente masculino acude por primera vez presentando dolor pélvico, induración y múltiples fístulas perianales supurativas. Para descartar una etiología primaria atribuible a enfermedad de Crohn, ¿qué evaluación anatómica es mandatoria realizar de forma protocolaria?",
        options: ["Ileocolonoscopia y evaluación de intestino delgado", "Ultrasonido endoanal y coprocultivo seriado", "Manometría anorrectal y electromiografía pélvica", "Tomografía pélvica y marcadores tumorales"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 1 2025, hasta en un 10% de los casos, la enfermedad de Crohn se manifiesta primaria y exclusivamente como un fenotipo perianal fistulizante agresivo antes del inicio de la diarrea o el dolor abdominal. Ante fístulas atípicas, múltiples o recurrentes, es obligatorio buscar lesiones aftosas ocultas en el resto del tracto gastrointestinal (íleon y colon) para confirmar el diagnóstico y clasificar el comportamiento en la escala Montreal.<br><br>Perla ENARM: \"Los pacientes que se presentan con fístulas perianales aisladas deben someterse a ileocolonoscopia e imagen de intestino delgado si tienen características clínicas o de la fístula sugestivas de enfermedad de Crohn.\"<br><br>Análisis de Distractores: Aunque el ultrasonido endoanal y la tomografía pélvica (opciones B y D) mapean la anatomía de los esfínteres y la cavidad del absceso local, son estudios puramente topográficos pélvicos. No logran escrutar la inflamación de la mucosa luminal colónica o del íleon terminal necesaria para dictaminar que la etiología es Crohn y no criptoglandular convencional.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 1, 2025, Recommendation 4, Página 218."
    },
    {
        id: 68,
        question: "En pacientes con afectación exclusiva y aislada de un solo segmento colónico por enfermedad de Crohn fibrótica refractaria (ej. 15 cm de colon transverso), ¿cuál es el abordaje quirúrgico sugerido para preservar la mayor longitud intestinal y función posible?",
        options: ["Proctocolectomía total con reservorio ileoanal", "Colectomía subtotal con ileorrectoanastomosis", "Colectomía segmentaria de la zona afectada", "Estenoplastias múltiples de colon transverso"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, las estrategias resectivas de preservación de órgano son el dogma central en la enfermedad de Crohn debido a la naturaleza reincidente del padecimiento. Los metaanálisis revelan que en lesiones focales colónicas únicas, la resección segmentaria ofrece una calidad de vida superior, preserva la continencia de agua, mantiene el esfínter indemne y no presenta tasas de recurrencia clínica significativamente mayores a largo plazo comparado con procedimientos radicales.<br><br>Perla ENARM: \"Sugerimos la colectomía segmentaria en casos seleccionados de enfermedad de Crohn colónica cuando un único segmento del colon se encuentra afectado, preservando la función intestinal global.\"<br><br>Análisis de Distractores: Las colectomías extensas o subtotales (opciones A y B) son innecesariamente mutilantes para un solo segmento, reservándose para pancolitis, displasia difusa o enfermedad fulminante. Las estenoplastias (opción D) están absolutamente contraindicadas en cualquier porción del colon debido al riesgo de microperforación por la carga bacteriana masiva y al potencial inadvertido de cáncer colorrectal.",
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Colonic CD, Página 1572."
    },
    {
        id: 69,
        question: "¿Cuál es el régimen de preparación intestinal fisiológicamente recomendado y superior en eficacia para optimizar la visualización de la mucosa durante la ileocolonoscopia en pacientes con enfermedad inflamatoria intestinal?",
        options: ["Dosis única masiva de fosfato de sodio", "Dosis dividida de polietilenglicol", "Agentes osmóticos líquidos a base de lactulosa", "Enemas de retención con solución fisiológica"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 2 2025, el diagnóstico visual fino y la cromoendoscopia exigen una puntuación perfecta en la escala de Boston. La administración dividida (split-dose) de soluciones isosmóticas macrogoles de alto peso molecular (Polietilenglicol) optimiza la limpieza del colon derecho y reduce la intolerancia gástrica, siendo el estándar normativo.<br><br>Perla ENARM: \"Para la realización de colonoscopia en pacientes con enfermedad inflamatoria intestinal, sugerimos utilizar una preparación intestinal con un agente a base de polietilenglicol administrado en dosis dividida.\"<br><br>Análisis de Distractores: El uso de preparaciones con fosfato de sodio (opción A) se proscribe severamente en pacientes con riesgo o antecedente de inflamación intestinal, debido a que inducen isquemia focal y úlceras aftosas yatrogénicas idénticas a las del Crohn. La lactulosa (opción C) genera gas metano explosivo limitando el uso de electrocauterio. Los enemas (opción D) solo preparan rectosigmoides.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Bowel preparation, Página 224."
    },
    {
        id: 70,
        question: "Previo al inicio de la terapia biológica integrínica de rescate sistémico con Natalizumab, ¿qué medición serológica debe ser obligatoriamente tamizada debido a su asociación causal inminente con el desarrollo de leucoencefalopatía multifocal progresiva?",
        options: ["Anticuerpos contra Saccharomyces cerevisiae", "Anticuerpos citoplasmáticos antineutrófilo", "Anticuerpos contra virus John Cunningham", "Anticuerpos contra virus de Epstein-Barr"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía Clínica del ACG 2025, el natalizumab bloquea el tráfico de linfocitos cruzando la barrera hematoencefálica. Si un paciente es portador del virus John Cunningham (JC), este aislamiento inmunológico cerebral permite la reactivación viral agresiva resultando en leucoencefalopatía multifocal progresiva (PML), un cuadro desmielinizante neurodegenerativo y frecuentemente letal. Las guías urgen medir los anticuerpos anti-virus JC basalmente y cada 6 meses.<br><br>Perla ENARM: \"El tratamiento con natalizumab se debe limitar estrictamente a aquellos pacientes que no son seropositivos para anticuerpos contra el virus JC, lo cual debe comprobarse antes de iniciar la terapia y posteriormente como mínimo cada 6 meses.\"<br><br>Análisis de Distractores: Los virus EBV (opción D) desencadenan linfoma con tiopurinas, pero no causan encefalopatía PML. Los marcadores ASCA y pANCA (opciones A y B) son perfiles serológicos para subtipificar Colitis Ulcerativa y enfermedad de Crohn de forma teórica de laboratorio, careciendo de relación fisiopatológica con el tráfico leucocitario cerebral y PML.",
        source: "Guía clínica del ACG, Manejo de la enfermedad de Crohn en adultos, 2025, Inhibitors of leukocyte trafficking, Página 261."
    },
    {
        id: 71,
        question: "De acuerdo con los consensos europeos sobre intervención quirúrgica de rescate, ¿para cuál de las siguientes terapias de reciente aprobación existe nivel de evidencia aún insuficiente, impidiendo recomendar formalmente su uso específico en el cierre primario de fístulas perianales complejas?",
        options: ["Infliximab por vía intravenosa en esquema intensificado", "Colocación perianal de setones no cortantes de drenaje", "Colgajo quirúrgico de avance endorrectal sin proctitis", "Inhibidores selectivos de la Janus cinasa (Upadacitinib)"],
        answer: 3,
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, aunque Upadacitinib es una pequeña molécula extraordinariamente eficaz para inducir remisión en afección luminal y cerrar úlceras mucosas profundas, la cohorte prospectiva actual carece del poder estadístico robusto necesario en puntos finales estructurales para fístulas complejas destructivas. La evidencia actual es nivel 4 y las guías advierten explícitamente en contra de su indicación como terapia primaria biológica curativa en este fenotipo penetrante inferior.<br><br>Perla ENARM: \"Existe evidencia insuficiente en la actualidad para recomendar el uso de upadacitinib para el tratamiento de las fístulas perianales complejas en la enfermedad de Crohn.\"<br><br>Análisis de Distractores: Infliximab (opción A) es el estándar médico de oro con el Nivel de Evidencia más sólido, prospectivo (estudios ACCENT) para consolidar cierre en enfermedad fistulizante perianal. Los setones no cortantes y el colgajo de avance (opciones B y C) son los pilares quirúrgicos universalmente mandatorios y recomendados.",
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Statement 3.8, Página 1560."
    },
    {
        id: 72,
        question: "En pediatría y como terapia adjunta, la Dieta de Exclusión de la Enfermedad de Crohn (CDED) suprime factores exógenos inflamatorios. ¿Qué componentes nutricionales específicos prohíbe de forma estructurada argumentando que deterioran la permeabilidad de la barrera intestinal?",
        options: ["Emulsionantes artificiales, carragenina y maltodextrina", "Triglicéridos de cadena media y folato exógeno", "Fibra soluble acuosa y polisacáridos no amiláceos", "Ácidos grasos omega-3 naturales y fitoesteroles"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Consenso Dietético ECCO 2025, el razonamiento mecanístico de la dieta CDED postula que ciertos componentes omnipresentes en alimentos empaquetados modernos (como los polímeros emulsionantes, polisorbato-80, espesantes de carragenina y edulcorantes artificiales de maltodextrina) degradan el estrato de mucina adherido al colon, exponiendo el epitelio a microbios luminales y fomentando disbiosis e inflamación crónica por penetración bacteriana y disfunción de uniones estrechas.<br><br>Perla ENARM: \"La exclusión estructurada de componentes alimentarios (por ejemplo, emulsionantes, maltodextrina, carragenina, gluten) en combinación con nutrición enteral parcial, limita el deterioro de la función de barrera intestinal y la disbiosis subyacente.\"<br><br>Análisis de Distractores: La fibra soluble y polisacáridos (opción C) favorecen la producción de ácidos grasos de cadena corta (butirato) esenciales para la energía del colonocito, reduciendo inflamación. El Omega-3 y el folato (opciones B y D) exhiben propiedades antinflamatorias protectoras de la mucosa sin generar disrupción arquitectural epitelial.",
        source: "Consenso de la ECCO sobre el manejo dietético de la enfermedad inflamatoria intestinal, 2025, Table 3 Rationale of defined diets, Página 60."
    },
    {
        id: 73,
        question: "En la evaluación endoscópica obligada a los 6 meses posteriores a una resección ileocólica, la puntuación de Rutgeerts estratifica el daño. ¿Qué modificación [i2a / i2b] diferencia explícitamente a las lesiones que conllevan un altísimo riesgo inminente de recidiva y ameritan escalar biológicos?",
        options: ["i2a denota lesiones confinadas a la válvula ileocecal", "i2b identifica estenosis colónicas distales reactivas", "i2a representa úlceras masivas transmurales profundas", "i2b clasifica lesiones extensas en el íleon neoterminal"],
        answer: 3,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 2 2025, el Score original de Rutgeerts agrupaba en \"i2\" todo tipo de úlceras afines, resultando en sobretratamiento de pacientes con daños mecánicos-isquémicos locales. La estratificación divide: i2a son úlceras <5 aftosas confinadas únicamente al anillo anastomótico (bajo riesgo anatómico posquirúrgico reactivo); e i2b involucra lesiones o úlceras extensas propagándose en el íleon neoterminal nativo (proximal a la anastomosis), dictaminando progresión inexorable biológica inflamatoria agresiva de la enfermedad.<br><br>Perla ENARM: \"La puntuación de Rutgeerts modificada incluye i2a para lesiones confinadas a la anastomosis ileocólica e i2b para lesiones más grandes en el íleon neoterminal, el cual aborda la heterogeneidad y el alto riesgo verdadero de la enfermedad.\"<br><br>Análisis de Distractores: Asignar gravedad de la enfermedad recurrente a afección aislada distal (opciones B y A) o afirmar que i2a es el marcador agresivo (opción C) subvierte el principio de gradación topográfica ascendente patológica desde la boca anastomótica hacia el íleon vulnerable.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Endoscopic monitoring after surgery, Página 218."
    },
    {
        id: 74,
        question: "Ante el hallazgo imagenológico de una estenosis colónica densa y oclusiva de novo en un paciente adulto con antecedente de enfermedad de Crohn pancolónica de larga evolución, ¿cuál es el motivo histopatológico principal por el que las guías exigen consideración quirúrgica e impiden dilatación?",
        options: ["Riesgo inminente de perforación libre", "Desarrollo de megacolon tóxico irreversible", "Riesgo elevado de malignidad subyacente", "Falla absoluta de la inmunomodulación luminal"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 1 2025, la inflamación incesante en el colon distal incrementa acumulativamente el daño del ADN y la displasia asociada a EII. A diferencia de las estenosis de intestino delgado proximal que suelen ser fibróticas puras benignas, toda estenosis en colon en pacientes con colitis ulcerativa extensa o Crohn colónico (L2/L3) crónico es biológicamente un adenocarcinoma colorrectal invasivo hasta demostrar lo contrario histológicamente, imposibilitando los intentos de rescate farmacológico o dilatación a ciegas.<br><br>Perla ENARM: \"Sugerimos que las estenosis colónicas sean evaluadas exhaustivamente debido al alto riesgo inminente de malignidad colorrectal, siendo necesaria la discusión de cirugía resectiva en un equipo multidisciplinario.\"<br><br>Análisis de Distractores: Las dilataciones por globo acarrean riesgo de microperforación (opción A) en cualquier sitio, pero el peso conceptual en colon es la neoplasia silente. Un megacolon tóxico (opción B) se asocia a adelgazamiento agudo isquémico de la pared por edema, no a fibrosis crónica restrictiva estenótica. La falla de biológicos (opción D) es una consecuencia tardía y no la catastrophe oncogénica a evitar.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 1, 2025, Stenosing CD, Página 219."
    },
    {
        id: 75,
        question: "Además de la calprotectina fecal, ¿cuál otro biomarcador derivado del citosol de neutrófilos activados posee fuerte nivel de evidencia internacional preanálitica para predecir objetivamente la probabilidad de curación endoscópica e histológica?",
        options: ["Mieloperoxidasa sérica", "Lactoferrina en materia fecal", "Interleucina 8 urinaria", "Proteína C reactiva ultrasensible"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Biomarcadores fecales 2024, la Lactoferrina fecal (FL) es una glicoproteína ligadora de hierro secretada masivamente por neutrófilos reclutados hacia la mucosa intestinal. Presenta niveles muy altos de especificidad (comparable a la calprotectina) para diferenciar EII activa del intestino irritable. Valores descendentes o negativos de lactoferrina pre-dicen de manera robusta el éxito del rescate y la remisión profunda libre de ulceraciones, sirviendo de marcador dinámico no invasivo alternativo.<br><br>Perla ENARM: \"La lactoferrina fecal elevada por encima del punto de corte de normalidad es un marcador fundamental; tras el inicio de agentes biológicos, sus valores basales altos en no respondedores y su descenso acelerado predicen con precisión la remisión clínica, endoscópica e histológica.\"<br><br>Análisis de Distractores: La Mieloperoxidasa (opción A) no se sugiere rutinariamente en clínica por falta de estandarización global de ensayo. La PCR ultrasensible sérica (opción D) es útil a nivel sistémico para brote agudo (refleja IL-6 hepática), pero es menos específica que los marcadores luminales directos (calprotectina/lactoferrina) para predecir curación tisular histológica local de las criptas.",
        source: "Biomarcadores fecales, sanguíneos y urinarios en enfermedades inflamatorias intestinales, 2024, Fecal Lactoferrin, Página 65."
    },
    {
        id: 76,
        question: "En el manejo preparatorio de un paciente con enfermedad de Crohn sometido a resección intestinal programada, ¿qué intervención perioperatoria mandatoria es exigida por guías médicas internacionales si el sujeto ha ingerido prednisona oral ininterrumpida por más de 4 semanas?",
        options: ["Suspender los esteroides 48 horas previas al procedimiento quirúrgico", "Aplicar dosis intravenosas equivalentes de hidrocortisona transoperatoria", "Administrar budesonida de liberación ileal profiláctica de inducción", "Iniciar ciclosporina intravenosa para rescate de suprarrenales"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, todo paciente que haya recibido corticoides exógenos sistémicos por un lapso superior a 4 a 6 semanas padece inevitablemente una supresión del eje hipotálamo-hipófisis-adrenal (HPA). Al dejarse en ayuno prequirúrgico estricto y someterse a la cascada de citoquinas extremas de estrés anestésico, desarrollan una crisis addisoniana letal (hipotensión refractaria aguda) si no se infunde cobertura esteroidea hidrosoluble.<br><br>Perla ENARM: \"Recomendamos que los pacientes con enfermedad inflamatoria intestinal que hayan tomado corticosteroides orales durante más de 4 semanas previas a la cirugía reciban una dosis intravenosa equivalente de hidrocortisona mientras permanecen en ayuno durante el período perioperatorio.\"<br><br>Análisis de Distractores: Suspender abruptamente (opción A) precipita falla suprarrenal masiva. Budesonida (opción C) posee metabolismo de primer paso de 90%, no brinda concentraciones sistémicas periféricas y menos por vía intraluminal. La Ciclosporina (opción D) es terapia celular inmunosupresora para Colitis Ulcerativa, carece de efecto simpaticomimético y corticoide endocrinológico.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, GPS 51, Página 183."
    },
    {
        id: 77,
        question: "Durante una resección quirúrgica ileocólica primaria programada por enfermedad de Crohn, ¿qué estrategia técnica de disección vascular específica es clasificada con evidencia insuficiente por el consenso europeo para ser recomendada rutinariamente como método profiláctico para evitar recurrencias posquirúrgicas?",
        options: ["Anastomosis con configuración término-terminal antimesentérica", "Preservación de la arteria ileocólica proximal a la unión", "Escisión mesentérica extensa de la pieza quirúrgica", "Abordaje laparoscópico mínimamente invasivo pélvico"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía Quirúrgica ECCO 2024, la erradicación del tejido mesentérico engrosado (creeping fat) se teoriza para extirpar un \"sumidero\" de citocinas inflamatorias paracrinas que mantienen el padecimiento vivo adyacente a los bordes sanos. No obstante, las revisiones prospectivas robustas en EII siguen pendientes; actualmente solo hay estudios retrospectivos pequeños no concluyentes. Extirpar masivamente la raíz mesentérica predispone a sangrado yatrogénico y daño nervioso vegetativo irreversible.<br><br>Perla ENARM: \"Actualmente existe evidencia insuficiente en la literatura para recomendar formalmente la realización de escisión mesentérica extensa en la cirugía resectiva por enfermedad de Crohn ileocecal.\"<br><br>Análisis de Distractores: La configuración anastomótica Kono-S (funcional antimesentérica cosida a mano - opción A) sí ha demostrado fuerte eficacia en ensayos aleatorizados como SuPREMe-CD previniendo recurrencias y es sugerida. El abordaje laparoscópico (opción D) reduce complicaciones, hernias y estancias, siendo universalmente recomendado como el abordaje de primera línea ineludible.",
        source: "Directrices de la ECCO sobre la terapéutica en la enfermedad de Crohn. Tratamiento quirúrgico, 2024, Surgical techniques Statement 4.15, Página 1571."
    },
    {
        id: 78,
        question: "En el paradigma de retiro de la terapia avanzada (Treatment Withdrawal), cuando un paciente asintomático desea suspender selectivamente un inhibidor del TNF como Infliximab, ¿cuál umbral de calprotectina fecal basal predice fuertemente de manera independiente una exacerbación inminente tras el cese del fármaco?",
        options: ["≥40 µg/g", "≥100 µg/g", "≥150 µg/g", "≥300 µg/g"],
        answer: 3,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 1 2025, la decisión de suspender un biológico en remisión es un proceso de alto riesgo; más de la mitad de los pacientes reinciden a mediano plazo si mantienen carga silente microscópica de inflamación. La evidencia prospectiva originada en el ensayo STORI de retiro comprobó irrefutablemente que variables preexistentes como una PCR elevada, hemoglobina límite y cifras de calprotectina que igualan o exceden el umbral de los 300 µg/g condenan al paciente de inmediato al resurgimiento del brote catastrófico.<br><br>Perla ENARM: \"En el estudio prospectivo STORI, los niveles de hemoglobina ≤145 g/L, PCR ultrasensible ≥5 mg/L y calprotectina fecal ≥300 µg/g probaron ser biomarcadores predictivos independientes para el desarrollo de recaída clínica tras suspender selectivamente el uso de infliximab.\"<br><br>Análisis de Distractores: Cortes diagnósticos muy bajos de escrutinio (<40 µg/g o 100 µg/g - opciones A y B) certifican inactividad y ausencia basal de recaída clínica, reflejando idoneidad para plantearse la suspensión controlada en el paciente seleccionado en vez del empeoramiento futuro.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 1, 2025, Diagnostics during elective treatment withdrawal, Página 218."
    },
    {
        id: 79,
        question: "En el ultrasonido intestinal a pie de cama, el índice cuantitativo estandarizado para documentar actividad inflamatoria segmentaria se denomina IBUS-SAS. ¿Cuáles son los cuatro parámetros morfológicos transabdominales que este índice requiere medir formalmente en milímetros o grados?",
        options: ["Grosor parietal, flujo Doppler a color, estratificación de la pared y grasa inflamatoria periférica", "Diámetro del lumen, peristalsis regional, ecogenicidad del gas y presencia de pólipos sésiles", "Grosor mucinoso, velocidad sistólica mesentérica, ecogenicidad esplénica y nódulos gangliónicos", "Volumen del absceso, pérdida del patrón de haustras, friabilidad de vellosidades y densidad de fibrina"],
        answer: 0,
        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 2 2025, el International Bowel Ultrasound Segmental Activity Score (IBUS-SAS) otorga reproducibilidad estadística. Este índice calcula una ecuación matemática que correlaciona de manera fuerte y objetiva la actividad endoscópica evaluando: BWT (grosor de la pared mayor a 3 mm), CDS (hiperemia o flujo Doppler a color alterado), BWS (preservación o pérdida de la estratificación de las capas de la pared) e i-fat (hipertrofia y ecogenicidad anormal de la grasa perimesentérica o \"creeping fat\").<br><br>Perla ENARM: \"El índice ecográfico segmentario IBUS-SAS, fuertemente predictor de curación mucosa endoscópica, se basa en el registro de grosor de la pared, pérdida de estratificación, alteraciones en el Doppler a color y grasa inflamatoria circundante.\"<br><br>Análisis de Distractores: Opciones evaluadoras de pólipos, vellosidades intraluminales, gas, esplenomegalia o frecuencia peristáltica dinámica (opciones B, C y D) no forman parte de las ecuaciones ecográficas estructuradas del IBUS-SAS y, en muchos casos, son invisibles por las limitaciones físicas de la penetración del ultrasonido abdominal macroscópico frente a los gases colónicos.",
        source: "Guía ECCO-ESGAR-ESP-IBUS sobre diagnóstico y seguimiento de pacientes con EII Parte 2, 2025, Table 5 Intestinal ultrasound indices, Página 224."
    },
    {
        id: 80,
        question: "En un paciente adulto cursando con colitis severa aguda, taquicardia sostenida y rectorragia continua, internado bajo tratamiento médico de rescate de segunda línea por vía intravenosa, ¿qué conducta ineludible está indicada si no existe respuesta clínica de freno al día 7 del protocolo intensivo con Infliximab o Ciclosporina?",
        options: ["Colocación de derivación ileal en asa con colgajo", "Proctocolectomía total con anastomosis ileoanal preservada", "Colectomía subtotal abierta urgente con ileostomía terminal", "Iniciar radioterapia pélvica de dosis baja adyuvante"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, los protocolos de colitis fulminante refractaria tienen una ventana temporal estrecha y limitada de rescate inmunológico. Retrasar la cirugía definitiva (Failure of Medical Therapy) agrava el estrés nutricional y la toxicidad metabólica, disparando las tasas de mortalidad quirúrgica del paciente y perforación isquémica a corto plazo. A los 7 días de refractariedad en 2da línea biológica, el cese quirúrgico de la inflamación mediante colectomía de extirpación del órgano enfermo es la única alternativa para salvaguardar la vida.<br><br>Perla ENARM: \"Sugerimos inminentemente que los pacientes con colitis severa aguda que no han respondido dentro de 7 días al tratamiento de rescate médico en infusión de infliximab o ciclosporina, o aquellos que deterioren antes de ese límite, requieren colectomía subtotal e ileostomía urgentes.\"<br><br>Análisis de Distractores: La proctocolectomía total en escenario de emergencia aguda inflamada (opción B) impone una agresividad pélvica catastrófica sin dar oportunidad fisiológica de recuperación sistémica del paciente, prohibiendo anastomosis en primer tiempo quirúrgico sucio. La ostomía de derivación (opción A) preservaría el órgano necrótico intocable empeorando el choque séptico.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, ASUC Refractory, Página 183."

        question: "Durante el manejo obstétrico de una paciente embarazada con enfermedad de Crohn, ¿cuál manifestación clínica dicta la indicación absoluta de realizar el nacimiento mediante cesárea en lugar de parto vaginal?",

        options: ["Dieta baja en oligosacáridos fermentables (FODMAP)", "Nutrición enteral exclusiva con fórmula polimérica", "Dieta basada en exclusión de gluten y caseína", "Patrón dietético estrictamente mediterráneo"],

        question: "Previo al inicio de un antagonista del factor de necrosis tumoral, ¿cuál es el protocolo mínimo obligatorio de escrutinio para descartar tuberculosis latente en un paciente asintomático de bajo riesgo?",
        options: ["Tomografía de tórax y cultivo de esputo", "Ensayo de liberación de interferón gamma y radiografía torácica", "Prueba cutánea de tuberculina seriada", "Reacción en cadena de la polimerasa en sangre"],

        justification: "Justificación: De acuerdo al documento Guía BSG 2025, la exposición a bloqueadores del factor de necrosis tumoral conlleva un riesgo letal de diseminación de tuberculosis latente o granulomatosa. En todo paciente, sin importar su riesgo epidemiológico aparente, la norma internacional exige efectuar como tamizaje basal una radiografía de tórax y una prueba serológica IGRA (ej. QuantiFERON-TB).<br><br>Perla ENARM: \"Un ensayo de liberación de interferón-gamma (IGRA) y una exploración mediante radiografía de tórax son las pruebas mínimas requeridas para el escrutinio de pacientes de bajo riesgo antes de iniciar terapias avanzadas.\"<br><br>Análisis de Distractores: La tomografía y el cultivo (opción A) o la PCR (opción D) se reservan para confirmar tuberculosis activa sospechada, no como tamizaje en pacientes asintomáticos. La prueba cutánea (opción C) presenta alta tasa de falsos positivos (por vacuna BCG) o falsos negativos (por anergia inmunológica de la enfermedad), siendo el IGRA superior.",

        options: ["Las elementales inducen curación endoscópica más rápido", "Las poliméricas previenen re-estenosis a corto plazo", "No existe diferencia estadísticamente significativa en eficacia", "Las semielementales tienen menor tasa de recaída clínica"],

        options: ["Restricción total de ácidos grasos saturados", "Eliminación de emulsionantes y maltodextrina", "Dieta libre de canela y compuestos de benzoatos", "Supresión de polisacáridos no amiláceos"],

    {
        id: 88,
        question: "Durante el seguimiento de un paciente adulto en mantenimiento sin síntomas, la calprotectina fecal se reporta en una zona \"intermedia\" de 170 ug/g. Según las guías de monitorización, ¿cuál es el paso subsecuente más apropiado?",
        options: ["Optimizar agresivamente el tratamiento biológico", "Realizar una ileocolonoscopia en menos de 72 horas", "Considerar repetir la prueba cuantitativa en 6 semanas", "Suspender la terapia por remisión profunda confirmada"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, niveles de calprotectina fecal entre 100 y 250 ug/g sugieren una \"probabilidad intermedia\" de remisión endoscópica. En pacientes asintomáticos, las oscilaciones leves pueden ser fisiológicas o autolimitadas. Se recomienda no saltar directamente a intervenciones invasivas o cambios de fármaco, sino repetir la medición en 6 semanas; si incrementa a >250 ug/g se procede a endoscopia.<br><br>Perla ENARM: \"Para niveles de calprotectina fecal entre 100 y 250 ug/g, existe una probabilidad intermedia de remisión endoscópica. Se debe considerar repetir la prueba en 6 semanas y, si continúa el aumento >250, realizar investigaciones adicionales.\"<br><br>Análisis de Distractores: Escalar dosis empíricamente (opción A) o realizar colonoscopia urgente (opción B) ante un valor intermedio de 170 ug/g en un paciente sin clínica expone a morbilidad sin confirmación de recaída sostenida. Suspender el fármaco (opción D) precipitaría un rebrote seguro.",

        options: ["Administrar esquema de vacunación acelerada con doble dosis", "Proporcionar dosis única estándar por vía intradérmica", "Interrumpir agentes biológicos por 12 semanas pre-vacunación", "Combinar la vacuna inactiva con gammaglobulina hiperinmune"],

    {

        question: "¿Cuál índice endoscópico cuantitativo, parcialmente validado y diseñado para ser más sencillo y rápido de aplicar que el SES-CD, demuestra una fuerte correlación y confiabilidad interobservador para evaluar la actividad de la mucosa en la enfermedad de Crohn?",
        options: ["Índice endoscópico de severidad (CDEIS)", "Puntuación modificada de Rutgeerts", "Evaluación endoscópica mucosa simplificada (SEMA-CD)", "Índice ecográfico segmentario (IBUS-SAS)"],

        justification: "Justificación: De acuerdo al documento Guía ECCO-ESGAR Parte 2 2025, el CDEIS y el SES-CD son precisos pero laboriosos y rara vez usados en clínica rutinaria. El SEMA-CD (Simplified Endoscopic Mucosal Assessment for Crohn’s Disease) surgió como una alternativa robusta, reproducible, altamente correlacionada con el SES-CD, y significativamente más sencilla para el clínico que busca estratificar rápida y certeramente la curación de la mucosa en el día a día.<br><br>Perla ENARM: \"El índice SEMA-CD muestra una fuerte correlación con el SES-CD, siendo más fácil de utilizar en la práctica clínica y exhibiendo una sensibilidad al cambio confiable y reproducible en pacientes pediátricos y adultos.\"<br><br>Análisis de Distractores: El CDEIS (opción A) es el índice histórico original, extremadamente complejo y reservado solo para investigación. La puntuación de Rutgeerts (opción B) evalúa estrictamente el sitio de anastomosis postquirúrgica, no el colon intacto. El IBUS-SAS (opción D) es un índice ultrasonográfico transmural, no endoscópico.",

        question: "Durante un abordaje quirúrgico por oclusión, se visualizan múltiples estenosis fibróticas de intestino delgado muy cercanas entre sí dentro de un mismo segmento. Para prevenir complicaciones anastomóticas u obstructivas yatrogénicas, ¿cuál es la técnica preferida por los cirujanos expertos?",
        options: ["Efectuar dilatación intraoperatoria con balón sin corte", "Configurar estenoplastias múltiples contiguas (Heineke-Mikulicz)", "Realizar una única resección segmentaria que incluya las lesiones", "Efectuar derivación paliativa del tránsito intestinal proximal"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, aunque la estenoplastia preserva longitud, intentar múltiples aperturas y cierres transversales (Heineke-Mikulicz) en un segmento corto y adyacente altera catastróficamente la motilidad regional y eleva el riesgo de fuga, absceso o íleo ciego. Si el paciente tiene un remanente intestinal sano y adecuado en total, extirpar el segmento plagado de lesiones múltiples en bloque es la decisión técnica superior.<br><br>Perla ENARM: \"Si existen múltiples estenosis cercanas entre sí en un segmento del intestino y hay suficiente intestino sano remanente, una única resección puede ser preferible a realizar múltiples estenoplastias.\"<br><br>Análisis de Distractores: La dilatación transoperatoria (opción A) genera desgarros serosos con fuga inminente. Las estenoplastias contiguas (opción B) conllevan falla biomécanica de la pared. Derivar sin resecar (opción D) deja un foco de enfermedad fibroinflamatoria y sepsis latente, reservándose solo para catástrofes pélvicas extremas inoperables.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Small bowel surgery, Página 165."
    },

        question: "Previo al inicio de tratamiento con Ozanimod o Etrasimod en pacientes con enfermedad inflamatoria intestinal, además del electrocardiograma basal, ¿cuál evaluación clínica oftalmológica está estrictamente mandatada debido al riesgo de toxicidad de este grupo de fármacos?",
        options: ["Tonometría de presión intraocular", "Campimetría visual computarizada anual", "Evaluación oftalmológica para detectar edema macular", "Medición del grosor del cristalino para cataratas"],
        answer: 2,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, los fármacos moduladores del receptor de esfingosina-1-fosfato (S1P) alteran la integridad vascular endotelial capilar. Entre sus efectos adversos raros pero críticos destaca la inducción de edema macular. Se exige una valoración oftalmoscópica y tomografía de coherencia óptica (OCT) previo a su uso, particularmente en individuos con antecedente de uveítis o diabetes.<br><br>Perla ENARM: \"Se requiere evaluación oftalmológica basal (incluyendo tomografía de coherencia óptica) si se consideran moduladores S1P como ozanimod o etrasimod, para el cribado preventivo de edema macular.\"<br><br>Análisis de Distractores: La tonometría para glaucoma (opción A) y la medición de cataratas (opción D) son riesgos oftalmológicos asociados al uso crónico de corticosteroides tópicos o sistémicos, no son la firma toxicológica de alerta de los moduladores S1P.",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, Table 10 Drug monitoring, Página 169."
    },
    {
        id: 93,
        question: "En el protocolo de escrutinio pre-terapéutico para adultos con enfermedad inflamatoria intestinal, ¿cuál patología infecciosa silenciosa debe ser mandatariamente tamizada como medida de salud pública y de seguridad antes de iniciar esteroides sistémicos o terapias avanzadas?",
        options: ["Virus del Papiloma Humano serotipo 16 y 18", "Virus de Inmunodeficiencia Humana (VIH)", "Parvovirus B19", "Toxoplasma gondii"],
        answer: 1,
        justification: "Justificación: De acuerdo al documento Guía BSG 2025, la administración de inmunomoduladores, biológicos y corticosteroides puede desencadenar un colapso inmunológico profundo (SIDA) en pacientes portadores no diagnosticados. Las directrices enfatizan firmemente solicitar una prueba de VIH a todo paciente al momento de su evaluación para escalamiento farmacológico.<br><br>Perla ENARM: \"Recomendamos ofrecer una prueba de VIH a todos los pacientes con EII como medida de salud pública, y exigir obligatoriamente el tamizaje de VIH antes de iniciar cualquier terapia avanzada, incluyendo los corticosteroides.\"<br><br>Análisis de Distractores: El tamizaje sistémico sérico para VPH (opción A) no está indicado; la evaluación citológica es local mediante Papanicolaou. Parvovirus y Toxoplasma (opciones C y D) pueden causar infecciones en el inmunocomprometido, pero no forman parte del escrutinio serológico universal e imperativo pre-biológico (como sí lo son VHB, VHC, VIH, VZV y TB).",
        source: "Directrices de la Sociedad Británica de Gastroenterología sobre la enfermedad inflamatoria intestinal en adultos, 2025, GPS 29, Página 129."
