                options: ["Significativamente mayor para la hepaticoduodenostomía", "Sin diferencia estadísticamente significativa", "Significativamente menor para la hepaticoyeyunostomía", "El riesgo se encuentra abolido en ambos procedimientos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, a pesar de que el OR puntual de 1.59 inclina una levísima superioridad a favor del yeyuno, el intervalo de confianza (0.16 a 15.40) cruza ampliamente la unidad, denotando que, con la evidencia metodológica actual muy baja, ambas configuraciones cicatrizan de manera similar respecto a su permeabilidad mecánica a largo plazo.<br><br>Perla ENARM: \"Un análisis agrupado de dos estudios no mostró evidencia de una diferencia significativa entre los grupos de hepaticoyeyunostomía o hepaticoduodenostomía en la tasa de estenosis (OR: 1.59).\"<br><br>Análisis de Distractores: Las opciones A y C son conclusiones no permitidas por la amplitud de los intervalos de confianza (p > 0.05). La opción D es médicamente irreal; la isquemia biliar garantiza al menos un 10% basal de estenosis inevitable.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ4, Página 11."

            {

                question: "En la misma comparativa (hepaticoduodenostomía frente a hepaticoyeyunostomía), ¿cuál es el estimado puntual (Odds Ratio) reportado de requerir una reintervención endoscópica o radiológica posoperatoria por fallos de la anastomosis?", 
                options: ["OR 0.13", "OR 1.14", "OR 2.85", "OR 7.41"],

                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Evidence summary KQ4, Página 24." 
            },
            {
                id: 51, 
                question: "Para asegurar que el cirujano disponga siempre de directrices basadas en la evidencia médica más contemporánea, ¿con qué frecuencia temporal establece la política institucional de SAGES-AHPBA que este documento debe ser reevaluado por su grupo de trabajo?", 
                options: ["Cada año", "Cada 3 años", "Cada 5 años", "Cada 10 años"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el Guidelines Update Task Force (GUFT) tiene estipulado un protocolo estricto de revisión trienal sistemática para identificar nueva literatura, especialmente ensayos aleatorizados que cambien radicalmente las sugerencias \"condicionales\" actuales a pautas \"fuertes\".<br><br>Perla ENARM: \"Estas guías serán administradas y reevaluadas para su actualización cada tres años por el Grupo de Trabajo de Actualización de Guías (GUFT).\"<br><br>Análisis de Distractores: Las opciones A, C y D corresponden a frecuencias habituales en normativas crónicas o burocráticas, pero el protocolo interno dictaminado de SAGES exige revisión rápida trienal en complicaciones agudas iatrogénicas quirúrgicas.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Updating these guidelines, Página 27." 
            },
            {
                id: 52, 
                question: "Durante el diseño de los criterios de elegibilidad para el metaanálisis, se determinó que incluir pacientes con reoperaciones previas sesgaría los resultados debido a la fibrosis avanzada de sus tejidos. ¿Qué porcentaje máximo de pacientes con intentos previos de reparación biliar se toleró para no excluir un estudio entero?", 
                options: ["5%", "10%", "20%", "30%"], 
                answer: 1,

            {

                options: ["Reconstrucción en menos de 1 semana", "Reconstrucción en menos de 24 horas", "Reconstrucción al tercer mes exacto", "Reconstrucción pos-trasplante a 1 año"],

            {
                id: 54, 
                question: "Durante la deliberación del marco Evidence to Decision (EtD), la GPC utilizó un sistema riguroso de votación para transformar la evidencia en recomendaciones. ¿Qué porcentaje de votos del panel se requirió como mínimo para declarar la existencia de un \"consenso\"?",

            {
                id: 55, 
                question: "Al confrontar la GPC actual frente a la emitida previamente por la World Society of Emergency Surgery (WSES 2021) respecto al tratamiento quirúrgico, ¿qué aspecto metodológico crítico subraya la GPC que le otorga mayor solidez a sus recomendaciones actuales?", 
                options: ["La exclusión estricta de radiólogos del panel", "La realización de un metaanálisis sistemático propio", "La prohibición total del manejo endoscópico", "La recomendación irrefutable del manejo temprano"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, aunque la WSES evaluó la literatura y emitió pautas similares (retrasar cirugía por semanas), dependieron puramente de revisión narrativa descriptiva. El presente documento condensó matemáticamente los ORs (Odds Ratios) para evaluar estadísticamente las tasas de estenosis y letalidad con rigor GRADE.<br><br>Perla ENARM: \"Importante, aunque WSES realizó una búsqueda bibliográfica exhaustiva y la resumió, no llevaron a cabo una revisión sistemática o metaanálisis.\"<br><br>Análisis de Distractores: La opción A es irrelevante metodológicamente. Las opciones C y D son contrarias a la evidencia actual (se aprueba la endoscopia y se prefiere rotundamente el diferimiento maduro tardío).", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, What others are saying, Página 26."

            {
                id: 56, 
                question: "En su revisión de la normativa global previa, la GPC analiza el documento de la Asociación Europea de Cirugía Endoscópica (EAES 2011). ¿Cuál se reconoce como la principal falencia de dicho texto respecto al apartado de tratamiento definitivo de las lesiones biliares?", 
                options: ["Sus recomendaciones son vagas y no comparan técnicas específicas directamente", "Obligó el uso de hepaticoduodenostomía para todas las transecciones", "Exigió el uso de stents metálicos permanentes", "Declaró la cirugía robótica como un procedimiento experimental inaceptable"], 
                answer: 0,

                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, What others are saying, Página 27." 
            },
            {
                id: 57, 
                question: "En el análisis de morbimortalidad del ensayo clínico aleatorizado de Omar et al. (único RCT incluido), ¿cómo se definió matemáticamente el desenlace \"Estancia Hospitalaria\" en los grupos de estudio?", 
                options: ["Días acumulados exclusivamente tras la laparotomía definitiva", "Total de días de estancia hospitalaria acumulada a través de todo su periodo de seguimiento", "Días de internamiento previos al traslado a tercer nivel", "Días de ventilación mecánica invasiva post-anastomosis"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, al comparar el grupo \"temprano\" frente al \"tardío\", el paciente tardío requiere múltiples admisiones intermitentes (para recambio de catéteres, sepsis biliar inicial y finalmente la cirugía). Contabilizar todos los días cama del paciente en un lapso de 24 meses ofreció una métrica real de consumo de recursos.<br><br>Perla ENARM: \"La duración de la estancia fue definida como la estancia hospitalaria total a través de todo su seguimiento en días.\"<br><br>Análisis de Distractores: La opción A ignora la inmensa carga de internamientos preparatorios \"puente\" del grupo diferido. Las opciones C y D evalúan fragmentos logísticos o de cuidados críticos aislados, no la métrica global del RCT.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Summary of the evidence KQ1, Página 16." 
            },
            {
                id: 58, 
                question: "La GPC subraya que el manejo endoscópico puro de las transecciones y fugas severas es factible solo en instituciones de altísima especialización. En consecuencia, ¿qué diseño de investigación recomienda la guía para exportar y habilitar estas técnicas en otros hospitales?", 
                options: ["Estudio de implementación de programas", "Ensayo clínico cruzado doble ciego", "Metarregresión de estudios retrospectivos", "Inmunohistoquímica molecular biliar"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, establecer protocolos invasivos avanzados (como CPRE para disrupciones mayores) en centros vírgenes requiere capacitar personal, garantizar insumos logísticos de rescate e integrar equipos multidisciplinarios. Un estudio que analice barreras y facilitadores (Implementation Study) es prioritario antes de efectuar intervenciones indiscriminadas en la comunidad.<br><br>Perla ENARM: \"El manejo endoscópico de lesiones complejas es un desafío y solo puede realizarse en centros selectos; un estudio de implementación investigando qué se necesita para lanzar tal programa es crítico.\"<br><br>Análisis de Distractores: La opción B evalúa eficacia farmacológica/intervención directa, no la logística del sistema de salud. Las opciones C y D no evalúan las metodologías logísticas y educacionales requeridas para asimilar técnicas de punta en hospitales nuevos.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Future research recommendations KQ3, Página 23." 
            },
            {
                id: 59, 
                question: "La terapia endoscópica presenta un nicho terapéutico en lesiones anatómicamente favorables, principalmente para las lesiones de Strasberg clase D. Según la GPC, en centros selectos y de manera técnicamente desafiante, ¿qué otras subclases inferiores son susceptibles al abordaje no operatorio inicial?", 
                options: ["Lesiones tipo C exclusivas", "Lesiones tipo E1 y E2", "Lesiones tipo E4 y E5", "Transección portal masiva"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, aunque clásicamente la endoscopia requiere continuidad del conducto, los expertos han logrado emplear técnicas avanzadas (como Rendezvous o punción) para franquear el defecto circunferencial extrahepático de baja altura (E1 o E2) e insertar prótesis plásticas, evitando las altísimas morbilidades de la laparotomía en casos ideales.<br><br>Perla ENARM: \"El manejo endoscópico de las lesiones biliares severas se presta naturalmente para las lesiones Tipo D y lesiones E1, E2 inferiores.\"<br><br>Análisis de Distractores: La opción A no se accede retrógradamente por endoscopio de forma primaria. La opción C abarca destrucciones profundas intrahepáticas inalcanzables o de altísima letalidad sin derivación quirúrgica hepática selectiva (Roux).", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Evidence discussion to final recommendation KQ3, Página 22." 
            },
            {
                id: 60, 
                question: "En la formulación de umbrales para transformar estadísticamente los juicios de las recomendaciones en EtD (Evidence to Decision), la diferencia absoluta de riesgos se calculó usando coeficientes predeterminados. ¿Qué valor de coeficiente dictaminó el límite para clasificar un efecto clínico terapéutico como \"trivial a pequeño\"?", 
                options: ["0.0135", "0.0321", "0.0625", "0.1000"],

                options: ["Obesidad mórbida documentada", "Anatomía pélvica conservada", "Sospecha de inflamación severa", "Índice de masa corporal elevado"],

                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">

                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">

                            </button>

                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('SAGESCASOProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('SAGESCASOLastQId', currentQuestionId);
                else localStorage.removeItem('SAGESCASOLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('SAGESCASOProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
