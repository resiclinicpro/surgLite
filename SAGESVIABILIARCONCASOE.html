    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Paciente femenino de 45 años, con antecedente de colecistectomía laparoscópica hace 5 días. Acude a urgencias por presentar fiebre de 39°C, ictericia y dolor abdominal generalizado. A la exploración física con datos de irritación peritoneal. Los laboratorios reportan leucocitosis e hipoalbuminemia. Se sospecha de una complicación iatrogénica severa de la vía biliar. ¿Qué sistema de clasificación se debe utilizar obligatoriamente para evaluar y reportar la severidad de esta lesión anatómica?", 
                options: ["Sistema de Bismuth-Corlette", "Sistema de Strasberg", "Clasificación de Clavien-Dindo", "Escala de Hinchey"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el abordaje terapéutico de una lesión biliar depende críticamente de la topografía exacta del daño. El consenso internacional establece que la clasificación de Strasberg (grados A al E) es el lenguaje universal estandarizado que todo cirujano debe emplear para dictaminar la pérdida de continuidad o el nivel de la fuga biliar, permitiendo así una correcta estratificación para su reparación.<br><br>Perla ENARM: \"El consenso internacional más reciente aconseja el uso del sistema de clasificación de Strasberg para evaluar la severidad de las lesiones de la vía biliar.\"<br><br>Análisis de Distractores: El sistema de Bismuth (opción A) se enfoca tradicionalmente en estenosis benignas crónicas o colangiocarcinomas hiliares, no en lesiones iatrogénicas agudas completas. La clasificación de Clavien-Dindo (opción C) gradúa complicaciones posoperatorias generales, no la anatomía biliar. La escala de Hinchey (opción D) es exclusiva para la diverticulitis aguda.", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Introduction, Página 5." 
            },
            {
                id: 2, 
                question: "Se realiza una colangiografía en la paciente del caso anterior, evidenciando una lesión circunferencial del conducto hepático común con pérdida total de la continuidad anatómica hacia el colédoco distal. ¿A qué clase de la clasificación corresponde este hallazgo patognomónico?", 
                options: ["Clase A", "Clase C", "Clase D", "Clase E"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la destrucción de un conducto biliar mayor (hepático común o colédoco) en toda su circunferencia imposibilita el paso de bilis hacia el intestino y requiere ineludiblemente una reconstrucción compleja. Este escenario de máxima gravedad se subclasifica de E1 a E5 dependiendo de la distancia que exista entre el muñón sano remanente y la confluencia de los conductos hepáticos.<br><br>Perla ENARM: \"La clase E es generalmente considerada la más severa ya que es una lesión circunferencial a un conducto biliar mayor con pérdida de continuidad.\"<br><br>Análisis de Distractores: La clase A (opción A) corresponde a una fuga simple del cístico. La clase C (opción B) es la transección de un conducto derecho aberrante sin fuga (ligado). La clase D (opción C) es una lesión lateral del conducto mayor que no abarca toda la circunferencia, preservando la continuidad del puente de tejido.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 102." 
            },
            {
                id: 3, 
                question: "Ante el diagnóstico transoperatorio de una lesión de la vía biliar mayor con pérdida de continuidad en un hospital general que no cuenta con un cirujano especialista en patología hepato-pancreato-biliar, con el paciente cursando inestabilidad, ¿cuál es la medida de temporalidad inmediata recomendada antes de su referencia?", 
                options: ["Drenaje quirúrgico amplio de la cavidad", "Hepaticoyeyunostomía en Y de Roux de urgencia", "Colocación de una endoprótesis metálica biliar", "Cierre primario del conducto biliar con monofilamento"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, cuando un cirujano carece del entrenamiento para confeccionar una anastomosis bilioentérica en el porta hepatis, su prioridad absoluta como maniobra de control de daños (damage control) es erradicar el riesgo de peritonitis biliar y sepsis inminente mediante la colocación de drenajes perilesionales, permitiendo el traslado seguro del paciente a un centro de tercer nivel.<br><br>Perla ENARM: \"La recomendación actual apoya medidas de temporalidad, incluyendo drenaje amplio intraoperatorio para el control de la sepsis, en un paciente que se presenta con lesión biliar si no existe un experto hepato-biliar disponible.\"<br><br>Análisis de Distractores: Las opciones B y D requieren sutura fina en una placa hiliar isquémica; realizarlas sin experiencia condiciona falla y necrosis casi segura. La opción C no puede realizarse de urgencia en una lesión con pérdida de continuidad por vía transoperatoria convencional.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ1, Página 149." 
            },
            {
                id: 4, 
                question: "Un cirujano general se encuentra realizando una colecistectomía abierta y advierte la sección completa del colédoco. Al carecer de entrenamiento hepato-pancreato-biliar, se cuestiona si debe intentar derivar la vía biliar de inmediato. Fisiopatológicamente, ¿por qué está proscrito que este cirujano intente la reconstrucción definitiva en ese momento?", 
                options: ["Por el riesgo inminente de desarrollar síndrome de sumidero", "Por las altas tasas de fallo reconstructivo y estenosis secundaria", "Por la necesidad obligada de administrar nutrición parenteral previa", "Por el riesgo de desencadenar una pancreatitis necrotizante"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, los intentos de anastomosis biliar primaria por manos inexpertas sobre tejido inflamado y de microvascularidad dudosa garantizan isquemia local. Esto se traduce fisiopatológicamente en fugas anastomóticas graves tempranas y estenosis fibróticas irreversibles tardías, empeorando drásticamente el pronóstico del paciente.<br><br>Perla ENARM: \"Las ventajas prospectivas de la reparación temprana en la mesa quirúrgica pueden verse oscurecidas por el hecho de que las reparaciones son intentadas con mayor frecuencia por especialistas no HPB, asociándose a altas tasas de fallo.\"<br><br>Análisis de Distractores: El síndrome de sumidero (opción A) es una complicación específica de la hepaticoduodenostomía a largo plazo, no una razón para evitar intentar reparar. Las opciones C y D carecen de fundamento biológico como causa directa limitante del cierre primario biliar transoperatorio.", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 50." 
            },
            {
                id: 5, 
                question: "Paciente masculino de 52 años, transferido a un centro de tercer nivel con diagnóstico de lesión de la vía biliar tipo E2, ocurrida hace 7 días. Actualmente se encuentra estable, con un drenaje percutáneo biliar funcional y biloma controlado. El cirujano experto evalúa el momento óptimo para la reconstrucción. ¿Cuál es el tiempo de espera recomendado para realizar el abordaje definitivo y asegurar el éxito anastomótico?", 
                options: ["Mayor a 72 horas", "Mayor a 2 semanas", "Mayor a 6 semanas", "Mayor a 6 meses"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, operar antes de las 6 semanas (reparación temprana) se asocia significativamente a un incremento en mortalidad (OR 2.83) y reoperación. Al diferir el procedimiento por más de mes y medio, la cascada inflamatoria aguda peritoneal cede, permitiendo que la vasculatura isquémica del muñón biliar se delimite claramente para anastomosarse sobre tejido viable y firme.<br><br>Perla ENARM: \"El panel sugiere la reparación tardía, mayor a 6 semanas, por un cirujano experimentado en patología HPB para el manejo de la lesión de la vía biliar poscolecistectomía.\"<br><br>Análisis de Distractores: Las opciones A y B engloban la \"fase intermedia/aguda\" (antes de las 6 semanas) donde el tejido de granulación es máximo y la friabilidad asegura que los nudos desgarren la vía biliar. La opción D (6 meses) es un retraso excesivo e innecesario que compromete la calidad de vida.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ1, Página 96." 
            },
            {
                id: 6, 
                question: "Fisiopatológicamente, al diferir la reparación de una lesión biliar severa por un lapso superior a 6 semanas de acuerdo a la recomendación central de la guía, ¿qué beneficio biológico e inmunológico se consolida en el paciente para garantizar el éxito de la intervención?", 
                options: ["La epitelización del trayecto de los drenajes", "La hiperplasia compensatoria del sistema biliar", "La cicatrización de los clips metálicos arteriales", "La restitución de la competencia inmunológica y maduración tisular"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el paciente con fuga biliar o biloma cursa con un choque o sepsis subclínica que induce un estado hipercatabólico e inmunosupresión. Al drenar la colección y esperar, el huésped revierte su estado de desnutrición aguda, la peritonitis química madura hacia adherencias fibróticas y el sistema inmune recobra la capacidad biológica para generar una cicatrización entérica por primera intención.<br><br>Perla ENARM: \"La justificación para los resultados ventajosos de la reparación retrasada es aliviar la inflamación, mejorar el estado nutricional, restituir la competencia inmunológica adecuada y facilitar la evaluación del tejido isquémico.\"<br><br>Análisis de Distractores: Los trayectos fistulosos o drenajes no epitelizan en el corto plazo ni son el objetivo reconstructivo (opción A). La hiperplasia biliar (opción B) ocurre lentamente en estasis pura, pero no es el pilar de éxito. Los clips metálicos son inertes y no cicatrizan (opción C).", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 48." 
            },
            {
                id: 7, 
                question: "Paciente femenino de 40 años, con índice de masa corporal de 38, acude para la reconstrucción definitiva de una lesión de vía biliar tipo E1 tras 8 semanas de su colecistectomía índice laparoscópica. Se encuentra estable y sin sepsis. ¿Qué abordaje quirúrgico está condicionalmente sugerido por proveer ventajas de exposición y ergonomía visual en esta paciente específica?", 
                options: ["Laparotomía exploradora subcostal derecha", "Cirugía de mínima invasión", "Derivación biliar percutánea definitiva", "Colangiopancreatografía retrógrada endoscópica"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, en pacientes con anatomía pélvica favorable o que padecen obesidad mórbida, la pared abdominal gruesa imposibilita traccionar el hígado en cirugía abierta. La cirugía robótica o laparoscópica brinda una visión tridimensional inferior al techo hepático y evita las catastróficas hernias incisionales, demostrando tasas de estenosis equivalentes a la técnica abierta.<br><br>Perla ENARM: \"La reparación MIS es preferida en aquellos pacientes que se encuentran estables, con anatomía favorable y de forma específica en aquellos con alto índice de masa corporal u obesidad.\"<br><br>Análisis de Distractores: La opción A sometería a la paciente obesa a riesgos de infección de herida y eventración masiva. Las opciones C y D no son tratamientos quirúrgicos reconstructivos (y la CPRE es mecánicamente inútil en disrupciones E1 completas sin puenteo guiado altamente selectivo).", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ2, Página 97." 
            },
            {
                id: 8, 
                question: "Paciente masculino de 65 años, programado para reparación biliar tardía tras 7 semanas de evolución. Cuenta con el antecedente de una cirugía por trauma abdominal cerrado (laparotomía) hace 10 años. Presenta una cicatriz xifopúbica extensa. De acuerdo a la guía clínica, ¿qué vía de acceso quirúrgica es la preferida por seguridad anatómica en este caso?", 
                options: ["Cirugía laparoscópica asistida", "Cirugía abierta convencional", "Abordaje endoscópico transgástrico", "Cirugía robótica de puerto único"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el antecedente de cirugía abdominal mayor (especialmente laparotomía exploradora) condiciona un plastrón de adherencias visceroparietales y mesentéricas. Intentar el acceso con trócares de mínima invasión acarrea un riesgo prohibitivo de perforación intestinal inadvertida, por lo que el acceso directo bajo visión directa es mandatario.<br><br>Perla ENARM: \"La cirugía abierta es preferida en aquellos pacientes inestables, con lesiones altas y/o complejas, que tienen una incisión abierta previa, y en aquellos donde se sospeche inflamación severa.\"<br><br>Análisis de Distractores: Las opciones A y D enfrentan el mismo riesgo de lesión de asas fijadas a la cicatriz preexistente e impiden movilizar yeyuno libremente. La opción C no corresponde a un método anatómico de reconstrucción de vía biliar extrahepática ocluida.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ2, Página 162." 
            },
            {
                id: 9, 
                question: "Un cirujano HPB se encuentra planificando la derivación bilioentérica en un paciente con una lesión biliar transeccionada muy proximal, clasificada como Strasberg E5 (lesión de la confluencia con separación de los conductos hepáticos derecho e izquierdo). ¿Qué técnica reconstructiva específica presenta contraindicación absoluta para este nivel topográfico?", 
                options: ["Hepaticoyeyunostomía en Y de Roux", "Hepaticoduodenostomía", "Anastomosis mucoso-mucosa biliar", "Reconstrucción biliodigestiva en asa omega"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la hepaticoduodenostomía exige movilizar el duodeno (órgano retroperitoneal retrocefálico) hacia el porta hepatis. Físicamente, el estiramiento máximo del segmento duodenal no permite alcanzar de forma libre de tensión lesiones tan altas o intrahepáticas como las E5, asegurando isquemia y dehiscencia posoperatoria inmediata.<br><br>Perla ENARM: \"Las contraindicaciones para la reparación mediante hepaticoduodenostomía incluyen a los pacientes con lesiones E5 o pancreatitis severa.\"<br><br>Análisis de Distractores: La opción A es precisamente la técnica estándar (\"gold standard\") para alcanzar conductos intrahepáticos mediante el libre ascenso del asa yeyunal. La opción C no aplica para lesiones con pérdida masiva de tejido. La opción D es una técnica generalizada pero no es la contraindicación explícita anatómica mencionada para lesiones muy superiores.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 183." 
            },
            {
                id: 10, 
                question: "Paciente femenino de 50 años, con fuga biliar persistente por el drenaje. La colangiografía percutánea demuestra una lesión lateral del conducto hepático común (Strasberg D) que conserva parcialmente la pared posterior del tubo biliar, con un diámetro del conducto preservado y dilatado a 12 mm. Clínicamente estable. ¿Qué modalidad terapéutica definitiva primaria se encuentra condicionalmente indicada?", 
                options: ["Manejo no operatorio endoscópico", "Reparación primaria con monofilamento 5-0", "Esfinterotomía transcística laparoscópica", "Reconstrucción vascular inmediata"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, las lesiones que mantienen un puente de tejido con el colédoco inferior (como las de tipo D o E1 inferiores muy bien seleccionadas) permiten franquear la fuga biliar mediante el avance de una guía hidrofílica por CPRE. Al contar con un sistema dilatado (12 mm), la colocación de múltiples stents plásticos recubre exitosamente el defecto lateral sin someter al paciente a cirugía mayor.<br><br>Perla ENARM: \"El manejo endoscópico de las lesiones biliares severas se presta naturalmente para lesiones Tipo D y E1/E2 inferiores... requiriendo típicamente una anatomía favorable con un sistema biliar dilatado.\"<br><br>Análisis de Distractores: La opción B suele estenosarse irremediablemente por el daño térmico isquémico lateral de la pinza inicial. La opción C no resuelve una disrupción lateral del colédoco mayor. La opción D aborda una complicación coexistente, pero no corrige la fuga biliar estructural franca.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ3, Página 170." 
            },
            {
                id: 11, 
                question: "Se analiza el riesgo a futuro de un paciente tratado de manera no operatoria (terapia endoscópica exclusiva) por una lesión biliar iatrogénica de grado intermedio. ¿Qué complicación morfológica posee un riesgo significativamente mayor (OR 2.44) de desarrollarse en comparación con un paciente sometido a derivación quirúrgica definitiva?", 
                options: ["Biloma infectado pélvico", "Formación de estenosis biliar", "Reflujo alcalino intestinal", "Fístula arterio-biliar intrahepática"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la compresión radial crónica inducida por la fricción de los stents biliar intravasculares, sumado a la dilatación neumática repetitiva del conducto lesionado isquémicamente, inducen un depósito de colágeno fibrótico concéntrico progresivo. Esto disminuye la luz del conducto a largo plazo mucho más rápido que la cicatrización primaria mucoso-mucosa en una derivación quirúrgica bilioentérica libre de tensión.<br><br>Perla ENARM: \"El tratamiento endoscópico de la lesión de la vía biliar se asoció con una tasa significativamente mayor de estenosis en comparación con el tratamiento quirúrgico (OR: 2.44).\"<br><br>Análisis de Distractores: La opción A es una complicación en agudo si falla el drenaje inicial. La opción C es una complicación puramente posquirúrgica (Hepaticoduodenostomía). La opción D asocia a iatrogenia de aguja percutánea severa, no al pronóstico comparativo estándar pos-stent entre tratamientos.", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ3, Página 37." 
            },
            {
                id: 12, 
                question: "Durante la fase de planeación reconstructiva de un paciente con lesión mayor en el hilio hepático, el cirujano solicita imagenología avanzada para descartar daño arterial concomitante. Clínicamente y acorde a la epidemiología, ¿qué estructura vascular se encuentra lesionada en hasta un 32% de los casos junto con la vía biliar?", 
                options: ["Arteria mesentérica superior", "Vena porta principal", "Arteria hepática derecha", "Arteria gástrica izquierda"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, por su íntima proximidad anatómica en el triángulo de Calot y el cruce retro/pre-coledociano, la arteria hepática derecha es frecuentemente electrofulgurada o clipada junto con el conducto biliar principal. Esta isquemia compromete severamente la perfusión de la placa hiliar y favorece necrosis anastomótica, convirtiéndose en un factor crítico no documentado por el sistema Strasberg.<br><br>Perla ENARM: \"La lesión vascular concomitante no está incluida en este sistema (Strasberg), sin embargo, se reporta como presente en el 26-32% de estos pacientes.\"<br><br>Análisis de Distractores: Las opciones A y D son irrelevantes anatómicamente a la disección vesicular. La vena porta (opción B) es más posterior y rara vez se lesiona sin una hemorragia intraoperatoria inmediatamente catastrófica y letal.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 102." 
            },
            {
                id: 13, 
                question: "Paciente masculino de 60 años, sometido a una hepaticoduodenostomía por lesión biliar tipo E2. Tras 3 años de estabilidad, inicia con episodios intermitentes de fiebre, ictericia y dolor en hipocondrio derecho. La endoscopia digestiva reporta acúmulo de detritos alimentarios obstruyendo la luz distal del remanente coledociano ciego adyacente a la anastomosis. ¿Cómo se denomina anatómicamente este síndrome posoperatorio?", 
                options: ["Síndrome de Mirizzi tipo IV", "Colangitis esclerosante primaria", "Síndrome de sumidero (Sump syndrome)", "Síndrome del asa ciega yeyunal"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, al realizar una anastomosis biliar latero-lateral o término-lateral directamente sobre el duodeno y dejar un segmento del colédoco distal sin tránsito directo de flujo hacia el intestino, dicho remanente ocluido actúa como una \"trampa\" o sumidero donde refluyen y fermentan bacterias, secreción alcalina y alimento propulsado desde el estómago, detonando colangitis purulenta grave.<br><br>Perla ENARM: \"Uno debe también considerar las complicaciones potenciales a largo plazo con la reparación de hepaticoduodenostomía, incluyendo el síndrome de sumidero y el reflujo alcalino.\"<br><br>Análisis de Distractores: El síndrome de Mirizzi (opción A) es una compresión extrínseca del conducto por un lito cístico in situ previo a colecistectomía. La opción B es una patología hepática autoinmune difusa. La opción D es por sobrecrecimiento bacteriano en derivaciones intestinales excluidas, no aplica a este reservorio biliar.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 183." 
            },
            {
                id: 14, 
                question: "Paciente femenino de 28 años, con gasto biliar franco por drenaje tipo Penrose a los 4 días de una colecistectomía. La colangiografía por resonancia comprueba una fuga exclusiva del remanente del conducto cístico por deslizamiento del clip. La continuidad y diámetro del colédoco están intactos (Lesión Strasberg A). Según la pauta estándar clínica global, ¿cuál es el abordaje terapéutico de primera línea para sellar esta fuga?", 
                options: ["Re-laparotomía y ligadura cística con sutura", "Hepaticoyeyunostomía proximal de derivación", "Manejo no operatorio endoscópico", "Observación y retiro del drenaje sin intervención"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, al existir una vía biliar íntegra y conectada al duodeno, la simple reducción de la presión intracanalicular mediante esfinterotomía endoscópica con o sin colocación de un stent (CPRE) detiene el gradiente de resistencia que perpetúa la fuga por el cístico. Esto induce un cierre fisiológico y cicatrización natural sin requerir agresiones de la cavidad peritonial o seccionar colédocos sanos.<br><br>Perla ENARM: \"Cuando la continuidad del conducto biliar está preservada, como en las lesiones tipo A, el manejo no operatorio (endoscópico) es típicamente el apropiado.\"<br><br>Análisis de Distractores: Las opciones A y B someten al paciente a riesgos de isquemia hiliar sobre una vía previamente intacta. La opción D generaría estancamiento del biloma peritoneal y progresión a peritonitis biliar infecciosa irremediable.", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Introduction, Página 5." 
            },
            {
                id: 15, 
                question: "En el análisis prospectivo para definir el impacto posoperatorio en la vida del paciente, el único ensayo clínico aleatorizado (Omar 2023) comparó la esfera biopsicosocial tras una reparación temprana frente a una reparación tardía. ¿Qué instrumento específico y validado estandarizó el panel para medir el desenlace de Calidad de Vida (Quality of Life)?", 
                options: ["Cuestionario GIQLI", "Cuestionario EQ-5D", "Escala Visual Analógica Biliar", "Escala de Karnofsky modificada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, esta escala multidimensional evalúa la movilidad, cuidado personal, actividades cotidianas, dolor y ansiedad del paciente en recuperación. Al aplicar el EQ-5D a los 3 meses en ambos brazos (temprano vs diferido), la diferencia de medias fue clínicamente irrelevante (-0.03), probando que diferir la cirugía no empeora sustancialmente el estado anímico funcional y protege orgánicamente frente a estenosis mortales futuras.<br><br>Perla ENARM: \"La calidad de vida fue comparada en un RCT empleando el instrumento EQ-5D y no demostró una diferencia significativa entre la reparación temprana y tardía.\"<br><br>Análisis de Distractores: La opción A (GIQLI) es popular para afecciones gastrointestinales pero no fue la medida central de la evidencia prospectiva GRADE en el RCT analizado. Las opciones C y D carecen de validación estratificada específica para reconstrucción hiliar compleja a largo plazo en este metaanálisis.", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ1, Página 31." 
            },
            {
                id: 16, 
                question: "Paciente masculino de 48 años, acude para reconstrucción anatómica por pérdida traumática intraquirúrgica extensa de los conductos extrahepáticos. El cirujano decide realizar una hepaticoyeyunostomía en Y de Roux. ¿Qué característica morfológica mesentérica o antropométrica del paciente representa un obstáculo mecánico casi prohibitivo para ascender el injerto libre de tensión hasta el hígado?", 
                options: ["Obesidad visceral y mesenterio corto", "Conducto hepático izquierdo dilatado", "Ausencia de lesión en arteria hepática derecha", "Hernia inguinal directa preexistente"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el asa de yeyuno aferente debe nutrirse de las arcadas vasculares mesentéricas desde la raíz del ángulo de Treitz superior hasta la placa hepática (espacio supramesocólico distal). El engrosamiento del panículo adiposo en el mesenterio, o su acortamiento fisiológico, restringen drásticamente el estiramiento del asa, provocando estrangulación microcapilar en la línea de anastomosis y necrosis isquémica hiliar.<br><br>Perla ENARM: \"La hepaticoyeyunostomía puede ser extremadamente desafiante en pacientes con obesidad, aquellos que tienen un mesenterio corto, anatomía aberrante congénita o cirugías previas.\"<br><br>Análisis de Distractores: La dilatación biliar (opción B) y la vasculatura sana (opción C) son escenarios ideales que facilitan rotundamente el anudado anastomótico. La opción D ocurre en un compartimento pélvico inferior ajeno a la transposición del yeyuno superior.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 181." 
            },
            {
                id: 17, 
                question: "Fisiopatológicamente, ¿cuál es la razón epidemiológica subyacente que explica el riesgo drásticamente incrementado de mortalidad (OR 2.83) al decidir realizar una reparación quirúrgica biliar temprana (antes de las 6 semanas) en vez de diferirla?", 
                options: ["La alta incidencia de cáncer de vesícula incidental", "La imposibilidad de movilizar el yeyuno en agudo", "Operar sobre inflamación sistémica, friabilidad isquémica y sepsis", "La hemorragia masiva por falla de coagulación inducida"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, intervenir una cavidad abdominal saturada de bilis libre infectada, donde los macrófagos y citocinas han provocado friabilidad extrema (tejido inmaduro como \"mantequilla\") y microtrombosis, anula biológicamente cualquier esperanza de cicatrización hermética anastomótica. La falla del sellado deriva en reactivación del choque séptico peritonial y disfunción orgánica acelerada.<br><br>Perla ENARM: \"El grupo de reparación temprana se asoció con una tasa significativamente mayor de mortalidad (OR 2.83) al operar sobre condiciones no resueltas de inflamación aguda intrabdominal y sepsis concurrente.\"<br><br>Análisis de Distractores: El cáncer oculto (opción A) se estadifica oncológicamente, no dicta el fallo isquémico benigno iatrogénico temprano. La movilización (opción B) es más difícil por edema, pero el factor letal es el rechazo fibrótico de la sutura biliar hilar. La coagulopatía aislada (opción D) es tardía, post-falla hepática crónica o choque avanzado, no el detonante universal de mortalidad de la técnica temprana per se.", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ1, Página 30." 
            },
            {
                id: 18, 
                question: "Se instaura un protocolo institucional para el seguimiento y alta definitiva de los pacientes sometidos a derivación bilioentérica tras iatrogenia quirúrgica. Clínicamente, debido al carácter insidioso y lentamente progresivo de la estenosis cicatricial biliar, ¿qué duración temporal es el estándar dictaminado para la monitorización continua indispensable?", 
                options: ["12 meses", "2 a 3 años", "5 años", "10 años"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la fibrosis inducida por microisquemia en los conductos biliares de calibre pequeño (como las lesiones hiliares reconstruidas) puede tardar años, e incluso una década entera, en estrechar la luz al punto crítico de retener flujo y desencadenar episodios de colangitis subclínica recurrente, destrucción hepatocelular y cirrosis esclerosante tardía.<br><br>Perla ENARM: \"Se recomienda el seguimiento postoperatorio continuo de estos pacientes durante al menos 10 años después del tratamiento quirúrgico para la detección oportuna de complicaciones a largo plazo.\"<br><br>Análisis de Distractores: Las opciones A, B y C omiten el prolongado declive morfofuncional asintomático. Dar de alta a un paciente a los 3 años de la anastomosis omite los picos de fallo isquémico maduro tardío característico de la anatomía biliar isquémica.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 5." 
            },
            {
                id: 19, 
                question: "Al analizar los testimonios y la retroalimentación de pacientes reportados en la GPC que fueron sometidos a manejo exclusivamente no operatorio (endoscopia intervencionista con múltiples recambios de stent para intentar abrir estenosis biliares), ¿qué complicación de la intervención fue catalogada como la más devastadora y debilitante de su recuperación?", 
                options: ["Hemorragia intraluminal", "Pancreatitis aguda posprocedimiento", "Infección del trayecto percutáneo", "Ulceración gástrica perforada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la manipulación repetitiva de la papila duodenal, las inyecciones de contraste y la canulación de múltiples endoprótesis metálicas o plásticas a través del esfínter de Oddi irritan mecánicamente e inflaman severamente la cabeza pancreática. Los pacientes afirmaron que el dolor y la morbilidad extendida de la pancreatitis repetitiva anuló los beneficios de no ser operados por abdomen abierto.<br><br>Perla ENARM: \"La pancreatitis fue la parte más debilitante de su recuperación (Clavien Dindo II), reflejando que habría preferido la cirugía si eso significara menos procedimientos endoscópicos dolorosos recurrentes.\"<br><br>Análisis de Distractores: Las opciones A, C y D son riesgos conocidos estadísticos globales de la gastroenterología intervencionista, pero el panel central de pacientes resaltó explícitamente el deterioro clínico drástico asociado a los brotes de inflamación pancreática secundaria a la papilotomía/canulación biliar forzada crónica.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Values and Patient Perspective, Página 135." 
            },
            {
                id: 20, 
                question: "De acuerdo a la metodología internacional de medicina basada en evidencia y análisis estadístico documentado en esta GPC para la derivación de pacientes con lesión de vía biliar, ¿qué certeza global (nivel de confianza) se le asignó a todas las recomendaciones promulgadas por el panel experto tras la síntesis de resultados?", 
                options: ["Alta certeza metodológica", "Moderada certeza metodológica", "Muy baja certeza metodológica", "Fuerte con evidencia alta"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, dada la rareza del evento en poblaciones estandarizadas, el casi nulo acceso ético y logístico a ensayos controlados aleatorizados puros (solo hay uno calificado de alto sesgo), y la gigantesca interferencia retrospectiva clínica del sesgo de selección y destreza del cirujano, la evidencia matemática cruda arrojó gran imprecisión e indirectividad, forzando a emitir todas las pautas únicamente como condicionales muy bajas.<br><br>Perla ENARM: \"Todas las recomendaciones de la GPC fueron promulgadas como condicionales basadas en una certeza de evidencia muy baja y requieren que se evalúe cada paciente de forma profundamente individualizada.\"<br><br>Análisis de Distractores: Las opciones A, B y D son completamente opuestas a las rigurosas penalizaciones de la escala GRADE aplicadas a metaanálisis construidos a partir de estudios meramente observacionales y retrospectivos asimétricos.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Summary of key questions, Página 96." 
            },
            {
                id: 21, 
                question: "Durante una sesión clínica se discute el riesgo inherente de presentar una lesión biliar iatrogénica. De acuerdo a la GPC, ¿cuál es la incidencia global reportada de esta complicación durante las colecistectomías laparoscópicas?", 
                options: ["0.04 a 0.6%", "3 a 20%", "15 a 30%", "26 a 32%"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, aunque es un evento infrecuente, la lesión mayor de la vía biliar se presenta en un rango de 0.04% a 0.6% de los procedimientos laparoscópicos, representando una complicación devastadora que requiere intervención altamente especializada.<br><br>Perla ENARM: \"Las tasas de lesión mayor de la vía biliar durante la colecistectomía laparoscópica oscilan entre 0.04-0.6%.\"<br><br>Análisis de Distractores: La opción B corresponde a la tasa de mortalidad asociada a la lesión. La opción C es el porcentaje de detección intraoperatoria de la complicación. La opción D indica la frecuencia de lesión vascular concomitante (ej. arteria hepática derecha).", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Description of the health problem, Página 99." 
            },
            {
                id: 22, 
                question: "Paciente masculino de 65 años, posoperado de colecistectomía abierta hace 3 semanas, ingresa a la unidad de cuidados intensivos por choque séptico secundario a una lesión mayor de la vía biliar no identificada a tiempo. ¿Cuál es la tasa de mortalidad asociada a esta complicación dependiendo del momento de abordaje y la experiencia del centro?", 
                options: ["0.04 a 0.6%", "3 a 20%", "26 a 32%", "40 a 50%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la sepsis biliar no controlada, la disfunción orgánica y el fallo de las reparaciones inadecuadas condicionan un pronóstico letal importante. La mortalidad en estos pacientes varía del 3% al 20%, dependiendo fuertemente de la referencia oportuna y el manejo especializado.<br><br>Perla ENARM: \"La muerte en estos pacientes se reporta en cualquier lugar del 3 al 20% dependiendo del tiempo, la experiencia y la selección de la cohorte.\"<br><br>Análisis de Distractores: La opción A es la incidencia de la lesión. La opción C es el riesgo de lesión vascular asociada. La opción D sobredimensiona la letalidad promedio actual.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Description of the health problem, Página 100." 
            },
            {
                id: 23, 
                question: "Un cirujano general realiza una colecistectomía laparoscópica electiva y sospecha de una alteración anatómica transoperatoria. De acuerdo a la estadística clínica, ¿qué porcentaje de las lesiones de la vía biliar logran diagnosticarse de manera aguda en la misma sala de operaciones durante la cirugía índice?", 
                options: ["15 a 30%", "40 a 50%", "60 a 70%", "80 a 90%"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la gran mayoría de estas iatrogenias pasan desapercibidas inicialmente, lo que condiciona que el paciente desarrolle peritonitis y sepsis posoperatoria antes de ser diagnosticado. Solo una pequeña fracción es advertida por el cirujano que causa la lesión.<br><br>Perla ENARM: \"El momento de la terapia depende del diagnóstico, con solo un 15-30% de las lesiones diagnosticadas intraoperatoriamente.\"<br><br>Análisis de Distractores: Las opciones B, C y D sobrestiman drásticamente la capacidad real de detección transoperatoria reportada en la literatura internacional.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Description of the health problem, Página 103." 
            },
            {
                id: 24, 
                question: "Se evalúa a un paciente con lesión biliar extensa para determinar el momento óptimo de su reconstrucción. Comparado con diferir el procedimiento por más de 6 semanas, ¿qué riesgo absoluto (Odds Ratio) de formar una estenosis fibrótica asume el paciente si se decide realizar una reparación temprana?", 
                options: ["Riesgo absoluto de 2.44", "Riesgo absoluto de 2.83", "Riesgo absoluto de 7.41", "Riesgo absoluto de 16.60"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, suturar conductos biliares isquémicos en plena fase de inflamación aguda y tejido de granulación inmaduro (antes de las 6 semanas) multiplica por más de 7 veces la probabilidad de que la anastomosis cicatrice hacia el cierre concéntrico (estenosis) a largo plazo.<br><br>Perla ENARM: \"La reparación temprana se asocia con una tasa significativamente mayor de estenosis (OR 7.41) en comparación con la reparación tardía.\"<br><br>Análisis de Distractores: La opción A es el riesgo de estenosis al comparar endoscopia vs cirugía. La opción B es el riesgo de mortalidad temprana vs tardía. La opción D es el riesgo de reoperación en manejo endoscópico exclusivo.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ1, Página 21." 
            },
            {
                id: 25, 
                question: "En la evaluación del fracaso técnico anastomótico, ¿cuál es la probabilidad reportada (Odds Ratio) de que un paciente requiera una reoperación abdominal de rescate al ser sometido a una reparación biliar temprana frente a una reparación tardía?", 
                options: ["1.35", "2.44", "3.31", "16.60"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el abordaje en la fase aguda (temprana) predispone a fugas y dehiscencias debido a la extrema friabilidad de la vía biliar y el colédoco, obligando al cirujano a reintervenir quirúrgicamente al paciente con una probabilidad tres veces superior que si hubiera esperado la fase fibrótica madura.<br><br>Perla ENARM: \"La reparación temprana demostró estar asociada con una tasa significativamente mayor de reoperación (OR 3.31) en comparación con la reparación tardía.\"<br><br>Análisis de Distractores: La opción A es la reintervención endoscópica temprana vs tardía. La opción B es la estenosis en endoscopia vs cirugía. La opción D es la tasa de reoperación masiva en la falla del manejo endoscópico de lesiones mayores.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ1, Página 18." 
            },
            {
                id: 26, 
                question: "Paciente femenino de 40 años con lesión biliar tipo E2. Se debate instaurar un tratamiento no operatorio (endoscópico) exclusivo a largo plazo frente a una derivación quirúrgica bilioentérica. ¿Qué riesgo (Odds Ratio) de requerir eventualmente una reoperación de rescate asume la paciente si se opta por la ruta endoscópica?", 
                options: ["2.44", "3.31", "7.41", "16.60"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, intentar resolver de manera endoscópica las disrupciones biliares mayores genera un altísimo índice de fracaso crónico por colangitis, migración del stent o estenosis rebelde, catapultando las probabilidades (OR > 16) de requerir una laparotomía definitiva a posteriori.<br><br>Perla ENARM: \"El manejo no operatorio (endoscópico) en lesiones mayores se asoció con una tasa significativamente mayor de reoperación en comparación con el tratamiento quirúrgico (OR: 16.60).\"<br><br>Análisis de Distractores: La option A es el riesgo de estenosis en manejo endoscópico. Las opciones B y C son desenlaces adversos (reoperación y estenosis) de realizar una cirugía temprana frente a una tardía.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ3, Página 36." 
            },
            {
                id: 27, 
                question: "Al planificar una derivación bilioentérica definitiva, ¿qué ventaja técnica o anatómica directa ofrece la confección de una hepaticoduodenostomía frente a la tradicional hepaticoyeyunostomía?", 
                options: ["Excluye por completo el tránsito de enzimas pancreáticas", "Elimina el riesgo a largo plazo de reflujo alcalino", "Facilita el acceso endoscópico posoperatorio a la vía biliar", "Previene el desarrollo inminente del síndrome de sumidero"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, al conectar el muñón hepático directamente a la primera o segunda porción del duodeno, un endoscopio estándar introducido vía oral puede alcanzar fácilmente la anastomosis, permitiendo dilataciones o extracción de litos futuros sin la necesidad de enteroscopios especiales requeridos en una Y de Roux.<br><br>Perla ENARM: \"La hepaticoduodenostomía ofrece el beneficio de ser una cirugía técnicamente más fisiológica y proporciona un acceso endoscópico más fácil a la reparación en el posoperatorio.\"<br><br>Análisis de Distractores: Las opciones A y B describen propiedades exclusivas del aislamiento intestinal en Y de Roux (hepaticoyeyunostomía). La opción D es falsa; el síndrome de sumidero (Sump syndrome) es la principal complicación derivada de la hepaticoduodenostomía.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 182." 
            },
            {
                id: 28, 
                question: "Un paciente con antecedente de hepaticoduodenostomía por iatrogenia biliar acude por cuadros repetitivos de colangitis a pesar de la permeabilidad de la anastomosis. Fisiopatológicamente, además del síndrome de sumidero, ¿qué complicación crónica a la mucosa es inherente y exclusiva de esta configuración técnica?", 
                options: ["Reflujo alcalino", "Úlcera gástrica marginal", "Isquemia de la arteria mesentérica", "Colitis seudomembranosa recurrente"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la exposición directa y constante del árbol biliar intrahepático al quimo duodenal (sin la distancia protectora de un asa desfuncionalizada de yeyuno de 60 cm) permite el paso retrógrado de jugos biliares, gástricos y pancreáticos, induciendo colangitis química por reflujo.<br><br>Perla ENARM: \"Uno debe considerar las complicaciones potenciales a largo plazo específicas de la reparación mediante hepaticoduodenostomía, las cuales incluyen el síndrome de sumidero y el reflujo alcalino.\"<br><br>Análisis de Distractores: La opción B ocurre típicamente tras bypass gástrico u operaciones de intestino medio. La opción C es una afección vascular vascular primaria. La opción D se asocia al uso de antibióticos sistémicos, no a la morfología anastomótica.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 183." 
            },
            {
                id: 29, 
                question: "Un cirujano evalúa a un paciente con lesión mayor de la vía biliar. Además de las injurias tipo E5 (muy proximales/intrahepáticas), ¿qué entidad inflamatoria adyacente aguda contraindica de manera estricta la realización de una hepaticoduodenostomía?", 
                options: ["Úlcera péptica duodenal perforada", "Pancreatitis severa", "Colecistitis xantogranulomatosa", "Apendicitis aguda no complicada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la inflamación intensa de la cabeza del páncreas se extiende microscópicamente al arco duodenal, induciendo edema parietal masivo y microtrombosis. Esto vuelve al duodeno friable e inamovible, garantizando un desgarro isquémico si se intenta traccionarlo hacia la placa hepática.<br><br>Perla ENARM: \"Las contraindicaciones para la reparación mediante hepaticoduodenostomía incluyen a los pacientes con lesiones E5 o pancreatitis severa.\"<br><br>Análisis de Distractores: Las opciones A, C y D generan inflamación en cuadrantes que pueden manejarse sin impactar el estiramiento fisiológico del complejo pancreatoduodenal en fase crítica, a diferencia del edema severo originado primariamente en el páncreas.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 183." 
            },
            {
                id: 30, 
                question: "De acuerdo al recuento histórico de normativas preventivas para salvaguardar la vía biliar, ¿en qué año se instauró la guía multisocietaria precursora de SAGES enfocada en la colecistectomía segura antes de desarrollar la presente guía reconstructiva?", 
                options: ["2011", "2018", "2020", "2024"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el pilar de la seguridad quirúrgica hepatobiliar se cimentó globalmente cuando SAGES emitió su documento rector sobre cómo evitar el daño al triángulo de Calot (implementando la Visión Crítica de Seguridad) a inicios de la década pasada, separando conceptualmente la prevención (2020) de este documento actual de manejo reparador.<br><br>Perla ENARM: \"Una guía multi-societaria de SAGES fue creada en el año 2020 para la prevención de la lesión biliar recomendando estrategias de colecistectomía segura y referencia a un equipo HPB.\"<br><br>Análisis de Distractores: La opción A corresponde a normativas europeas aisladas (EAES). La opción B refiere al estándar de publicación de resultados de Strasberg. La opción D es el año de cierre de evidencia de la guía actual.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 105." 
            },
            {
                id: 31, 
                question: "En el único ensayo controlado aleatorizado de alta jerarquía evaluado (Omar et al., 2023), ¿cuál fue el comportamiento estadístico respecto a la estancia hospitalaria total al comparar a los pacientes intervenidos tempranamente frente a la cirugía tardía?", 
                options: ["Fue idéntica en ambos grupos de intervención", "Fue significativamente mayor en la reparación temprana", "Fue significativamente menor en la reparación temprana", "Fue dependiente de la técnica abierta empleada"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, curiosamente, el RCT documentó que intervenir precozmente sumó un menor número de días cama totales (-6 días de diferencia de medias) al evitar el periodo de espera extrahospitalaria con drenajes. Sin embargo, esto es superado por las catastróficas cifras de mortalidad y estenosis derivadas de operar antes de las 6 semanas, dictando que la recomendación se incline fuertemente a la cirugía tardía.<br><br>Perla ENARM: \"En el RCT de Omar et al., la longitud de estancia fue significativamente más larga después de la reparación tardía en comparación con la temprana (diferencia de medias de -6.00 días a favor de la temprana), aunque con una certeza de evidencia baja.\"<br><br>Análisis de Distractores: Las opciones A y B contradicen los datos agrupados numéricos crudos del ensayo. La opción D no fue la variable de separación principal del RCT (el factor temporal fue el eje).", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ1, Página 20." 
            },
            {
                id: 32, 
                question: "Al explorar el uso de la mínima invasión (cirugía robótica o laparoscópica) para la anastomosis bilioentérica, ¿cuál fue el volumen promedio de pérdida sanguínea intraoperatoria reportado en el metaanálisis de esta técnica emergente?", 
                options: ["50 ml", "135 ml", "400 ml", "850 ml"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la óptica magnificada (3D) y el manejo meticuloso con pinzas bipolares disminuyen drásticamente el trauma hiliar vascular. El abordaje MIS demostró una hemostasia superior frente a las grandes disecciones a cielo abierto, promediando apenas por encima de los 100 ml.<br><br>Perla ENARM: \"La revisión sistemática de anastomosis MIS tras lesión severa reveló un sangrado promedio de 135.9 ml con morbilidad comparable a los métodos abiertos.\"<br><br>Análisis de Distractores: La opción A subestima el nivel mínimo fisiológico de disección de la placa hepática. Las opciones C y D se acercan más a los promedios reportados históricamente en cirugías abiertas con hemorragias del ligamento hepatoduodenal.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 51." 
            },
            {
                id: 33, 
                question: "A nivel internacional, ¿cuál es el rango de duración operativa (tiempo de cirugía) promedio documentado para lograr confeccionar una reparación biliar definitiva por mínima invasión?", 
                options: ["40 a 50 minutos", "60 a 90 minutos", "190 a 330 minutos", "400 a 500 minutos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, aislar la vía biliar retraída de las adherencias circundantes, movilizar las asas yeyunales y realizar la sutura milimétrica intracorpórea es una proeza técnica compleja que demanda de 3 a 5 horas de concentración y pericia, incluso en manos expertas.<br><br>Perla ENARM: \"En el abordaje MIS para lesiones biliares, el promedio de duración operativa osciló entre los 190 y 330 minutos.\"<br><br>Análisis de Distractores: Las opciones A y B reflejan el tiempo de la colecistectomía primaria simple no complicada. La opción D denota casos con hemorragias masivas u otras injurias concomitantes que desbordan los promedios calculados.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 51." 
            },
            {
                id: 34, 
                question: "En décadas pasadas, cuando un cirujano general no especializado advertía de manera transoperatoria una lesión del colédoco durante el procedimiento laparoscópico, ¿qué dictaba la normativa tradicional que debía realizar inmediatamente?", 
                options: ["Derivación bilioentérica laparoscópica", "Conversión a cirugía abierta", "Colocación percutánea de un stent", "Ligadura completa del conducto"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el dogma histórico afirmaba que ante cualquier pérdida de continuidad o visión anatómica por fuga de bilis, la obligación medicolegal era abandonar la laparoscopia para explorar el daño mediante laparotomía subcostal, a menudo empeorando el trauma sin beneficio si no se era especialista.<br><br>Perla ENARM: \"La detección intraoperatoria de BDI durante la colecistectomía laparoscópica ha provocado tradicionalmente la conversión rutinaria a cirugía abierta.\"<br><br>Análisis de Distractores: Las opciones A y C requerían instrumental y habilidades de HPB que el cirujano general promedio carecía transitoriamente. La opción D secciona el flujo por completo, una maniobra desesperada que agrava isquemia masiva.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Introduction, Página 6." 
            },
            {
                id: 35, 
                question: "Al evaluar la letalidad aguda (riesgo de mortalidad), ¿qué tendencia estadística numérica (Odds Ratio 0.18) fue identificada al comparar el manejo endoscópico puro frente a la cirugía abierta, aunque mermada por un sesgo evidente de selección?", 
                options: ["Mayor riesgo de mortalidad en endoscopia", "Menor riesgo de mortalidad en endoscopia", "Riesgo de estenosis eliminado en endoscopia", "Riesgo idéntico de muerte en ambas opciones"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, evitar la laparotomía disipa el trauma metabólico adicional a corto plazo en un paciente críticamente enfermo. Sin embargo, el consenso advierte que las cifras de supervivencia mayor en endoscopia son ilusorias, ya que los pacientes más graves y destrozados (inestables) fueron asignados por exclusión al grupo de urgencia quirúrgica, elevando su letalidad basal artificialmente.<br><br>Perla ENARM: \"La tasa de mortalidad no fue significativamente diferente, pero mostró un OR de 0.18 favoreciendo al manejo no operatorio, aunque esto es oscurecido por la selección de lesiones leves para endoscopia.\"<br><br>Análisis de Distractores: La opción A es numéricamente errónea. La opción C es falsa (la endoscopia presenta más estenosis tardía). La opción D ignora la disparidad cuantitativa reportada a favor del endoscopio en la métrica aguda.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ3, Página 38." 
            },
            {
                id: 36, 
                question: "En la evaluación del riesgo de inflamación posprocedimiento en la vía biliar, ¿qué comportamiento demostró la probabilidad de desarrollar episodios de colangitis (OR 0.82) cuando se intentó resolver la iatrogenia mediante tratamiento endoscópico en lugar de cirugía?", 
                options: ["Fue drásticamente mayor en la terapia endoscópica", "Fue menor en la terapia endoscópica", "Dependió exclusivamente del uso de esteroides", "Garantizó ausencia de colangitis de por vida"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, no perturbar anatómicamente el flujo entero-biliar y la válvula esfinteriana (en comparación con crear una Y de Roux con estasis inicial) arrojó beneficios protectores modestos contra la translocación de bacterias piógenas al árbol hepático a corto plazo, logrando una tendencia de menor sepsis biliar ascendente en los primeros meses.<br><br>Perla ENARM: \"El manejo no operatorio (endoscópico) arrojó un OR de 0.82 para colangitis comparado con la intervención quirúrgica definitiva, sugiriendo un menor riesgo agudo.\"<br><br>Análisis de Distractores: Las opciones A y C se oponen a las asociaciones ponderadas registradas. La opción D es un desenlace clínico imposible en una vía biliar manipulada crónicamente por cuerpos extraños (stents).", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ3, Página 38." 
            },
            {
                id: 37, 
                question: "Un estudio enfocado en pacientes sometidos a corrección primaria biliar demostró que los teóricos beneficios de realizar la reparación de forma inmediata intraoperatoria se ven oscurecidos y derivan en altas tasas de fracaso anatómico, primordialmente debido a:", 
                options: ["La ausencia de una colangiografía transoperatoria", "El intento de reparación por especialistas no HPB", "La falta de uso de antibióticos de amplio espectro", "La realización de nudos extracorpóreos frágiles"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, aunque el centro cuente con los insumos y teóricamente el tejido aún no esté isquémico, el cirujano general primario comete errores de tensión, isquemia y calibre en la microanastomosis hiliar, siendo la impericia técnica del operador el factor causal abrumador en los reingresos de fuga biliar y estenosis posterior.<br><br>Perla ENARM: \"Las ventajas prospectivas de la reparación temprana en la mesa quirúrgica pueden verse oscurecidas por el hecho de que las reparaciones son intentadas con mayor frecuencia por especialistas no HPB.\"<br><br>Análisis de Distractores: Las opciones A, C y D constituyen fallas logísticas secundarias, pero el metaanálisis puntualiza rigurosamente la falta de adiestramiento reconstructivo subespecializado del cirujano índice como el catalizador principal de morbilidad temprana.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 50." 
            },
            {
                id: 38, 
                question: "Para mitigar la alta incertidumbre estadística y ayudar a estandarizar clínicamente la toma de decisiones, ¿qué herramienta u objeto de investigación sugiere el consenso desarrollar a futuro para definir si un paciente requiere cirugía temprana o tardía?", 
                options: ["Sistema de inteligencia artificial endoscópico", "Calculadora de riesgo tipo nomograma", "Inmunofluorescencia posoperatoria masiva", "Prueba genómica de cicatrización tisular"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, dada la complejidad y multiplicidad de factores biológicos interactuantes (sepsis, edad, isquemia, grado de Strasberg), proveer una herramienta matemática validada permitirá ponderar objetivamente si un individuo resistirá y se beneficiará más de intervenir en agudo frente al resguardo y reconstrucción diferida.<br><br>Perla ENARM: \"Una herramienta de calculadora de riesgo tipo nomograma para facilitar la toma de decisiones entre la reparación temprana y tardía basada en factores del paciente... sería de gran beneficio.\"<br><br>Análisis de Distractores: Las opciones A, C y D representan metodologías diagnósticas moleculares u ópticas incipientes que no ordenan y tabulan estadísticamente la variabilidad de desenlaces como un puntaje probabilístico de intervención.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Future research, Página 153." 
            },
            {
                id: 39, 
                question: "Al determinar los criterios de elegibilidad de los pacientes para emitir directrices sobre la reconstrucción quirúrgica anatómica, ¿qué grado patológico del sistema de clasificación de Strasberg fue excluido sistemáticamente por ser resolutivamente tratable mediante esfinterotomía aislada?", 
                options: ["Clase A", "Clase C", "Clase D", "Clase E1"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la fuga del muñón del cístico o canalículos superficiales menores (Strasberg A) implica un árbol biliar grueso y continuo, y solo requiere reducción de presión endoluminal por CPRE. Incluirlos con transecciones completas y graves hubiese falseado abrumadoramente las tasas de \"éxito\" de técnicas endoscópicas y quirúrgicas comparativas.<br><br>Perla ENARM: \"Las BDIs debían ser clasificadas como Strasberg B-E, excluyéndose específicamente las lesiones Strasberg A de la revisión sistemática reconstructiva.\"<br><br>Análisis de Distractores: Las opciones B, C y D envuelven la obstrucción intencionada, heridas laterales directas y disrupciones hiliares circunferenciales que representan amenazas de morbimortalidad que exigen terapias de alta demanda (quirúrgica o prótesis complejas).", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Literature search and eligibility, Página 9." 
            },
            {
                id: 40, 
                question: "Al analizar la eficacia anastomótica y comparando intervenciones de mínima invasión (MIS) contra cirugía abierta mayor, ¿cómo se traduce la diferencia estadística observacional para el riesgo a largo plazo de generar una estenosis isquémica biliar?", 
                options: ["MIS tiene un riesgo 7 veces mayor de estenosis", "MIS tiene un riesgo 3 veces mayor de estenosis", "Resultados comparables sin diferencia significativa", "La cirugía abierta elimina el riesgo absoluto de estenosis"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, aunque se reportó un OR matemático de 0.13 favoreciendo a la plataforma de mínima invasión, la p minúscula por imprecisión determinó que la vía de abordaje a la cavidad peritoneal no determina primariamente el fracaso de la microanastomosis; el éxito lo dicta la maestría del nudo libre de tensión. Ambas son válidas y comparables en manos subespecializadas.<br><br>Perla ENARM: \"La tasa de estenosis no fue significativamente diferente entre la reparación MIS y abierta (OR: 0.13; IC 0.01 - 3.11), exhibiendo resultados y morbilidad comparables.\"<br><br>Análisis de Distractores: Las opciones A y B imputan un falso deterioro anatómico al realizar micro-sutura intracorpórea. La opción D ignora la fisiopatología basal isquémica intrínseca del trauma biliar, la cual siempre conlleva un riesgo inherente (~10%) indistintamente de usar un bisturí o un puerto robótico.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ2, Página 34." 
            },
            {
                id: 41, 
                question: "Paciente asintomático sometido a colangiografía de control posterior a una colecistectomía difícil. El estudio de imagen evidencia una oclusión completa por grapa metálica de un conducto biliar derecho aberrante, sin evidencia de fuga del medio de contraste hacia la cavidad peritoneal. ¿A qué clase de la clasificación anatómica corresponde esta lesión?", 
                options: ["Strasberg A", "Strasberg C", "Strasberg D", "Strasberg E"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el sistema de Strasberg estratifica las iatrogenias biliares. La clase C se define específicamente por la transección o ligadura inadvertida de un conducto aberrante derecho que no presenta fuga biliar a la cavidad, manifestándose comúnmente con atrofia sectorial o alteraciones bioquímicas aisladas.<br><br>Perla ENARM: \"El sistema de clasificación de Strasberg evalúa la severidad... la lesión tipo C involucra un conducto derecho aberrante ocluido sin fuga.\"<br><br>Análisis de Distractores: La clase A (opción A) es una fuga del conducto cístico o lecho de Luschka. La clase D (opción C) es una lesión lateral de un conducto mayor con fuga. La clase E (opción D) implica pérdida de continuidad circunferencial del colédoco o hepático común.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Table 4, Página 11." 
            },
            {
                id: 42, 
                question: "Se planifica la reparación de una lesión biliar mediante la técnica de hepaticoduodenostomía. ¿Qué maniobra quirúrgica es un prerrequisito técnico indispensable para garantizar una anastomosis anatómicamente viable y libre de tensión?", 
                options: ["Aislamiento de un asa en Y de Roux de 60 cm", "Movilización sustancial del marco duodenal", "Resección del lóbulo caudado hepático", "Esfinterotomía endoscópica intraoperatoria"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, el duodeno se encuentra anclado en el retroperitoneo. Para abocarlo hacia el hilio hepático superior (porta hepatis) sin generar tracción isquémica en la línea de sutura, es obligatorio realizar una maniobra de Kocher extensa. Si existe inflamación severa local, esta maniobra está contraindicada por riesgo de desgarro.<br><br>Perla ENARM: \"La hepaticoduodenostomía puede ser desafiante si hay una inflamación sustancial... requiriendo que a mayor altura de la lesión, más movilización se necesite para la creación de una anastomosis libre de tensión.\"<br><br>Análisis de Distractores: La opción A es exclusiva de la técnica de hepaticoyeyunostomía. La opción C se reserva para abordajes oncológicos complejos del confluente biliar. La opción D no modifica la mecánica de la tensión anastomótica extraluminal.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 24." 
            },
            {
                id: 43, 
                question: "Paciente de 30 años con fuga biliar identificada a las 24 horas de la cirugía índice. El servicio de gastroenterología intervencionista desestima el caso para un manejo no operatorio (endoscópico). ¿Qué condición anatómica típica de la fase aguda contraindica mecánicamente la colocación de un stent biliar definitivo?", 
                options: ["Presencia de clips de titanio", "Sistema biliar descompresionado", "Ausencia de lesión vascular asociada", "Diámetro del colédoco mayor a 10 mm"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la pérdida activa de bilis hacia la cavidad peritoneal impide la presurización de los conductos, los cuales colapsan. Para que un endoscopista pueda franquear de manera segura el defecto y expandir una prótesis, requiere que los conductos estén tensos y dilatados, situación infrecuente en la detección inmediata de fugas mayores.<br><br>Perla ENARM: \"Típicamente se necesita una anatomía favorable con un sistema biliar dilatado en estos pacientes; aquellos con descubrimiento pronto de la lesión pueden no ser tan buenos candidatos para intervención endoscópica por esta razón.\"<br><br>Análisis de Distractores: Los clips (opción A) no impiden la canulación endoluminal. La ausencia de isquemia (opción C) mejora cualquier pronóstico. Un diámetro amplio (opción D) es el escenario ideal que facilita, no contraindica, la endoscopia.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ3, Página 21." 
            },
            {
                id: 44, 
                question: "Al evaluar la evidencia del único ensayo clínico aleatorizado (Omar 2023) sobre la temporalidad de la reconstrucción biliar, ¿qué falla metodológica condicionó que el metaanálisis lo clasificara con un alto riesgo de sesgo?", 
                options: ["Inclusión de pacientes pediátricos", "Falta de aleatorización ciega y controlada", "Tasa de abandono inexplicada del 17% en la cohorte séptica", "Ausencia de seguimiento más allá de 30 días"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la cohorte de intervención temprana de dicho ensayo agrupó tanto a pacientes estables como aquellos con sepsis activa. Sin embargo, perdió el seguimiento de casi 1 de cada 5 pacientes en el grupo séptico sin reportar sus desenlaces, lo que sesga gravemente las cifras de mortalidad y falla terapéutica reales.<br><br>Perla ENARM: \"El RCT (Omar et al) incluyó pacientes con y sin sepsis en la cohorte temprana, reportando una tasa de abandono inexplicada del 17% en la cohorte séptica, haciéndolo de alto riesgo de sesgo.\"<br><br>Análisis de Distractores: El estudio fue restringido a adultos (opción A). Sí fue aleatorizado prospectivamente (opción B). El seguimiento promedio fue de 24 meses, superando los 30 días (opción D).", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Evidence Discussion KQ1, Página 18." 
            },
            {
                id: 45, 
                question: "Durante la estructuración de la GPC a través del marco Evidence to Decision (EtD), ¿qué rol jerárquico desempeñó el análisis de costos hospitalarios en la emisión de las recomendaciones finales para el cirujano?", 
                options: ["Determinó la superioridad absoluta del abordaje endoscópico", "Restringió la cirugía robótica a hospitales universitarios", "Se consideró de forma narrativa pero no influyó en la decisión final al no existir un análisis formal", "Obligó a excluir la hepaticoyeyunostomía del algoritmo terapéutico"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, aunque el EtD exige evaluar el impacto económico y los recursos, la literatura mundial carece de estudios rigurosos de costo-efectividad sobre reconstrucciones biliares. Por ende, el panel discutió el tema pero basó sus sugerencias estrictamente en desenlaces clínicos de morbimortalidad y valores del paciente.<br><br>Perla ENARM: \"El costo fue considerado por el panel al crear las recomendaciones pero no influyó en la toma de decisiones generales ya que no se realizó un análisis formal de costos.\"<br><br>Análisis de Distractores: Las opciones A, B y D asumen penalizaciones económicas que el consenso explícitamente se abstuvo de dictaminar ante la falta de evidencia matemática monetaria estandarizada.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, EtD and formulation of recommendations, Página 11." 
            },
            {
                id: 46, 
                question: "Para facilitar la toma de decisiones estadísticas, el consenso asignó valores de utilidad (preferencia/deseabilidad) a cada desenlace clínico usando una escala cardinal estandarizada. ¿Qué valor numérico se asignó estrictamente al evento de muerte?", 
                options: ["1.0", "-1.0", "0.0", "0.5"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, en la medición de calidad de vida ajustada y análisis de utilidad (QALYs y EtD), se otorga matemáticamente un coeficiente de 0 al peor estado de salud concebible (muerte) y un 1 al bienestar total, permitiendo ponderar la gravedad de las complicaciones (como estenosis o colangitis) en valores intermedios decimales.<br><br>Perla ENARM: \"Se pidió a los miembros del panel que calificaran la utilidad de cada resultado en una escala cardinal de 0 a 1, siendo 0 la muerte y 1 el mejor estado de salud posible.\"<br><br>Análisis de Distractores: La opción A (1.0) corresponde al mejor estado de salud vital. Las opciones B y D no representan el anclaje matemático basal de mortalidad empleado universalmente en el sistema GRADE EtD evaluado.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Determining utility values, Página 9." 
            },
            {
                id: 47, 
                question: "Desde la perspectiva de equidad en salud (Health Equity) abordada en el consenso, ¿cuál es la principal barrera estructural de los hospitales periféricos o comunitarios que impide ofertar manejos no operatorios ante una lesión biliar grave?", 
                options: ["Incapacidad para realizar resonancia magnética urgente", "Ausencia de antibióticos de amplio espectro", "Falta de insumos para nutrición parenteral total", "Ausencia de especialistas en endoscopia avanzada y radiología intervencionista"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la canulación de conductos biliares colapsados o el abordaje percutáneo transhepático en vías no dilatadas requiere un nivel de subespecialización técnica que raras veces existe fuera de los centros de tercer nivel. Esto sesga a las poblaciones rurales a ser tratadas invariablemente con abordajes quirúrgicos abiertos.<br><br>Perla ENARM: \"Los especialistas en endoscopia y radiología intervencionista pueden no existir o no estar bien versados en las terapias específicas, limitando las opciones no operatorias disponibles en esas instituciones.\"<br><br>Análisis de Distractores: Las opciones A, B y C son recursos de atención médica estándar o de soporte crítico que no representan la limitante intervencionista primaria limitante para dilatar y colocar endoprótesis biliares complejas in situ.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Health Equity, Página 26." 
            },
            {
                id: 48, 
                question: "En el protocolo riguroso de seguimiento clínico institucional para pacientes post-reparación biliar, además de documentar la tasa de estenosis, la calidad de vida y las reintervenciones a largo plazo (5 a 10 años), ¿qué otro parámetro debe registrarse obligatoriamente?", 
                options: ["Mortalidad", "Sangrado de tubo digestivo", "Marcadores tumorales CA 19-9", "Formación de hernias incisionales"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la cirrosis biliar secundaria y las complicaciones por fallos tardíos de la anastomosis imponen una carga vital que reduce la supervivencia de la cohorte a lo largo de la década siguiente, haciendo de la letalidad general y específica un indicador crucial del éxito reconstructivo primario.<br><br>Perla ENARM: \"En particular, los datos de 5 a 10 años con respecto a la tasa de estenosis, la calidad de vida, la mortalidad y la reintervención para todos los tipos de reparación BDI serían de una importancia sustancial.\"<br><br>Análisis de Distractores: La opción B no es una secuela biliar pura. La opción C es tamizaje para malignidad exocrina o biliar primaria, no secundaria a iatrogenia. La opción D es un desenlace general de la pared abdominal, secundario e inferior en letalidad a las morbilidades hepáticas.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Monitoring and evaluation, Página 26." 
            },
            {
                id: 49, 
                question: "Al evaluar las dos técnicas quirúrgicas de derivación anatómica (hepaticoduodenostomía frente a hepaticoyeyunostomía), ¿cómo resultó el análisis estadístico puntual del riesgo de estenosis (OR 1.59)?",
