    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
    {
        id: 1, 
        question: "¿Cuál es el umbral de glucosa plasmática necesario para establecer el diagnóstico bioquímico de hiperinsulinismo endógeno?", 
        options: ["≤ 45 mg/dl", "≤ 55 mg/dl", "≤ 65 mg/dl", "≤ 75 mg/dl"], 
        answer: 1, 
        justification: "Justificación: De acuerdo a la guía de la Endocrine Society, la hipoglucemia mediada por insulina se define bioquímicamente por glucosa ≤ 55 mg/dl (3.0 mmol/L) junto con niveles de insulina inapropiadamente altos. Esta caída en la glucosa desencadena la cascada neuroglucopénica y autonómica.<br><br>Perla ENARM: La documentación de la tríada de Whipple en conjunto con este umbral glucémico es el estándar de oro absoluto antes de proceder con cualquier estudio de imagen de localización topográfica.<br><br>Análisis de Distractores: La opción A representa un umbral más bajo que algunos pacientes toleran de forma asintomática durante el ayuno prolongado, pero no es el límite de corte universal. Las opciones C y D corresponden a cifras normales o limítrofes que no desencadenan la respuesta autonómica clásica y no validan el diagnóstico funcional.", 
        source: "Approach to the Patient: Insulinoma, 2023, Diagnosis and Presentation, 1111." 
    },
    {
        id: 2, 
        question: "¿Cuál es la concentración sérica mínima de insulina requerida concomitantemente con hipoglucemia para confirmar la presencia de un insulinoma?", 
        options: ["≥ 1 µU/ml", "≥ 2 µU/ml", "≥ 3 µU/ml", "≥ 5 µU/ml"], 
        answer: 2, 
        justification: "Justificación: De acuerdo a las guías ENETS, una concentración de insulina ≥ 3 µU/ml durante un evento documentado de hipoglucemia indica secreción autónoma y no regulada de la hormona por un tumor neuroendocrino subyacente.<br><br>Perla ENARM: La secreción endógena de insulina en sujetos sanos se suprime casi por completo frente a la hipoglucemia; la falla en esta supresión fisiológica es el hallazgo patológico cardinal.<br><br>Análisis de Distractores: Las opciones A y B son valores por debajo del umbral diagnóstico que pueden presentarse durante la supresión fisiológica normal. La opción D es un valor alto que confirma firmemente el diagnóstico, pero no es el punto de corte mínimo establecido en las guías internacionales.", 
        source: "Neuroendocrine Tumours, 2024, Laboratory/Biochemical Diagnosis of Insulinomas, 193." 
    },
    {
        id: 3, 
        question: "¿Qué nivel sérico de péptido C, medido durante el episodio de hipoglucemia, es un criterio diagnóstico indispensable para el hiperinsulinismo endógeno?", 
        options: ["≥ 0.6 ng/ml", "≥ 1.0 ng/ml", "≥ 1.5 ng/ml", "≥ 2.0 ng/ml"], 
        answer: 0, 
        justification: "Justificación: De acuerdo a la guía Endocrine Society, un péptido C ≥ 0.6 ng/ml demuestra la escisión intracelular del pro-péptido y la secreción endógena continua de insulina, lo cual establece categóricamente el origen endógeno del exceso de hormona.<br><br>Perla ENARM: La medición simultánea de péptido C es el paso crítico y definitivo para descartar hipoglucemia facticia secundaria a la inyección subrepticia de insulina exógena.<br><br>Análisis de Distractores: Las opciones B, C y D representan niveles elevados que sin duda pueden presentarse en un insulinoma, pero el punto de corte diagnóstico mínimo para documentar falta de supresión endógena es 0.6 ng/ml.", 
        source: "Approach to the Patient: Insulinoma, 2023, Diagnosis and Presentation, 1111." 
    },
    {
        id: 4, 
        question: "¿Qué nivel sérico de proinsulina establece el diagnóstico confirmatorio de insulinoma durante un evento de hipoglucemia?", 
        options: ["≥ 1 pmol/L", "≥ 2 pmol/L", "≥ 3 pmol/L", "≥ 5 pmol/L"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al consenso clínico ENETS, niveles de proinsulina ≥ 5 pmol/L reflejan una alteración estructural en el procesamiento celular normal de la insulina, un hallazgo bioquímico característico de los tumores neuroendocrinos secretores inmaduros.<br><br>Perla ENARM: La proinsulina es el marcador con mayor precisión diagnóstica y sensibilidad para insulinoma frente a cualquier otra causa de hipoglucemia hiperinsulinémica en el adulto.<br><br>Análisis de Distractores: Las opciones A, B y C son valores suprimidos fisiológicamente en pacientes sanos durante el ayuno y no indican una disfunción patológica en el empaquetamiento o secreción de gránulos tumorales.", 
        source: "Neuroendocrine Tumours, 2024, Plasma Glucose and Insulin Concentrations, 194." 
    },
    {
        id: 5, 
        question: "¿Cuál es el límite máximo de beta-hidroxibutirato esperado durante la prueba de ayuno en un paciente con insulinoma?", 
        options: ["≤ 1.5 mmol/L", "≤ 2.0 mmol/L", "≤ 2.7 mmol/L", "≤ 3.5 mmol/L"], 
        answer: 2, 
        justification: "Justificación: De acuerdo a la guía de la Endocrine Society, el exceso de insulina endógena inhibe potentemente la lipólisis y la cetogénesis hepática, manteniendo el beta-hidroxibutirato ≤ 2.7 mmol/L de forma aberrante incluso en estados de ayuno prolongado.<br><br>Perla ENARM: Un aumento de beta-hidroxibutirato por encima de este umbral indica una respuesta cetogénica intacta compensatoria, permitiendo descartar firmemente la presencia de un insulinoma activo.<br><br>Análisis de Distractores: Las opciones A y B son valores bajos que pueden documentarse en insulinoma pero no constituyen el punto de corte diagnóstico exacto. La opción D indica cetogénesis activa fisiológica y descarta por completo el hiperinsulinismo endógeno.", 
        source: "Neuroendocrine Tumours, 2024, C-Peptide, Proinsulin and Beta-Hydroxybutyrate, 194." 
    },
    {
        id: 6, 
        question: "¿Qué porcentaje de los insulinomas se presenta en asociación directa con el síndrome de neoplasia endocrina múltiple tipo 1?", 
        options: ["5 a 10 %", "15 a 20 %", "25 a 30 %", "35 a 40 %"], 
        answer: 0, 
        justification: "Justificación: De acuerdo a la guía clínica ENETS, el insulinoma se asocia al síndrome de neoplasia endocrina múltiple tipo 1 en un 5 a 10 % de los casos globales, presentándose usualmente a edades más tempranas, con un curso clínico indolente y de forma multifocal.<br><br>Perla ENARM: Ante el diagnóstico transoperatorio o radiológico de múltiples tumores neuroendocrinos pancreáticos sincrónicos, se debe iniciar forzosamente el escrutinio genético para neoplasia endocrina múltiple tipo 1.<br><br>Análisis de Distractores: Las opciones B, C y D sobrestiman la prevalencia del síndrome hereditario. Más del 90 % de los insulinomas tienen una presentación genética esporádica y morfológicamente unicéntrica.", 
        source: "Approach to the Patient: Insulinoma, 2023, Incidence and Epidemiology, 1111." 
    },
    {
        id: 7, 
        question: "¿Cuál es la variante genética recurrente más común que se presenta hasta en el 30 % de los insulinomas esporádicos?", 
        options: ["Mutación en gen MEN1", "Mutación T372R en YY1", "Mutación en gen DAXX", "Mutación en gen ATRX"], 
        answer: 1, 
        justification: "Justificación: De acuerdo a directrices recientes ENETS, la mutación T372R en el gen Yin Yang 1 (YY1) actúa como activador transcripcional anómalo del gen de la insulina y es un hallazgo genético predominante en los insulinomas esporádicos.<br><br>Perla ENARM: Las alteraciones en los mecanismos de remodelación transcripcional de la cromatina juegan un papel central y fundamental en la patogénesis subyacente del insulinoma esporádico.<br><br>Análisis de Distractores: La opción A se asocia al síndrome hereditario, no al esporádico típico. Las opciones C y D (DAXX y ATRX) se correlacionan habitualmente con insulinomas malignos agresivos, fenotipo de alargamiento alternativo de telómeros y pronóstico sombrío.", 
        source: "Approach to the Patient: Insulinoma, 2023, Pathophysiology, 1112." 
    },
    {
        id: 8, 
        question: "¿Qué incremento en la glucosa plasmática tras la administración intravenosa de glucagón confirma una hipoglucemia inducida por insulina?", 
        options: ["≥ 10 mg/dl", "≥ 15 mg/dl", "≥ 20 mg/dl", "≥ 25 mg/dl"], 
        answer: 3, 
        justification: "Justificación: De acuerdo a la guía de la Endocrine Society, un aumento glucémico de ≥ 25 mg/dl tras administrar 1 mg de glucagón al final de la prueba de ayuno demuestra que existen reservas de glucógeno hepático conservadas debido a la supresión tónica de la glucogenólisis por el hiperinsulinismo.<br><br>Perla ENARM: Esta prueba dinámica es fundamental para diferenciar el insulinoma de las hipoglucemias paraneoplásicas originadas por el factor de crecimiento similar a la insulina tipo 2 (IGF-2) en tumores mesenquimales.<br><br>Análisis de Distractores: Las opciones A, B y C son incrementos subóptimos que sugieren depleción de glucógeno hepático, un hallazgo característico de pacientes sanos sometidos a ayuno prolongado o en hipoglucemias no mediadas por insulina.", 
        source: "Neuroendocrine Tumours, 2024, Glucagon Test, 194." 
    },
    {
        id: 9, 
        question: "¿Cuál es el estudio de imagen no invasivo considerado de primera línea para la localización topográfica inicial del insulinoma?", 
        options: ["Resonancia magnética simple", "Ultrasonido endoscópico", "Tomografía computarizada trifásica", "Gammagrafía con análogos de somatostatina"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al consenso de expertos ENETS, la tomografía computarizada con contraste multifásico es la modalidad inicial preferida gracias a su alta disponibilidad y capacidad de detectar lesiones hipervasculares durante la fase arterial pancreática temprana.<br><br>Perla ENARM: Debido a que la mayoría de los insulinomas miden menos de 2 cm, la optimización estricta de los protocolos de contraste intravenoso es vital para evitar resultados falsos negativos por lesiones isodensas.<br><br>Análisis de Distractores: La opción A es útil pero la tomografía suele preferirse inicialmente por practicidad y accesibilidad anatómica. La opción B es sumamente sensible pero invasiva y estrictamente operadora dependiente. La opción D es ineficaz debido a la baja expresión natural del receptor SSTR2 en el insulinoma benigno.", 
        source: "Pancreatic neuroendocrine tumors: Classification, 2018, Imaging, 1134." 
    },
    {
        id: 10, 
        question: "¿Qué receptor se encuentra sobreexpresado en más del 90 % de los insulinomas benignos, convirtiéndolo en un blanco diagnóstico ideal?", 
        options: ["Receptor de somatostatina tipo 2", "Receptor de péptido similar al glucagón tipo 1", "Receptor del factor de crecimiento endotelial vascular", "Receptor de factor de crecimiento derivado de plaquetas"], 
        answer: 1, 
        justification: "Justificación: De acuerdo a las guías clínicas ENETS, el receptor de péptido similar al glucagón tipo 1 (GLP-1R) se encuentra en alta densidad en casi todos los insulinomas benignos, facilitando su localización preoperatoria mediante tomografía por emisión de positrones con exendina-4.<br><br>Perla ENARM: El estudio de imagen molecular con exendina-4 marcada con Galio-68 posee una sensibilidad superior al 95 % para localizar microadenomas insulinómicos totalmente ocultos a métodos tomográficos convencionales.<br><br>Análisis de Distractores: La opción A se expresa pobremente en el insulinoma benigno clásico, limitando el uso del octreoscan. Las opciones C y D están involucradas en la angiogénesis de múltiples tumores neuroendocrinos sistémicos, pero no son blancos diagnósticos funcionales topográficos.", 
        source: "Minimally Invasive Resection of Occult Insulinomas, 2025, Introduction, 2." 
    },
    {
        id: 11, 
        question: "En pacientes con diagnóstico de insulinoma maligno, ¿qué receptor celular se sobreexpresa característicamente permitiendo la detección por imagen molecular?", 
        options: ["Receptor de somatostatina tipo 2", "Receptor de péptido similar al glucagón tipo 1", "Receptor de insulina", "Receptor beta adrenérgico"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al consenso norteamericano NANETS, durante la desdiferenciación a la malignidad, los insulinomas agresivos pierden la expresión del receptor GLP-1 pero incrementan de forma aberrante la expresión del receptor de somatostatina tipo 2 (SSTR2).<br><br>Perla ENARM: La imagen funcional con Galio-68 DOTATATE es la modalidad de elección incuestionable para la estatificación oncológica y evaluación de extensión metastásica en el insulinoma maligno.<br><br>Análisis de Distractores: La opción B se asocia fuertemente al fenotipo benigno e indolente. Las opciones C y D carecen de utilidad clínica práctica en la imagenología molecular por emisión de positrones para tumores neuroendocrinos.", 
        source: "Approach to the Patient: Insulinoma, 2023, Localization, 1112." 
    },
    {
        id: 12, 
        question: "¿Qué distancia mínima de seguridad debe existir entre el tumor y el conducto pancreático principal para considerar viable una enucleación?", 
        options: ["≥ 1 mm", "≥ 1.5 mm", "≥ 1.8 mm", "≥ 2 a 3 mm"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al consenso quirúrgico NANETS, la enucleación preservadora de parénquima está indicada en tumores menores de 2 cm que se ubican superficialmente y guardan una distancia de seguridad anatómica de al menos 2 a 3 mm del conducto principal.<br><br>Perla ENARM: Respetar este margen previene daños estructurales térmicos o mecánicos directos y reduce de forma significativa el riesgo de fístula pancreática postoperatoria clínicamente relevante.<br><br>Análisis de Distractores: Las opciones A, B y C establecen un margen de resección peligroso y demasiado estrecho que incrementa exponencialmente el riesgo de disrupción ductal mayor, requiriendo en estos escenarios una resección formal anatómica.", 
        source: "Pancreatic neuroendocrine tumors: Classification, 2018, Surgical Management, 1137." 
    },
    {
        id: 13, 
        question: "¿Cuál es el tratamiento quirúrgico indicado para un insulinoma grande e invasivo localizado en la cabeza del páncreas?", 
        options: ["Pancreatoduodenectomía", "Enucleación laparoscópica", "Pancreatectomía distal", "Pancreatectomía central"], 
        answer: 0, 
        justification: "Justificación: De acuerdo a la guía quirúrgica NANETS, las lesiones de gran tamaño, intraparenquimatosas profundas o con características de malignidad situadas en la cabeza pancreática requieren invariablemente una resección oncológica formal mediante el procedimiento de Whipple.<br><br>Perla ENARM: La enucleación está totalmente contraindicada en tumores grandes, profundos o que comprometen estructuras vasculares adyacentes debido al altísimo riesgo de fuga anastomótica masiva y resección marginal incompleta.<br><br>Análisis de Distractores: La opción B asume un riesgo desproporcionado en tumores grandes o profundos de la cabeza. La opción C es el abordaje oncológico estándar para lesiones de cuerpo y cola. La opción D se reserva para preservar parénquima en lesiones del cuello pancreático.", 
        source: "Pancreatic neuroendocrine tumors: Classification, 2018, Surgical Management, 1137." 
    },
    {
        id: 14,

        justification: "Justificación: De acuerdo a ensayos controlados aleatorizados en cirugía hepatobiliar, la administración de hidrocortisona sistémica perioperatoria en pacientes de alto riesgo (con páncreas blando o conductos finos) reduce significativamente la tasa de fístula pancreática al suprimir la cascada inflamatoria aguda secundaria a la disección y sección del frágil parénquima glandular.<br><br>Perla ENARM: El páncreas blando posee una altísima propensión a la isquemia marginal y necrosis del borde de transección, procesos fisiopatológicos que la terapia corticoidea modula de manera dirigida mejorando la cicatrización temprana.<br><br>Análisis de Distractores: La opción B reduce secreciones pero estudios fallan en demostrar prevención consistente y conllevan alto costo/efectos adversos. La opción C (octreotida) no ha demostrado beneficio universal en metaanálisis para prevención de fístulas. La opción D es un abordaje endoscópico profiláctico del esfínter de Oddi, no una intervención farmacológica sistémica.",
        source: "Evidence-Based Strategies for Mitigating Pancreatic Fistula After Distal Pancreatectomy, 2026, Discussion, 11."
    },
    {
        id: 70,
        question: "¿Mediante qué mecanismo periférico el everolimus ejerce su conocido y explotado efecto secundario hiperglucemiante en el paciente con insulinoma?",
        options: ["Aumento masivo de la lipólisis grasa", "Deterioro de captación de glucosa muscular", "Necrosis directa de los islotes tumorales", "Bloqueo del receptor de péptido similar al glucagón"],
        answer: 1,
        justification: "Justificación: De acuerdo a los estudios farmacodinámicos moleculares, además de frenar el crecimiento tumoral inhibiendo mTOR, el everolimus altera profundamente el metabolismo al bloquear la señalización de insulina en el tejido diana periférico (deteriorando la captación de glucosa en el músculo esquelético y suprimiendo la retroalimentación de la gluconeogénesis hepática).<br><br>Perla ENARM: Este severo estado de resistencia periférica inducido iatrogénicamente convierte al everolimus en un fármaco paliativo excepcional para revertir el coma hipoglucémico refractario en carcinomas neuroendocrinos inoperables.<br><br>Análisis de Distractores: La opción A describe el efecto del estrés catecolaminérgico. La opción C corresponde a citotóxicos alquilantes como la estreptozocina. La opción D bloquearía la amplificación secretora, pero no describe el potente mecanismo sistémico de acción de este fármaco específico.",
        source: "Approach to the Patient: Insulinoma, 2023, Everolimus, 1114."
    },
    {
        id: 71,
        question: "Si durante la exploración quirúrgica formal apoyada con ultrasonido intraoperatorio no es posible localizar de forma definitiva al insulinoma, ¿cuál es la conducta mandataria recomendada en el quirófano?",
        options: ["Pancreatectomía distal ciega profiláctica", "Terminación del procedimiento sin resección", "Pancreatoduodenectomía cefálica de rescate", "Colecistectomía y toma de biopsia linfática"],
        answer: 1,
        justification: "Justificación: De acuerdo a los consensos modernos de las sociedades quirúrgicas neuroendocrinas (NANETS/ENETS), la pancreatectomía distal a ciegas está formal y absolutamente proscrita. Si la ecografía transoperatoria en manos expertas falla en delimitar la lesión, se debe cerrar la cavidad abdominal y replantear el mapeo metabólico y molecular de forma electiva.<br><br>Perla ENARM: Resecar la cola del páncreas \"a ciegas\" guiados por la antigua estadística (donde se creía que la mayoría de los ocultos residían allí) resulta en un fracaso de curación en el 20 al 30 % de los casos y somete al paciente a una diabetes iatrogénica irreversible inaceptable.<br><br>Análisis de Distractores: Las opciones A y C imponen una morbilidad anatómica exocrina y endocrina masiva y permanente que vulnera la seguridad del paciente. La opción D no aporta resolución clínica alguna al hiperinsulinismo funcional subyacente de base.",
        source: "Pancreatic neuroendocrine tumors: Classification, 2018, Surgical Management, 1138."
    },
    {
        id: 72,
        question: "En la práctica clínica especializada, ¿cuál es la sensibilidad de detección estimada del PET/CT con receptores GLP-1 para insulinomas que han resultan indetectables (ocultos) en tomografías y resonancias previas?",
        options: ["Aproximadamente el 45 %", "Aproximadamente el 65 %", "Aproximadamente el 88 %", "Cercana al 100 %"],
        answer: 2,
        justification: "Justificación: De acuerdo a los análisis y revisiones sistemáticas oncológicas recientes, el estudio molecular por tomografía de emisión de positrones dirigido al GLP-1 logra \"desenmascarar\" e identificar exitosamente al tumor en más del 88.2 % de los pacientes que habían sido declarados con insulinoma oculto en la imagenología cruzada convencional (CT y MRI).<br><br>Perla ENARM: Convertir a un paciente de estado \"oculto\" a \"localizado\" permite abandonar enfoques invasivos crudos (como la cateterización arterial selectiva) e ir directamente a una enucleación laparoscópica mínimamente invasiva focalizada y curativa.<br><br>Análisis de Distractores: Las opciones A y B reflejan el pobre rendimiento de otras herramientas (como SSTR-PET) en el fenotipo benigno. La opción D es irreal, ya que sigue existiendo un margen de tumores falsos negativos donde la expresión del GLP-1R es pobre, especialmente si se desdiferencian a mayor grado de malignidad histológica.",
        source: "Minimally Invasive Resection of Occult Insulinomas, 2025, Abstract / Results, 1."
    },
    {
        id: 73,
        question: "Aunque menos del dos por ciento de todos los insulinomas ocurren fuera del tejido pancreático, ¿cuál es la ubicación anatómica extrapolada más comúnmente documentada de estas lesiones ectópicas?",
        options: ["Pared duodenal", "Parénquima esplénico", "Divertículo de Meckel", "Árbol biliar extrahepático"],
        answer: 0,
        justification: "Justificación: De acuerdo a las revisiones anatomopatológicas de series largas de pNETs, los insulinomas extrapancreáticos verdaderos son excepcionales (< 2 %), y cuando se presentan y confunden el diagnóstico topográfico, su asiento embrionario más constante se encuentra inmerso en la pared del duodeno proximal.<br><br>Perla ENARM: Buscar intencionadamente engrosamientos murales en el arco duodenal durante la endoscopía alta o el ultrasonido intraoperatorio es una maniobra mandatoria de rescate cuando el páncreas de un paciente con tríada de Whipple luce perfectamente sano y liso.<br><br>Análisis de Distractores: Las opciones B, C y D representan localizaciones mesenquimales descritas en reportes anecdóticos, pero estadísticamente inferiores frente a la alta prevalencia endocrina embrionaria natural que comparte el primordio neuroendocrino del tejido gastroduodenal.",
        source: "The functioning side of the pancreas: a review on insulinomas, 2019, Introduction, 1."
    },
    {
        id: 74,
        question: "Según los resultados del ensayo clínico PANDORINA, ¿qué estrategia en el uso de drenajes quirúrgicos disminuyó significativamente la fístula pancreática clínicamente relevante tras una resección distal?",
        options: ["Uso rutinario de sistemas cerrados", "Omisión selectiva de drenaje", "Uso de drenaje con succión continua", "Recambio temprano de tubo colector"],
        answer: 1,
        justification: "Justificación: De acuerdo al ensayo PANDORINA, prescindir activamente (omisión selectiva) de la colocación de un drenaje profiláctico intraabdominal en pacientes estratificados con bajo riesgo de fuga pancreática distal confiere una drástica reducción del riesgo (caída significativa de las fístulas B/C del 27 % al 12 %).<br><br>Perla ENARM: Los tubos de drenaje plásticos operan como cuerpos extraños biológicamente irritantes y perpetúan trayectos crónicos de presión negativa que desestabilizan y avivan las microrroturas capsulares exocrinas superficiales del páncreas sano circundante.<br><br>Análisis de Distractores: Las opciones A y C describen el paradigma dogma histórico, el cual ha demostrado ser perjudicial y pro-infeccioso cuando se emplea sin discriminación fisiológica en parénquimas de bajo riesgo y textura firme favorable. La opción D no modifica la cascada incitadora inicial del elastómero en la cama quirúrgica.",
        source: "Evidence-Based Strategies for Mitigating Pancreatic Fistula After Distal Pancreatectomy, 2026, Discussion, 8."
    },
    {
        id: 75,
        question: "¿Cuál fue la barrera clínica principal que relegó al abandono histórico al uso de difenilhidantoína (fenitoína) y verapamilo en el control médico del insulinoma?",
        options: ["Riesgo inminente de arritmias ventriculares", "Actividad hiperglucemiante inadecuada e ineficaz", "Alta tasa de toxicidad nefropática tubular", "Inducción acelerada de metástasis hepáticas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la directriz histórica farmacológica, medicamentos antiepilépticos bloqueadores de canales de sodio (fenitoína) o bloqueadores de calcio (verapamilo) probados en las décadas pasadas fallaron porque su respuesta fisiológica hiperglucemiante resultó irrisoriamente modesta y carente de poder absoluto para proteger el cerebro de los eventos neuroglucopénicos mayores.<br><br>Perla ENARM: Su débil inhibición de la degranulación endógena obligaba a titular a dosis máximas, precipitando toxicidad neurológica y cardiovascular iatrogénica sin erradicar jamás el síndrome, siendo definitivamente desbancados por el uso estandarizado universal del Diazóxido y los análogos de la somatostatina.<br><br>Análisis de Distractores: Las opciones A y C en este contexto específico confunden los perfiles de agentes quimioterapéuticos o de otra índole (como la estreptozocina renal). La opción D asume un efecto biológico oncológico pro-mitótico que no poseen en lo absoluto estas moléculas cardíacas o neurológicas.",
        source: "The functioning side of the pancreas: a review on insulinomas, 2019, Other medical treatments, 6."
    },
    {
        id: 76,
        question: "En el abordaje no invasivo inicial del insulinoma, ¿qué secuencia o combinación de secuencias de resonancia magnética ofrece la máxima precisión (AUC > 0.95) al combinarse con perfusión volumétrica?",
        options: ["Tomografía computarizada trifásica", "Resonancia magnética con difusión", "Tomografía por emisión de positrones", "Ultrasonido endoscópico con contraste"],
        answer: 1,
        justification: "Justificación: De acuerdo al estudio radiológico comparativo avanzado, la plataforma de Resonancia Magnética a 3 Tesla optimizada con imágenes ponderadas por difusión (DWI), al emparejarse con tomografía de perfusión volumétrica, alcanza áreas bajo la curva diagnósticas soberbias de 0.956, superando ampliamente a los escaneos convencionales puros sin difusión.<br><br>Perla ENARM: La alta celularidad estromal del tumor neuroendocrino restringe severamente el movimiento de moléculas de agua en el parénquima; identificar esta brillante \"restricción\" en DWI permite a los radiólogos expertos detectar formaciones microadenomatosas hiperintensas de menos de un centímetro ocultas en el parénquima pancreático normal.<br><br>Análisis de Distractores: Las opciones A y C se refieren a tecnologías de imagen basadas en rayos X o isótopos moleculares radiactivos (fuera del dominio de ondas de radiofrecuencia y magnetismo de las secuencias propias de la RMN). La opción D pertenece al terreno de la ecografía intervencionista.",
        source: "Insulinoma detection on low-dose pancreatic CT perfusion, 2025, Discussion, 8."
    },
    {
        id: 77,
        question: "Durante la resección distal del páncreas, ¿qué hemostático tópico específico demostró superioridad estadísticamente comprobada para evitar fístulas frente a la clásica esponja de fibrina?",
        options: ["Ligamento falciforme pediculado", "Malla de ácido poliglicólico", "Sellante de trombina y colágeno", "Parche seroso yeyunal modificado"],
        answer: 2,
        justification: "Justificación: De acuerdo a un reciente ensayo aleatorizado en cirugía pancreática, la matriz hemostática fluida de colágeno potenciada con trombina pura (CollaStat) arrojó resultados estadísticamente superiores para abatir la fístula grado B/C (8.3 % vs. 46.2 %) frente a sellantes más primitivos y tradicionales basados meramente en matrices de colágeno-fibrina.<br><br>Perla ENARM: Fisiopatológicamente, la adhesión mecánica por agregación plaquetaria sumada a la inducción fulminante de la cascada de coagulación mediada por trombina en el lecho exocrino distal produce un coágulo in situ más estructurado, robusto y resistente a la prematura digestión proteolítica.<br><br>Análisis de Distractores: Las opciones A y D refieren a coberturas autologas abdominales sin eficacia contundente comprobada general. La opción B (Neoveil) es útil y válida, pero la pregunta exige contrastar sellantes fluidos/esponjas puras derivados de factores hemostáticos biológicos.",
        source: "Evidence-Based Strategies for Mitigating Pancreatic Fistula After Distal Pancreatectomy, 2026, Discussion, 11."
    },
    {
        id: 78,
        question: "En el síndrome de neoplasia endocrina múltiple tipo 1 con diseminación glandular total (múltiples pNETs), ¿qué estudio invasivo preoperatorio diferencia inequívocamente la localización funcional exacta del insulinoma hipersecretor?",
        options: ["Tomografía computarizada trifásica", "Angiografía con estimulación con calcio", "Ultrasonido endoscópico focalizado", "Resonancia magnética con supresión"],
        answer: 1,
        justification: "Justificación: De acuerdo al consenso clínico neuroendocrino en síndromes familiares hereditarios, la presencia anatómica de un cúmulo de 15 a 20 microadenomas neuroendocrinos silentes (no funcionales) visualizados a lo largo del páncreas en el paciente MEN-1 inhabilitan a los estudios estáticos. Por ende, la inyección arterial selectiva con gluconato de calcio revela el mapeo funcional exclusivo (step-up en venas hepáticas) del único adenoma que sí es responsable genuino del hiperinsulinismo.<br><br>Perla ENARM: Sin el uso de esta provocación dinámica microvascular (IACIG), el cirujano corre el gravísimo riesgo de enuclear tres adenomas en el cuello y la cola al azar, fracasando rotundamente en resolver el síndrome sistémico hipoglucémico que emanaba del micro-insulinoma en la cabeza glandular intocada.<br><br>Análisis de Distractores: Las opciones A, C y D definen estructuras topográficas, tamaño y profundidad; muestran los pNETs, pero son completamente ciegas para determinar qué masa específica está fabricando y liberando la hormona patológica al torrente circulatorio.",
        source: "Approach to the Patient: Insulinoma, 2023, Localization, 1113."
    },
    {
        id: 79,
        question: "En un paciente con insulinoma maligno metastásico que exhibe recaída bioquímica e imagenológica años después de una terapia exitosa con Lutecio-177, ¿qué estrategia terapéutica sistemática está indicada?",
        options: ["Iniciar perfusión masiva con estreptozocina", "Retratamiento secuencial con ciclos de PRRT", "Hepatectomía oncológica extendida bilateral", "Iniciar diazóxido a dosis tóxicas máximas"],
        answer: 1,
        justification: "Justificación: De acuerdo a reportes oncológicos moleculares a largo plazo (2025), la terapia con radionúclidos de receptores peptídicos (PRRT) con 177Lu-DOTATATE demuestra una eficacia terapéutica y sintomática altamente reproducible al re-administrarse en ciclos secuenciales tras la recaída inicial, con una tasa de tolerancia renal y hematológica excelente sostenida.<br><br>Perla ENARM: La persistencia natural e inalterable de la sobreexpresión de los receptores SSTR2 en la biología clónica tumoral celular permite a los radioncólogos aplicar múltiples retratamientos a lo largo de 10 años, ofreciendo control duradero en enfermedad maligna difusa sistémica inoperable.<br><br>Análisis de Distractores: La opción A usa un alquilante en desuso, tóxico. La opción C está contraindicada oncológicamente por alta mortalidad al no lograr resección curativa del 90 %. La opción D sólo palía débilmente sin frenar progresión metabólica anatómica tumoral global.",
        source: "A case report of enduring benefit of sequential PRRT in malignant insulinoma, 2025, Conclusion, 5."
    },
    {
        id: 80,
        question: "De acuerdo a la morfología glandular intraoperatoria en la pancreatectomía distal, ¿qué espesor pancreático crítico es el principal validador biomecánico para optar y justificar el uso ventajoso de grapadoras reforzadas para abatir fístulas?",
        options: ["Grosor pancreático menor a 14 mm", "Diámetro del conducto mayor a 5 mm", "Presencia de textura glandular dura", "Invasión vascular mesentérica focal"],
        answer: 0,
        justification: "Justificación: De acuerdo al escrutinio meta-quirúrgico multicéntrico, el perfil del paciente con cuello de páncreas excepcionalmente delgado y aplastable (grosor < 14 mm) o pacientes con IMC elevado son quienes verdaderamente capitalizan la tecnología del cartucho de engrapado lineal reforzado, logrando ahí sí, reducir drásticamente el goteo por la línea de corte.<br><br>Perla ENARM: Forzar el cartucho reforzado en un páncreas con grosor hipertrófico engrosado genera una compresión y fractura de trituración hística acinar inadmisible y catastrófica que paradoxalmente fomenta y agudiza las peores fístulas grado C.<br><br>Análisis de Distractores: La opción B requeriría un cierre con pancreatoyeyunoanastomosis. La opción C se comporta de manera fibrótica protectora con casi cualquier tipo de línea de disección en frío o calor. La opción D asume un escenario de invasión maligna oncológica T4 ajeno a la dinámica de suturas y cierres herméticos del muñón.",
        source: "Evidence-Based Strategies for Mitigating Pancreatic Fistula After Distal Pancreatectomy, 2026, Discussion, 11."

        let userProgress = {};

            loadTheme();

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('insulinomaProgress');
                localStorage.removeItem('insulinomaLastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

            const isAllCompleted = ans === total && total > 0;

                : `<button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-rose-500 to-pink-600 hover:from-pink-600 hover:to-rose-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-pink-900/30 transition-transform hover:-translate-y-0.5">Continuar Aprendiendo</button>`;

            let titleText = isAllCompleted ? "¡Examen Finalizado!" : "UMAE 25 - R4";
            let descText = isAllCompleted 
                ? "Has completado con éxito todas las preguntas. Revisa tus las respuestas correctas/incorrectas en el tablero." 
                : "";

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-6xl mx-auto lg:mt-0">
                    
                    <!-- BREADCRUMB (Centrado en móvil, no hay botones flotantes interrumpiendo) -->
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <a href="login.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-pink-600 dark:text-slate-400 dark:hover:text-pink-400 font-semibold transition-colors text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            Regresar al Panel
                        </a>
                    </div>

                    <!-- HERO DYNAMIC -->

                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>

                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">

                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>

                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">

                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="BS06308GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('insulinomaProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('insulinomaLastQId', currentQuestionId);
                else localStorage.removeItem('insulinomaLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('insulinomaProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
