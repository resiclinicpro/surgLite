    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el hallazgo manométrico que define la acalasia tipo I según la clasificación de Chicago?", 
                options: ["Presurización esofágica pan-esofágica", "Contracciones prematuras espásticas", "Ausencia de peristalsis y presurización", "Peristalsis fragmentada mayor a 5 cm"], 
                answer: 2, 
                justification: "Justificación: El diagnóstico de los trastornos de la motilidad se basa en la manometría de alta resolución. De acuerdo GPC de Reconstrucción Esofágica, la acalasia tipo I se caracteriza clásicamente por la ausencia total de contracciones peristálticas sin evidencia de presurización esofágica, sumado a la falta de relajación del esfínter esofágico inferior.<br><br>Perla ENARM: La acalasia tipo I se define manométricamente por un esfínter esofágico inferior que no se relaja, ausencia de peristalsis y falta de presurización esofágica.<br><br>Análisis de Distractores: La opción A describe la acalasia tipo II. La opción B define a la acalasia tipo III. La opción D corresponde a un trastorno de la motilidad inespecífico o esófago fragmentado, no a un patrón clásico de acalasia.", 
                source: "Esophageal Disorders, 2025, Perioperative Care, 115." 
            },
            {
                id: 2, 
                question: "¿Cuál es el paso crítico omitido durante la primera cirugía que favorece la herniación de la funduplicatura al mediastino posterior?", 
                options: ["Sección de vasos gástricos cortos", "Aproximación de pilares diafragmáticos", "Calibración con bujía 60F", "Maniobra de lustrado de zapatos"], 
                answer: 1, 
                justification: "Justificación: Durante la reconstrucción y reparación antirreflujo, la crura diafragmática debe cerrarse adecuadamente. De acuerdo GPC de Reconstrucción Esofágica, la aproximación de los pilares derecho e izquierdo con suturas irreabsorbibles previene la herniación del fundus envuelto hacia el tórax y restablece la acción sinérgica del diafragma con el esfínter esofágico inferior.<br><br>Perla ENARM: El cierre anatómico de los pilares diafragmáticos es un paso obligatorio en la funduplicatura para prevenir la migración intratorácica de la válvula y restaurar la barrera antirreflujo.<br><br>Análisis de Distractores: La opción A facilita la creación de una válvula sin tensión, pero su omisión causa disfagia o desgarro. La opción C previene el ajuste excesivo de la válvula. La opción D asegura que se utilice el fundus y no el cuerpo gástrico.", 
                source: "The SAGES Manual of Foregut Surgery, 2019, Anatomy and Physiology of the Stomach and Pylorus, 99." 
            },
            {
                id: 3, 
                question: "¿Qué vaso sanguíneo proporciona la irrigación principal cuando se utiliza el colon izquierdo como conducto para reconstrucción esofágica?", 
                options: ["Arteria cólica media", "Arteria cólica derecha", "Rama ascendente cólica izquierda", "Arteria mesentérica superior"], 
                answer: 2, 
                justification: "Justificación: La viabilidad de un conducto colónico depende enteramente de su pedículo vascular. De acuerdo GPC de Reconstrucción Esofágica, en la técnica de interposición de colon izquierdo, el segmento transverso hasta la flexura esplénica es irrigado de forma isoperistáltica por la rama ascendente de la arteria cólica izquierda y drenado por la vena mesentérica inferior.<br><br>Perla ENARM: La interposición de colon izquierdo se basa vascularmente en la preservación de la rama ascendente de la arteria cólica izquierda y la vena mesentérica inferior.<br><br>Análisis de Distractores: La opción A es el pedículo principal para el injerto de colon derecho. La opción B se liga y secciona durante la preparación del colon derecho. La opción D es el origen vascular primario, pero no el pedículo de tracción directa en el injerto izquierdo.", 
                source: "Reconstructive Surgery of the Oesophagus and Stomach, 2025, Colon and Jejunum Interposition After Esophagectomy, 429." 
            },
            {
                id: 4, 
                question: "¿Cuál estructura anatómica conforma el triángulo de Laimer en la pared posterior de la unión faringoesofágica?", 
                options: ["Músculo constrictor faríngeo inferior", "Divertículo de Zenker", "Músculo cricofaríngeo", "Fibras musculares circulares internas"], 
                answer: 3, 
                justification: "Justificación: La transición del músculo estriado al liso en el esófago crea zonas de debilidad inherente. De acuerdo GPC de Reconstrucción Esofágica, por debajo del cartílago cricoides, la capa longitudinal externa del esófago se separa para insertarse en el tendón cricoesofágico, dejando expuestas únicamente las fibras musculares circulares internas. Esta brecha anatómica se conoce como triángulo de Laimer.<br><br>Perla ENARM: El triángulo de Laimer se ubica por debajo del músculo cricofaríngeo y está formado por la exposición de las fibras musculares circulares internas del esófago al separarse las fibras longitudinales.<br><br>Análisis de Distractores: Las opciones A y C delimitan el triángulo de Killian, ubicado superiormente y asociado al divertículo de Zenker (opción B).", 
                source: "The SAGES Manual of Foregut Surgery, 2019, Anatomy and Physiology of the Esophagus and Lower Esophageal Sphincter, 14." 
            },
            {
                id: 5, 
                question: "¿Cuál es el diámetro del globo recomendado para la sesión inicial de dilatación neumática escalonada en acalasia?", 
                options: ["30 mm", "20 mm", "35 mm", "40 mm"], 
                answer: 0, 
                justification: "Justificación: La dilatación neumática es el tratamiento no quirúrgico de primera línea en acalasia. Su objetivo es generar un desgarro controlado de las fibras musculares del esfínter esofágico inferior. De acuerdo GPC de Reconstrucción Esofágica, se recomienda un abordaje graduado que inicia invariablemente con un globo de 30 mm de diámetro, progresando a 35 mm o 40 mm en sesiones subsecuentes si los síntomas persisten.<br><br>Perla ENARM: La dilatación neumática escalonada en acalasia debe iniciar siempre con un globo de 30 mm, reservando diámetros mayores para dilataciones subsecuentes en caso de falla clínica.<br><br>Análisis de Distractores: La opción B es un diámetro ineficaz para la ruptura de fibras musculares. Las opciones C y D representan los diámetros utilizados en la segunda y tercera sesión respectivamente, si falla la dilatación inicial.", 
                source: "Esophageal Disorders, 2025, Perioperative Care, 93." 
            },
            {
                id: 6, 
                question: "¿Qué resección ósea se recomienda para evitar la compresión del conducto colónico en la ruta retroesternal?", 
                options: ["Tercio medio clavicular izquierdo", "Cabeza esternal clavicular izquierda", "Primera costilla derecha", "Manubrio esternal completo"], 
                answer: 1, 
                justification: "Justificación: El túnel retroesternal es un espacio anatómico limitado que alberga estructuras óseas rígidas en la entrada torácica. De acuerdo GPC de Reconstrucción Esofágica, se debe resecar rutinariamente la cabeza esternal de la clavícula izquierda para asegurar el paso holgado del conducto colónico sin compresión, previniendo la isquemia local o la estenosis mecánica del injerto en su trayecto hacia el cuello.<br><br>Perla ENARM: La resección de la cabeza esternal de la clavícula izquierda es un paso anatómico clave para ampliar la entrada torácica y prevenir la isquemia por compresión del conducto retroesternal.<br><br>Análisis de Distractores: La opción A no incide en el opérculo torácico interno. La opción C está en el lado contralateral a la vía de ascenso habitual. La opción D representa una morbilidad excesiva e innecesaria a menos que exista una patología subyacente severa.", 
                source: "Esophageal Cancer, 2023, Colonic Interposition After Esophagectomy, 186." 
            },
            {
                id: 7, 
                question: "¿Qué preparación intestinal específica se recomienda 1 a 2 días previos a una interposición colónica?", 
                options: ["Ayuno total absoluto", "Nutrición parenteral total", "Dieta hiperproteica", "Dieta líquida sin granos"], 
                answer: 3, 
                justification: "Justificación: La preparación óptima del conducto digestivo disminuye las complicaciones infecciosas y mecánicas postoperatorias. De acuerdo GPC de Reconstrucción Esofágica, antes de utilizar el colon como conducto de interposición, los pacientes deben someterse a una preparación intestinal mecánica estándar y seguir estrictamente una dieta líquida y libre de granos durante 1 a 2 días previos al procedimiento quirúrgico.<br><br>Perla ENARM: La preparación para interposición colónica exige una dieta líquida libre de granos 24 a 48 horas antes del evento quirúrgico para garantizar la limpieza mecánica de la luz intestinal.<br><br>Análisis de Distractores: La opción A induciría desnutrición aguda injustificada. La opción B no está indicada de forma rutinaria y aumenta el riesgo de infecciones de catéter. La opción C aumentaría la carga de residuos fecales.", 
                source: "Esophageal Cancer, 2023, Colonic Interposition After Esophagectomy, 184 (Basado en revisión de historial clínico de preparación preoperatoria)." 
            },
            {
                id: 8, 
                question: "¿Cuál es la indicación anatómica principal para realizar el procedimiento de interposición yeyunal de Merendino?", 
                options: ["Resección de esófago cervical", "Esofagectomía total", "Resección de unión gastroesofágica", "Derivación de esófago torácico"], 
                answer: 2, 
                justification: "Justificación: El procedimiento de Merendino busca preservar la función del reservorio gástrico mediante una restitución localizada. De acuerdo GPC de Reconstrucción Esofágica, esta técnica utiliza un asa de yeyuno interpuesta específicamente para reemplazar segmentos pequeños del esófago distal y la unión gastroesofágica en casos de displasia de alto grado o cáncer incipiente, manteniendo el estómago en su posición abdominal natural.<br><br>Perla ENARM: El procedimiento de Merendino (interposición yeyunal corta) es el abordaje de elección para restaurar la continuidad tras la resección anatómica localizada de la unión gastroesofágica.<br><br>Análisis de Distractores: Las opciones A y B requieren conductos de mayor longitud (ascenso gástrico o colónico). La opción D se refiere a procedimientos paliativos extraanatómicos y no a una interposición segmentaria corta funcional.", 
                source: "Reconstructive Surgery of the Oesophagus and Stomach, 2025, Oesophageal Replacement, 77." 
            },
            {
                id: 9, 
                question: "¿Cuál arteria debe preservarse de forma obligatoria durante la movilización gástrica, por ser la principal fuente de perfusión del conducto?", 
                options: ["Arteria gástrica izquierda", "Arteria gástrica derecha", "Arteria gastroepiploica izquierda", "Arteria gastroepiploica derecha"], 
                answer: 3, 
                justification: "Justificación: La supervivencia del conducto gástrico tubular depende exclusivamente de su red vascular distal. De acuerdo GPC de Reconstrucción Esofágica, la arteria gastroepiploica derecha se convierte en el flujo arterial dominante tras la ligadura sistemática de la gástrica izquierda, los vasos cortos y la gastroepiploica izquierda durante la esofagectomía, y su preservación es crítica para evitar la necrosis isquémica del ascenso gástrico.<br><br>Perla ENARM: La arteria gastroepiploica derecha es la fuente de perfusión principal e indispensable del conducto gástrico tras una esofagectomía.<br><br>Análisis de Distractores: La opción A es el pedículo principal del estómago nativo, pero se liga obligatoriamente para lograr la movilización y linfadenectomía. Las opciones B y C proporcionan flujo residual o se ligan para el ascenso torácico.", 
                source: "Cleveland Clinic Colorectal Case Studies, 2025, Esophagectomy: Approaches and Surgical Techniques, 379." 
            },
            {
                id: 10, 
                question: "¿Cuál es la dosis estándar de toxina botulínica utilizada en la inyección endoscópica para tratar la acalasia?", 
                options: ["50 unidades", "100 unidades", "150 unidades", "200 unidades"], 
                answer: 1, 
                justification: "Justificación: La inyección endoscópica de toxina botulínica bloquea la liberación de acetilcolina, disminuyendo la presión del esfínter de forma temporal. De acuerdo GPC de Reconstrucción Esofágica, el protocolo universal estandarizado consiste en inyectar 100 unidades de toxina botulínica distribuidas en cuatro cuadrantes, aproximadamente 1 cm por encima de la unión esofagogástrica.<br><br>Perla ENARM: El protocolo estándar para la inyección endoscópica de toxina botulínica en acalasia es de 100 unidades divididas en los cuatro cuadrantes del esfínter esofágico inferior.<br><br>Análisis de Distractores: Las opciones A, C y D corresponden a dosis subterapéuticas o tóxicas que no forman parte de los protocolos validados para trastornos motores esofágicos.", 
                source: "Esophageal Disorders, 2025, Perioperative Care, 92." 
            },
            {
                id: 11, 
                question: "Durante la cardioplastia quirúrgica para acalasia terminal, ¿qué característica debe tener la incisión en \"V\" de espesor total?", 
                options: ["Rama esofágica más larga", "Ramas de igual longitud", "Rama gástrica más larga", "Incisión asimétrica irregular"], 
                answer: 1, 
                justification: "Justificación: La geometría de la cardioplastia determina la amplitud final de la luz esofagogástrica reparada. De acuerdo GPC de Reconstrucción Esofágica, al realizar una cardioplastia abierta o laparoscópica, la incisión en forma de V invertida debe estructurarse rigurosamente con dos ramas de igual longitud (típicamente 5 cm hacia el estómago y 5 cm hacia el esófago) para evitar una distorsión anatómica al momento del cierre transversal.<br><br>Perla ENARM: En la cardioplastia en Y-V para reconstrucción de la unión esofagogástrica, es imperativo que las ramas esofágica y gástrica de la incisión tengan exactamente la misma longitud.<br><br>Análisis de Distractores: Las opciones A, C y D ocasionan pliegues asimétricos, invaginación mucosa y estenosis secundaria al generar un cierre lineal discordante.", 
                source: "Reconstructive Surgery of the Oesophagus and Stomach, 2025, Failed Heller's Myotomy and End-Stage Achalasia, 278." 
            },
            {
                id: 12, 
                question: "¿Qué procedimiento se utiliza para descompresión del estómago retenido tras una exclusión esofágica y división de la unión gastroesofágica?", 
                options: ["Gastrostomía de drenaje", "Gastrectomía subtotal", "Piloroplastia endoscópica", "Funduplicatura de Nissen"], 
                answer: 0,

            {

                justification: "Justificación: Las reintervenciones esofágicas por acalasia recidivante enfrentan fibrosis mediastínica severa. De acuerdo GPC de Reconstrucción Esofágica, si la miotomía primaria se realizó por el lado izquierdo (toracoscópico o laparoscópico), el abordaje de elección para la redo-miotomía es laparoscópico incidiendo el lado derecho del esófago, ya que esta superficie virgen se encuentra libre de las densas adherencias y tejido cicatrizal de la primera operación.<br><br>Perla ENARM: En una segunda intervención por miotomía fallida, la nueva incisión muscular debe realizarse vía laparoscópica sobre la cara derecha del esófago para evitar la fibrosis del abordaje original izquierdo.<br><br>Análisis de Distractores: Las opciones A y D enfrentan el lecho cruento fibrótico de mayor riesgo de perforación mucosa. La opción C incide sobre la cámara gástrica pura, fuera de la zona de alta presión esfinteriana.",

                question: "Debido al rico plexo linfático submucoso, ¿hacia dónde puede diseminarse el cáncer del esófago torácico medio de forma impredecible?",

        options: ["Reflujo biliar agudo e infección por Candida", "Pobre irrigación y fuga anastomótica previa", "Diámetro del tubo y uso de sutura manual", "Quimioterapia preoperatoria y edad avanzada"],

    {
        id: 30,
        question: "¿Qué alteración del ritmo cardíaco representa la disritmia más común (hasta 40%) en el postoperatorio de un paciente sometido a esofagectomía?",
        options: ["Taquicardia ventricular polimórfica sin pulso", "Bloqueo auriculoventricular de tercer grado", "Fibrilación auricular de respuesta ventricular rápida", "Extrasístoles ventriculares multifocales aisladas"],
        answer: 2,
        justification: "Justificación: El estrés quirúrgico mayor y la manipulación cercana a las venas pulmonares inducen irritabilidad eléctrica. De acuerdo GPC de Reconstrucción Esofágica, las complicaciones cardíacas posoperatorias alcanzan hasta un 40% en pacientes con esofagectomía intratorácica; siendo la fibrilación auricular el trastorno del ritmo más frecuente. Requiere una evaluación minuciosa para descartar isquemia miocárdica simultánea o alteraciones electrolíticas agudas, seguidas de cardioversión farmacológica rápida.<br><br>Perla ENARM: La fibrilación auricular es la disritmia cardíaca posoperatoria de mayor incidencia en pacientes tras una esofagectomía intratorácica mayor.<br><br>Análisis de Distractores: Las opciones A y B representan eventos terminales o raros no característicos de la irritabilidad por disección mediastínica. La opción D es un hallazgo inespecífico de menor trascendencia clínica en este contexto.",
        source: "Esophageal Cancer, 2023, Esophagectomy for End-Stage Achalasia, 87."
    },
    {
        id: 31,
        question: "En la confección de una yeyunostomía de alimentación post-esofagectomía, ¿a qué distancia distal del ligamento de Treitz debe situarse óptimamente la entrada del tubo?",
        options: ["5 a 10 cm", "20 a 30 cm", "40 a 50 cm", "60 a 70 cm"],
        answer: 1,
        justification: "Justificación: La correcta ubicación de la sonda enteral previene el reflujo y la oclusión del lumen. De acuerdo GPC de Reconstrucción Esofágica, al colocar un tubo de yeyunostomía tipo Witzel o de kit directo (ej. catéter MIC), el sitio de punción ideal se localiza entre 20 cm y 30 cm distales al ligamento de Treitz, asegurando un trayecto de fijación antirreflujo y preservando una laxitud adecuada que evite angulaciones al distenderse la cavidad abdominal.<br><br>Perla ENARM: El sitio de inserción estandarizado para una yeyunostomía de alimentación se encuentra de 20 a 30 cm distales al ángulo de Treitz.<br><br>Análisis de Distractores: La opción A sitúa el estoma en la tercera o cuarta porción duodenal. Las opciones C y D sacrifican segmento funcional absortivo valioso de manera innecesaria.",
        source: "Reconstructive Surgery of the Oesophagus and Stomach, 2025, Bridging Strategies and ‘Toolbox’ of Reconstruction, 56."
    },
    {
        id: 32,
        question: "¿Qué lesión neurológica yatrogénica se reporta en el 10% a 20% de los pacientes sometidos exclusivamente a una anastomosis esofagogástrica a nivel cervical?",
        options: ["Parálisis del nervio frénico izquierdo", "Lesión del nervio laríngeo recurrente", "Disfunción del tronco vagal posterior", "Neuropatía motora del plexo braquial"],
        answer: 1,
        justification: "Justificación: El abordaje de disección cervical profundo transita por zonas de alta densidad neural. De acuerdo GPC de Reconstrucción Esofágica, al movilizar el esófago cervical para construir la anastomosis, existe un riesgo intrínseco del 10% al 20% de lesionar los nervios laríngeos recurrentes. Esta morbilidad se manifiesta como disfonía, aspiración bronquial y tos persistente, un peligro letal para el paciente al tener un conducto gástrico carente de esfínteres anatómicos en el tórax.<br><br>Perla ENARM: La morbilidad neurológica predominante de la anastomosis cervical en esofagectomía es la lesión del nervio laríngeo recurrente.<br><br>Análisis de Distractores: La opción A afecta la hemidiafragmática pero no es típica del abordaje cervical superior. La opción C fue sacrificada rutinariamente en el tórax durante la extirpación tumoral. La opción D resulta de posicionamiento anómalo de extremidades, no de la incisión anatómica en sí.",
        source: "Esophageal Cancer, 2023, Esophagectomy: Approaches and Surgical Techniques, 395."
    },
    {
        id: 33,
        question: "¿Qué hallazgo intraluminal detectado durante la colonoscopia de escrutinio preoperatoria es una contraindicación absoluta para utilizar el colon en la reconstrucción esofágica?",
        options: ["Diverticulosis extensa", "Hemorroides internas grado II", "Melanosis cólica moderada", "Hipertrofia de válvula ileocecal"],
        answer: 0,
        justification: "Justificación: El uso del colon está sujeto a un examen de integridad estructural absoluto. De acuerdo GPC de Reconstrucción Esofágica, realizar una colonoscopia rutinaria es imperativo para certificar la idoneidad del tejido. Las patologías que contraindican categóricamente el uso del colon como injerto son la presencia de pólipos malignos sincrónicos, enfermedad inflamatoria intestinal activa y la diverticulosis extensa, debido al altísimo riesgo de microperforaciones, fugas locales y estenosis segmentarias.<br><br>Perla ENARM: La presencia de diverticulosis extensa diagnosticada por colonoscopia es una contraindicación formal para el uso del colon como conducto de reemplazo esofágico.<br><br>Análisis de Distractores: La opción B es un trastorno anorrectal distal irrelevante para el arco colónico proximal. La opción C es una pigmentación benigna asintomática por uso de laxantes. La opción D es un hallazgo morfológico no patológico.",
        source: "Esophageal Cancer, 2023, Esophagectomy for End-Stage Achalasia, 84."
    },
    {
        id: 34,
        question: "¿Cuál característica anatómica define a una funduplicatura \"deslizada\" o slipped Nissen causante de dolor epigástrico crónico y disfagia posoperatoria?",
        options: ["Migración intratorácica íntegra de los pilares", "Herniación del estómago sobre la válvula", "Ruptura transversal de las suturas gástricas", "Estenosis fibrótica reactiva del hiato esofágico"],
        answer: 1,
        justification: "Justificación: El fracaso anatómico de la cirugía antirreflujo tiene patrones mecánicos precisos. De acuerdo GPC de Reconstrucción Esofágica, un \"slipped Nissen\" o funduplicatura deslizada ocurre cuando la válvula antirreflujo, posicionada inicialmente de forma correcta, desciende o el cuerpo gástrico se hernia proximalmente a través de ella. Esto deja un segmento de la cámara gástrica estrangulado por encima del envoltorio, provocando retención ácida, dolor recurrente, y signos de obstrucción.<br><br>Perla ENARM: La funduplicatura deslizada se define anatómicamente por la herniación o desplazamiento del estómago proximal por encima de la válvula antirreflujo intacta.<br><br>Análisis de Distractores: La opción A describe una hernia hiatal recurrente o transhiatal, donde la unión y la válvula migran al tórax en conjunto. La opción C es la disrupción total de la funduplicatura. La opción D causa disfagia, pero es ajena a la cinemática del tejido gástrico sobre sí mismo.",
        source: "The SAGES Manual of Foregut Surgery, 2019, Management of Failed Anti-reflux Surgery, 87."
    },
    {
        id: 35,
        question: "Al tubularizar el estómago usando grapadoras lineales seriadas, ¿cuál es el diámetro diametral recomendado del conducto para garantizar vaciamiento sin isquemia?",
        options: ["1 a 2 cm", "4 a 5 cm", "7 a 8 cm", "10 a 11 cm"],
        answer: 1,
        justification: "Justificación: La geometría del nuevo esófago estomacal impacta en la oxigenación de la línea de grapas. De acuerdo GPC de Reconstrucción Esofágica, la tubularización del conducto gástrico se realiza progresando desde la incisura angularis hacia el fundus, debiendo formar un tubo de aproximadamente 4 a 5 cm de diámetro constante. Confeccionar conductos más estrechos (< 3 cm) aumenta drásticamente el riesgo de necrosis isquémica e interrupción capilar, predisponiendo a fugas anastomóticas severas.<br><br>Perla ENARM: En la reconstrucción con ascenso gástrico, el conducto tubular debe mantener un diámetro óptimo de 4 a 5 cm para asegurar la microcirculación capilar y prevenir complicaciones isquémicas.<br><br>Análisis de Distractores: La opción A condena el tejido a isquemia letal y estenosis oclusiva temprana. Las opciones C y D dejan un estómago residual excesivamente ancho y redundante, que causará acodamiento, éstasis y dilatación mediastínica postoperatoria.",
        source: "Esophageal Cancer, 2023, Esophagectomy for End-Stage Achalasia, 85."
    },
    {
        id: 36,
        question: "Comparando las rutas quirúrgicas en la esofagectomía, ¿cuál es la principal desventaja fisiopatológica de realizar la anastomosis esofagogástrica a nivel cervical?",
        options: ["Incapacidad intrínseca para tratar fugas contenidas", "Mayor tasa de dehiscencia por tensión e isquemia", "Riesgo inminente de fístula aortoesofágica masiva", "Mayor incidencia de quilotórax torácico intratable"],
        answer: 1,
        justification: "Justificación: Las leyes de la perfusión determinan la supervivencia del injerto ascendido. De acuerdo GPC de Reconstrucción Esofágica, el abordaje cervical exige elongar el conducto gástrico a su máxima capacidad anatómica. Al alejar el punto de sutura de su pedículo arterial base (la arteria gastroepiploica derecha), la anastomosis del cuello sufre mayor isquemia relativa y tensión mecánica comparada con una anastomosis intratorácica baja (Ivor Lewis), triplicando estadísticamente la incidencia de fugas anastomóticas.<br><br>Perla ENARM: La anastomosis esofagogástrica cervical tiene una tasa de dehiscencia significativamente mayor que la anastomosis intratorácica debido a la isquemia distal del conducto y la tensión mecánica por elongación.<br><br>Análisis de Distractores: La opción A es falsa, de hecho, las fugas cervicales son más fáciles de drenar hacia el exterior. Las opciones C y D están relacionadas a la técnica de disección oncológica mediastínica profunda, independientes de dónde termine ubicada la unión luminal final.",
        source: "Esophageal Cancer, 2023, Esophagectomy: Approaches and Surgical Techniques, 383."
    },
    {
        id: 37,
        question: "¿Qué tecnología emergente se utiliza intraoperatoriamente como coadyuvante visual para certificar el estado de perfusión microvascular de un conducto colónico antes de realizar la anastomosis?",
        options: ["Gammagrafía isotópica con tecnecio-99m", "Angiografía con verde de indocianina", "Pletismografía de impedancia bioeléctrica", "Oximetría de pulso fotopletismográfica transmural"],
        answer: 1,
        justification: "Justificación: La evaluación clínica subjetiva subestima áreas de isquemia crítica. De acuerdo GPC de Reconstrucción Esofágica, el uso de la angiografía de fluorescencia mejorada en el infrarrojo cercano mediante la administración endovenosa de verde de indocianina (ICG) es una técnica moderna e inestimable en el quirófano para evaluar en tiempo real la integridad microvascular de los colgajos tisulares y anastomosis en el colon o estómago, permitiendo al cirujano descartar porciones hipoperfundidas.<br><br>Perla ENARM: La angiografía intraoperatoria con verde de indocianina (ICG) es el método tecnológico de elección para asegurar la viabilidad vascular de los márgenes en los conductos de interposición.<br><br>Análisis de Distractores: La opción A es un estudio metabólico nuclear postoperatorio o crónico, inútil transquirúrgicamente. Las opciones C y D no tienen utilidad anatómica descriptiva topográfica en la sala quirúrgica estéril para vísceras.",
        source: "Esophageal Cancer, 2023, Colonic Interposition After Esophagectomy, 185."
    },
    {
        id: 38,
        question: "En el monitoreo agudo tras esofagectomía, ¿qué marcador bioquímico analizado directamente desde el líquido de drenaje torácico funge como el predictor temprano más versátil y exacto de una fuga anastomótica?",
        options: ["Amilasa libre o total", "Deshidrogenasa láctica tisular", "Proteína C reactiva serosa", "Fosfatasa alcalina alcalina"],
        answer: 0,
        justification: "Justificación: Detectar saliva libre en la pleura es patognomónico de ruptura del tubo digestivo. De acuerdo GPC de Reconstrucción Esofágica, el análisis seriado de los niveles de amilasa directamente en el efluente del drenaje pleural es una prueba bioquímica sencilla, económica y altamente predictiva. Un aumento súbito y elevado de amilasa en el tórax precede a los signos sistémicos sépticos y sugiere con alta especificidad la presencia de una comunicación (fuga) con el lumen esofágico-gástrico salival.<br><br>Perla ENARM: La detección temprana de niveles altos de amilasa en el líquido del drenaje pleural es el marcador diagnóstico más predictivo de una fuga anastomótica pos-esofagectomía.<br><br>Análisis de Distractores: Las opciones B y C son marcadores inflamatorios y destructivos inespecíficos hallados tras toda toracotomía masiva. La opción D se altera primariamente en vía biliar u ósea, sin valor discriminatorio en mediastinitis.",
        source: "Esophageal Cancer, 2023, Esophagectomy: Approaches and Surgical Techniques, 389."
    },
    {
        id: 39,
        question: "En la técnica clásica de Ivor Lewis para resección de adenocarcinomas de la unión, ¿a qué nivel mediastínico exacto se debe confeccionar idealmente la anastomosis esofagogástrica intratorácica?",
        options: ["Inmediatamente suprahiatal subdiafragmática", "A nivel o por encima de la vena ácigos", "Exclusivamente en el vértice pleural derecho", "A la altura de las venas pulmonares inferiores"],
        answer: 1,
        justification: "Justificación: La obtención de un margen oncológico proximal libre de enfermedad en el tórax inferior dictamina la altura de la sección. De acuerdo GPC de Reconstrucción Esofágica, la esofagectomía parcial mediante el abordaje de Ivor Lewis (laparotomía y toracotomía derecha) requiere resecar generosamente la porción afectada del esófago distal, estipulando realizar el cruce y la reconstrucción anastomótica (usualmente mecánica circular) sistemáticamente al nivel del cayado de la vena ácigos, o levemente por encima de esta.<br><br>Perla ENARM: La anastomosis esofagogástrica intratorácica en la técnica de Ivor Lewis debe ser localizada clásicamente a nivel del arco de la vena ácigos.<br><br>Análisis de Distractores: La opción A no garantiza un margen esofágico oncológico de >5 cm. La opción C pertenece a la fase torácica superior, usual del abordaje de McKeown. La opción D es demasiado distal y condena a un margen histológico marginal o positivo en neoplasias cardiales.",
        source: "Esophageal Cancer, 2023, Esophagectomy: Approaches and Surgical Techniques, 380."
    },
    {
        id: 40,
        question: "En un paciente que experimenta disfagia refractaria documentada por fracaso inicial a una miotomía de Heller, ¿cuál es la tasa de éxito clínico esperable al someterlo subsecuentemente a una dilatación neumática?",
        options: ["20% a 30%", "40% a 50%", "60% a 82%", "90% a 95%"],
        answer: 2,
        justification: "Justificación: El algoritmo escalonado permite medidas de rescate menos invasivas antes de una esofagectomía. De acuerdo GPC de Reconstrucción Esofágica, las directrices de la ISDE (International Society for Diseases of the Esophagus) establecen firmemente que la dilatación neumática debe ser el procedimiento no quirúrgico de rescate recomendado tras una miotomía de Heller o técnica POEM fallidas, brindando tasas reportadas de éxito de alivio sintomático que oscilan sólidamente entre el 60% y el 82%.<br><br>Perla ENARM: La dilatación neumática de rescate posterior al fracaso de una miotomía de Heller inicial cuenta con una tasa de éxito clínico reportada del 60% al 82%.<br><br>Análisis de Distractores: Las opciones A y B subestiman la utilidad de esta terapia puente, incentivando de forma errónea una cirugía radical precoz. La opción D es falsamente optimista y representa únicamente las tasas de éxito curativo del tratamiento miotómico primario en un paciente virgen de tratamiento.",
        source: "Annals of Esophagus, 2025, Esophagectomy for end-stage achalasia, 5."
    },
            {
                id: 41, 
                question: "¿Cuál es el criterio radiográfico indispensable que define morfológicamente un megaesófago en el contexto de una acalasia terminal?", 
                options: ["Nivel hidroaéreo >10 cm", "Diámetro transversal >6 cm", "Diámetro transversal >4 cm", "Ausencia de cámara gástrica"], 
                answer: 1, 
                justification: "Justificación: La progresión de la enfermedad motora esofágica resulta en un fracaso estructural severo. De acuerdo GPC de Reconstrucción Esofágica, el diagnóstico de acalasia terminal o en etapa final se sustenta radiográficamente cuando los estudios baritados evidencian una dilatación masiva catalogada como megaesófago, la cual se define por un diámetro transversal >6 cm, asociado a angulación distal y adopción de una morfología sigmoidea (esófago en sigmoide).<br><br>Perla ENARM: La acalasia terminal se define radiográficamente por la presencia de un megaesófago con un diámetro transversal >6 cm y morfología tortuosa sigmoidea.<br><br>Análisis de Distractores: La opción A es un hallazgo común de retención, pero no el criterio biométrico definitorio de megaesófago. La opción C es una dilatación moderada que aún puede responder a miotomía. La opción D ocurre en hernias hiatales gigantes, no en acalasia.", 
                source: "Foregut Surgery, 2020, Esophagectomy for End-Stage Achalasia, 79." 
            },
            {
                id: 42, 
                question: "Tras realizar una miotomía de Heller para el tratamiento de acalasia, ¿qué técnica de funduplicatura está formalmente contraindicada para prevenir el reflujo postoperatorio?", 
                options: ["Funduplicatura total de Nissen", "Funduplicatura anterior de Dor", "Funduplicatura posterior de Toupet", "Funduplicatura de Belsey Mark IV"], 
                answer: 0, 
                justification: "Justificación: La adición de una válvula antirreflujo es mandatoria tras destruir el esfínter inferior, pero la motilidad del cuerpo esofágico es nula. De acuerdo GPC de Reconstrucción Esofágica, se debe realizar una funduplicatura parcial (como Dor de 180° o Toupet de 270°) para prevenir el reflujo sin generar obstrucción. La creación de una funduplicatura total de Nissen (360°) está absolutamente contraindicada, ya que el esófago aperistáltico de la acalasia no posee la fuerza motora para vencer la resistencia de un envoltura completa, causando disfagia refractaria inmediata.<br><br>Perla ENARM: En cirugía de acalasia, la funduplicatura total de Nissen está contraindicada por generar obstrucción severa ante la ausencia de peristalsis esofágica, debiendo utilizarse válvulas parciales.<br><br>Análisis de Distractores: Las opciones B y C son los procedimientos de elección recomendados universalmente tras la miotomía. La opción D es un abordaje transtorácico (240°) que puede emplearse en escenarios muy seleccionados, pero el Nissen es la contraindicación absoluta.", 
                source: "Foregut Surgery, 2020, Comparison of Different Treatment Modalities, 95." 
            },
            {
                id: 43, 
                question: "En comparación con la miotomía de Heller laparoscópica, ¿qué complicación fisiológica a largo plazo presenta una incidencia significativamente mayor tras una miotomía endoscópica peroral (POEM)?", 
                options: ["Disfagia residual severa", "Fístula traqueoesofágica", "Enfermedad por reflujo gastroesofágico", "Retraso del vaciamiento gástrico"], 
                answer: 2, 
                justification: "Justificación: La técnica POEM carece del componente antirreflujo mecánico de la cirugía tradicional. De acuerdo GPC de Reconstrucción Esofágica, aunque la POEM tiene tasas de éxito equivalentes para el alivio de la disfagia (92.7%), los pacientes sometidos a este abordaje endoscópico tienen un riesgo sustancialmente mayor de desarrollar enfermedad por reflujo gastroesofágico (ERGE), esofagitis erosiva severa y exposición ácida anormal documentada por pH-metría en comparación con la miotomía laparoscópica asociada a funduplicatura parcial.<br><br>Perla ENARM: La principal desventaja y complicación a largo plazo de la miotomía endoscópica peroral (POEM) es la alta incidencia de enfermedad por reflujo gastroesofágico.<br><br>Análisis de Distractores: La opción A se alivia de manera similar a la vía laparoscópica. Las opciones B y D no son complicaciones inherentes o prevalentes en las miotomías confinadas al espacio submucoso.", 
                source: "Foregut Surgery, 2020, Comparison of Different Treatment Modalities, 97." 
            },
            {
                id: 44, 
                question: "¿Cuál es el sitio anatómico más frecuente donde se desarrollan las fugas anastomóticas tras una gastrectomía en manga (sleeve gastrectomy)?", 
                options: ["Porción distal del antro gástrico", "Borde superior bajo el ángulo de His", "Curvatura menor a nivel de incisura", "Anastomosis gastroduodenal anterior"], 
                answer: 1, 
                justification: "Justificación: La fisiología de la perfusión y la resistencia mecánica predisponen puntos de falla en las líneas de grapas largas. De acuerdo GPC de Reconstrucción Esofágica, la isquemia relativa por tensión y la alta presión intraluminal provocan que las fugas de la gastrectomía en manga se desarrollen de manera casi exclusiva en el extremo más proximal de la línea de grapado, anatómicamente situado justo por debajo del ángulo de His, cercano a la unión esofagogástrica.<br><br>Perla ENARM: El sitio clásico y más frecuente de fuga tras una gastrectomía en manga es la porción superior de la línea de grapas, inmediatamente caudal al ángulo de His.<br><br>Análisis de Distractores: Las opciones A y C poseen un aporte vascular más robusto y están sujetas a menor tensión circunferencial. La opción D no aplica, ya que la gastrectomía en manga no altera el píloro ni el duodeno.", 
                source: "Reconstructive Surgery of the Oesophagus and Stomach, 2025, Leaks Following Bariatric Surgery, 183." 
            },
            {
                id: 45, 
                question: "Durante la reintervención quirúrgica por miotomía previa fallida secundaria a cicatrización fibrótica extensa, ¿cuál es el sitio topográfico de elección para realizar la nueva incisión muscular?", 
                options: ["En el lecho exacto de la miotomía previa", "Exclusivamente en la vertiente gástrica", "En el aspecto posterior intratorácico", "En la cara opuesta del esófago anterior"], 
                answer: 3, 
                justification: "Justificación: Trabajar sobre tejido inflamatorio crónico aumenta drásticamente la morbilidad. De acuerdo GPC de Reconstrucción Esofágica, cuando un paciente requiere una segunda cirugía (re-miotomía) debido a cicatrización del borde distal de la miotomía original, el abordaje más seguro consiste en movilizar el fundus para exponer toda la pared esofágica y efectuar una nueva miotomía directamente en la cara opuesta (sana) a la cicatriz previa, evadiendo la fibrosis densa y el riesgo de desgarro mucoso.<br><br>Perla ENARM: La re-miotomía quirúrgica por acalasia recurrente exige realizar el corte sobre la cara opuesta del esófago para evitar el tejido cicatrizal de la cirugía original.<br><br>Análisis de Distractores: La opción A garantiza la perforación mucosa por falta de planos de clivaje. La opción B omite la zona de alta presión del esfínter inferior. La opción C es de difícil acceso en abordajes abdominales anteriores estandarizados.", 
                source: "Foregut Surgery, 2020, Persistent or Recurrent Symptoms After Heller Myotomy, 73." 
            },
            {
                id: 46, 
                question: "En el abordaje quirúrgico transhiatal para esofagectomía, ¿cuál es la ventaja fisiológica principal en comparación con la técnica transtorácica de Ivor Lewis?", 
                options: ["Menor incidencia de parálisis de cuerda vocal", "Menor tasa de dehiscencia de anastomosis", "Menor incidencia de complicaciones respiratorias", "Mayor recuperación de ganglios mediastínicos"], 
                answer: 2, 
                justification: "Justificación: La elección del abordaje quirúrgico evalúa un equilibrio entre el riesgo cardiopulmonar y el alcance oncológico. De acuerdo GPC de Reconstrucción Esofágica, la esofagectomía transhiatal moviliza el esófago a través del hiato de forma roma hacia el cuello, obviando por completo la necesidad de una toracotomía. Esta omisión otorga como ventaja fisiológica primordial una reducción sustancial de complicaciones respiratorias, dolor postoperatorio y neumonía, comparado con técnicas transtorácicas.<br><br>Perla ENARM: La principal ventaja de la esofagectomía transhiatal radica en la evitación de la toracotomía, lo que disminuye significativamente la morbilidad respiratoria postoperatoria.<br><br>Análisis de Distractores: Las opciones A y B son precisamente las desventajas de la técnica transhiatal, pues la anastomosis cervical tiene mayor riesgo de fuga y lesión del nervio laríngeo recurrente. La opción D es superior en abordajes transtorácicos (Ivor Lewis o McKeown).", 
                source: "Thoracic Surgery Clerkship, 2024, Esophagectomy: Approaches and Surgical Techniques, 348." 
            },
            {
                id: 47, 
                question: "En el algoritmo de manejo agudo de una ingestión cáustica severa comprobada, ¿qué medida está formalmente contraindicada?", 
                options: ["Tomografía computarizada de tórax", "Inserción de sonda nasogástrica", "Insuflación endoscópica mínima", "Reposición intensiva de líquidos"], 
                answer: 1, 
                justification: "Justificación: Las maniobras ciegas exacerban el daño tisular químico inicial. De acuerdo GPC de Reconstrucción Esofágica, en el paciente sintomático o con hallazgos de lesión corrosiva, están absolutamente contraindicadas la colocación de sondas nasogástricas, el uso de agentes neutralizantes, los eméticos y la administración rutinaria de corticosteroides, dado el inminente riesgo de inducir arcadas, necrosis transmural o perforación franca de una pared friable.<br><br>Perla ENARM: En la lesión esofágica aguda por cáusticos, la inserción de una sonda nasogástrica, inducir el vómito y el uso de neutralizantes están contraindicados por el alto riesgo de perforación y exacerbación térmica.<br><br>Análisis de Distractores: Las opciones A y D son pilares mandatorios en la resucitación y estadificación aguda (evaluación de necrosis transmural). La opción C se permite bajo visión directa durante la endoscopia diagnóstica cuidadosa en las primeras 48 horas.",

            {

                question: "¿En qué momento histórico de la cronología post-lesión corrosiva se debe iniciar la vigilancia endoscópica anual ante el riesgo de carcinoma escamocelular (30%)?", 
                options: ["1 año posterior a la lesión", "5 años posteriores a la lesión", "10 años posteriores a la lesión", "20 años posteriores a la lesión"],

            {
                id: 49, 
                question: "En la técnica quirúrgica de exclusión esofágica por partición gástrica, ¿cuál dispositivo se emplea sistemáticamente para el drenaje directo de la curvatura menor adherida al esófago excluido?", 
                options: ["Tubo en T de Kehr", "Sonda nasoyeyunal distal", "Catéter de Foley anclado", "Drenaje torácico de silicón"], 
                answer: 2, 
                justification: "Justificación: La exclusión requiere controlar los efluentes para frenar la sepsis y evitar la dilatación ciega. De acuerdo GPC de Reconstrucción Esofágica, en el procedimiento de partición gástrica, la porción de la curvatura menor que se deja intencionalmente conectada al esófago requiere un drenaje activo. Esto se logra introduciendo un catéter de Foley fijado con una jareta, exteriorizado a través de la pared abdominal, el cual desvía la saliva y secreciones del segmento cerrado al exterior.<br><br>Perla ENARM: La exclusión esofágica mediante partición del estómago exige el uso de un catéter de Foley insertado en la curvatura menor aislada para establecer una gastrostomía de drenaje pasivo.<br><br>Análisis de Distractores: La opción A drena la vía biliar. La opción B garantiza la nutrición pero no descomprime el bolsón esofágico superior ciego. La opción D se encarga del espacio pleural mediastínico, no del lumen digestivo.",

            {
                id: 50, 
                question: "Para prevenir la segmentación de la cavidad abscesada al utilizar terapia de vacío endoluminal (EsoSponge), ¿dónde debe posicionarse estrictamente la esponja en las primeras fases?",

                justification: "Justificación: La física de fluidos de la terapia de vacío dicta la contracción espacial del absceso. De acuerdo GPC de Reconstrucción Esofágica, en la fase aguda del manejo de una dehiscencia con cavidad contenida, es de suma importancia introducir y posicionar la EsoSponge directamente \"dentro\" de la cavidad extraluminal a través de la perforación (y no solo en el lumen esofágico). De no hacer esto, se corre el riesgo de un cierre prematuro del orificio, atrapando pus residual y causando segmentación o tabicación de la cavidad primaria.<br><br>Perla ENARM: La esponja de terapia de vacío endoluminal debe alojarse directamente en el interior de la cavidad periesofágica abscesada para evitar el cierre luminal prematuro y la partición séptica de la colección.<br><br>Análisis de Distractores: La opción A se usa solo cuando la cavidad es inexistente o mínima (<1 cm). Las opciones C y D son sitios anatómicamente desconectados del origen infeccioso primario de interés.",

            {

                question: "¿Cuál es el tratamiento intervencionista de primera línea ante el vaciamiento gástrico retrasado severo post-esofagectomía?", 
                options: ["Piloroplastia de Heineke-Mikulicz", "Dilatación endoscópica e inyección de toxina botulínica", "Derivación gastroyeyunal en Y de Roux", "Piloromiotomía quirúrgica abierta"], 
                answer: 1, 
                justification: "Justificación: El manejo inicial de complicaciones funcionales privilegia procedimientos mínimamente invasivos. De acuerdo GPC de Reconstrucción Esofágica, ante un vaciamiento gástrico retrasado postoperatorio provocado por el espasmo pilórico y la atonía (vagotomía), el tratamiento inicial consta de dilatación endoscópica transiluminada del esfínter pilórico combinada con inyección focal de toxina botulínica. La intervención quirúrgica se reserva únicamente para fallos endoscópicos repetidos o alteraciones anatómicas por redundancia severa.<br><br>Perla ENARM: La primera línea de tratamiento intervencionista para el vaciamiento gástrico retrasado post-esofagectomía es la dilatación pilórica endoscópica junto con la inyección de toxina botulínica.<br><br>Análisis de Distractores: Las opciones A y D son terapias de rescate quirúrgico si falla el abordaje endoscópico inicial. La opción C es una cirugía derivativa extrema innecesaria para un espasmo esfinteriano distal simple.",

                question: "¿Qué complicación fisiopatológica subyace en un paciente que, meses después de un abordaje de funduplicatura, presenta saciedad temprana, dolor postprandial intenso y una imagen endoscópica de estómago bilobulado o deforme sobre el diafragma?",

                answer: 1, 
                justification: "Justificación: El fracaso por deslizamiento (\"slipped Nissen\") genera una obstrucción gástrica segmentaria. De acuerdo GPC de Reconstrucción Esofágica, un slipped Nissen se caracteriza porque el fundus o el cuerpo gástrico superior resbala intratorácicamente por el hiato, pasando por encima y por el medio de una funduplicatura que mantiene su constricción, dividiendo mecánicamente el estómago en dos compartimentos y causando dolor severo tipo isquémico o distensión agudos con la ingesta.<br><br>Perla ENARM: La imagen de \"estómago bilobulado\" asociado a dolor postprandial y disfagia denota clásicamente una funduplicatura deslizada (slipped Nissen), en la cual la cámara gástrica migró por encima de la válvula ajustada.<br><br>Análisis de Distractores: La opción A describe una hernia sin partición gástrica restrictiva aguda local. La opción C abole la función del esfínter, cursando primordialmente con reflujo libre masivo. La opción D se presenta puramente con disfagia sólida, sin morfología bilobulada.",

                options: ["Esternotomía media y reparación directa", "Toracoscopia izquierda y uso de malla", "Toracotomía posterolateral derecha y colgajo muscular", "Cervicotomía transversa y uso de parche"],

                justification: "Justificación: El daño incidental a la vía aérea membranosa posterior es una complicación temida y letal de la disección roma transhiatal. De acuerdo GPC de Reconstrucción Esofágica, si ocurre una ruptura traqueal, se debe suspender la maniobra transhiatal y acceder de emergencia mediante una toracotomía posterolateral derecha. La reparación requiere visualización directa total y la aposición obligatoria de un colgajo muscular pediculado (ej. intercostal) para cubrir el defecto y prevenir una temible fístula traqueoesofágica postoperatoria.<br><br>Perla ENARM: La lesión traqueal durante una esofagectomía transhiatal requiere conversión inmediata a toracotomía derecha para reparación primaria y cobertura obligatoria con colgajos musculares pediculados.<br><br>Análisis de Distractores: La opción A proporciona pésimo acceso a la tráquea membranosa posterior. La opción B enfrenta el arco aórtico, bloqueando la visión del defecto. La opción D solo permite ver los primeros anillos traqueales.", 
                source: "Foregut Surgery, 2020, Esophagectomy for End-Stage Achalasia, 87."

            {

                question: "¿En qué plano anatómico exacto del mediastino superior y cuello debe desarrollarse la disección caudal a la escotadura yugular para crear un túnel retroesternal vascularmente seguro?", 
                options: ["Posterior a músculos pretiroideos y anterior al timo", "Directamente posterior a la fascia bucofaríngea", "Anterior a los cuerpos vertebrales cervicales", "Anterior a la glándula tiroides y tejido celular"],

                question: "Ante el hallazgo de una perforación esofágica instrumental asintomática contenida en el mediastino durante una endoscopia diagnóstica, ¿cuál es la conducta terapéutica inicial de elección?",

                question: "En el paciente joven con esófago de Barrett de segmento corto y displasia de alto grado refractaria a métodos ablativos endoscópicos, ¿cuál técnica permite restituir el tránsito asumiendo la preservación total del estómago?",

                justification: "Justificación: Reemplazar segmentos ultra cortos y benignos aboga por opciones fisiológicas que eviten el vaciamiento rápido o reflujo severo. De acuerdo GPC de Reconstrucción Esofágica, en displasias recalcitrantes del esófago distal se recomienda la técnica de Merendino. Esta realiza una resección en bloque de la unión y el esófago inferior, y utiliza un colgajo corto de asa yeyunal isoperistáltica interpuesta entre el esófago sano y el estómago, conservando este último en su nicho intraabdominal y manteniendo intacto el reservorio gástrico.<br><br>Perla ENARM: El procedimiento de Merendino utiliza un asa interpuesta isoperistáltica de yeyuno para reemplazar resecciones locales en la unión gastroesofágica, lo cual evita secuelas funcionales al preservar toda la cámara gástrica.<br><br>Análisis de Distractores: La opción A es una cirugía mayor masiva indicada si se requiere sustitución subtotal completa. La opción C es mecánicamente inadecuada. La opción D erradica irremediablemente el estómago superior y exige anastomosis en el cuello.",

            {

                question: "En la reparación directa de una perforación esofágica con contaminación extensa, se suele utilizar un parche muscular. ¿Qué estructura anatómica proporciona el colgajo idóneo mediante su resección subperióstica lateral local?",

                question: "Histopatológicamente, ¿qué característica intrínseca patognomónica de la neoplasia define la elegibilidad formal para aplicar la resección endoscópica de la mucosa (REM) con fines curativos en adenocarcinoma esofágico temprano?", 
                options: ["Limitación estricta al espesor de la muscular propia", "Tumoración exofítica >5 cm", "Presencia de focos en anillo de sello", "Infiltración confinada a la mucosa sin invasión linfovascular"],

                source: "Cáncer de Esófago, 2024, Tratamiento Estadios 0 a I, 202."

            {

                answer: 2, 
                justification: "Justificación: El diagnóstico de los trastornos motores primarios depende de mediciones presiométricas exactas. De acuerdo GPC de Reconstrucción Esofágica, la acalasia se define manométricamente por la falla en la relajación del esfínter esofágico inferior, documentado mediante una presión de relajación integrada (IRP) consistentemente mayor a 15 mmHg, sumado a la pérdida de la peristalsis esofágica normal.<br><br>Perla ENARM: La presión de relajación integrada mayor a 15 mmHg en la manometría de alta resolución es el hallazgo clave que confirma la falla de relajación esfinteriana en la acalasia.<br><br>Análisis de Distractores: Las opciones A y B representan valores de relajación esfinteriana normales o en el límite superior, que descartan el diagnóstico clásico de acalasia. La opción D es un valor patológico pero excede el límite de corte mínimo diagnóstico estandarizado universalmente.",

                options: ["5 cm", "7 cm", "9 cm", "11 cm"], 
                answer: 0,

                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                            </button>

                    </div>

            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('SOFAGECTOMIAProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('SOFAGECTOMIALastQId', currentQuestionId);
                else localStorage.removeItem('SOFAGECTOMIALastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('SOFAGECTOMIAProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
