                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>
    </div>
    
    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el tiempo mínimo de ayuno recomendado antes de realizar una manometría de alta resolución?", 
                options: ["2 horas", "4 horas", "8 horas", "12 horas"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], el protocolo estándar exige un periodo de ayuno para garantizar la seguridad del paciente y la calidad del estudio, permitiendo únicamente el consumo de cantidades mínimas de líquidos claros.<br><br>Perla ENARM: \"Prior to the procedure, patients should fast for at least 4 hours (small amounts of clear fluid allowed) and informed consent should be obtained.\"<br><br>Análisis de Distractores: La opción A es un tiempo insuficiente para asegurar el vaciamiento gástrico; las opciones C y D son tiempos habituales para procedimientos quirúrgicos bajo anestesia general, pero exceden el requerimiento mínimo de esta prueba funcional.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 3.1, Página 4." 
            },
            {
                id: 2, 
                question: "¿Cuál es el umbral diagnóstico de la mediana de presión de relajación integrada en posición supina con sistemas Medtronic?", 
                options: ["≥ 12 mmHg", "≥ 15 mmHg", "≥ 22 mmHg", "≥ 25 mmHg"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], los umbrales de la presión de relajación integrada (IRP) varían según el equipo y la posición; para el sistema Medtronic en decúbito, el corte patológico es de 15 mmHg.<br><br>Perla ENARM: \"Threshold for median IRP in the supine position is 15 mmHg for Medtronic systems and 22 mmHg for Laborie/Diversatek systems.\"<br><br>Análisis de Distractores: La opción A corresponde al umbral en posición vertical; la C es el umbral para equipos Laborie; la D es el valor de corte utilizado durante los tragos de alimento sólido.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 3.2.1, Página 6." 
            },
            {
                id: 3, 
                question: "¿Qué métrica manométrica evalúa el vigor de la contracción del cuerpo esofágico?", 
                options: ["Latencia distal", "Presión de relajación integrada", "Integral contráctil distal", "Punto de desaceleración contráctil"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], la integral contráctil distal (DCI) es la medida que integra la amplitud, duración y longitud de la contracción para determinar su fuerza o vigor.<br><br>Perla ENARM: \"Distal Contractile Integral (DCI) – Contractile Vigor: Amplitude × duration × length (mmHg•s•cm) of the distal esophageal contraction exceeding 20 mmHg.\"<br><br>Análisis de Distractores: La opción A evalúa el tiempo de inhibición; la B evalúa la relajación de la unión esofagogástrica; la D es un punto de referencia temporal para medir la latencia.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Tabla 1, Página 6." 
            },
            {
                id: 4, 
                question: "¿A partir de qué valor de la integral contráctil distal se define un trago como hipercontráctil?", 
                options: ["> 450 mmHg•s•cm", "> 5,000 mmHg•s•cm", "> 8,000 mmHg•s•cm", "> 10,000 mmHg•s•cm"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], un trago se clasifica como hipercontráctil cuando su DCI supera los 8,000 mmHg•s•cm, valor que es consistente a través de diferentes sistemas de manometría.<br><br>Perla ENARM: \"Hypercontractile Swallow: DCI greater than 8,000 mmHg•s•cm.\"<br><br>Análisis de Distractores: La opción A es el límite inferior de una contracción normal; la B es un valor obsoleto de clasificaciones previas; la D se asocia frecuentemente a casos graves de esófago en martillo neumático pero no es el umbral mínimo diagnóstico.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 3.2.2, Página 6." 
            },
            {
                id: 5, 
                question: "¿Cuál es el umbral de tiempo para definir una contracción como prematura mediante la latencia distal?", 
                options: ["< 3.0 s", "< 4.5 s", "< 5.0 s", "< 6.2 s"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], la latencia distal (DL) inferior a 4.5 segundos en presencia de una contracción vigorosa (DCI ≥ 450) define la prematuridad característica del espasmo.<br><br>Perla ENARM: \"Premature/spastic contraction: DL <4.5 seconds in setting of a DCI ≥450 mmHg•s•cm.\"<br><br>Análisis de Distractores: La opción A es un valor arbitrario sin relevancia diagnóstica; la C y D se relacionan con las medidas de brechas peristálticas en la motilidad inefectiva.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Tabla 1, Página 6." 
            },
            {
                id: 6, 
                question: "¿Cuál es el valor del contorno isobárico para definir la presencia de presurización panesofágica?", 
                options: ["≥ 15 mmHg", "≥ 20 mmHg", "≥ 30 mmHg", "≥ 70 mmHg"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], la presurización panesofágica se identifica como un aumento de presión uniforme en todo el cuerpo esofágico que alcanza o supera los 30 mmHg.<br><br>Perla ENARM: \"Panesophageal pressurization: isobaric contour of ≥30 mmHg.\"<br><br>Análisis de Distractores: La opción A es el umbral de IRP; la B es el umbral para presurización intrabolo; la D es un valor mencionado como guía para sospechar espasmo embebido en casos de acalasia.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 3.2.4, Página 7." 
            },
            {
                id: 7, 
                question: "¿Qué porcentaje mínimo de tragos con presurización panesofágica se requiere para el diagnóstico de Acalasia tipo II?", 
                options: ["≥ 10%", "≥ 20%", "≥ 50%", "100%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], la acalasia tipo II se define por la falla peristáltica total y la presencia de presurización panesofágica en al menos una quinta parte de las degluciones.<br><br>Perla ENARM: \"Type II Achalasia: Abnormal median IRP, 100% failed peristalsis, & ≥20% swallows with panesophageal pressurization.\"<br><br>Análisis de Distractores: La opción A es insuficiente para el criterio; la C es el umbral de falla para IEM; la D es el requisito de la falla peristáltica, pero no de la presurización concomitante.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Tabla 3, Página 10." 
            },
            {
                id: 8, 
                question: "¿Cuál es el número estándar de tragos húmedos realizados en la posición vertical durante el protocolo de Chicago v4.0?", 
                options: ["3 tragos", "5 tragos", "10 tragos", "15 tragos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], el protocolo riguroso incluye una fase en bipedestación o posición sentada donde se deben registrar cinco degluciones de agua.<br><br>Perla ENARM: \"Next, at least five 5 ml wet swallows are performed [in the upright position].\"<br><br>Análisis de Distractores: La opción A es el número de inspiraciones profundas para documentar posición; la C es el estándar para la posición supina inicial; la D es la suma de los tragos basales en ambas posiciones.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 3.1, Página 4." 
            },
            {
                id: 9, 
                question: "¿Qué volumen de agua se utiliza para realizar el reto de bebida rápida en posición vertical?", 
                options: ["50 ml", "100 ml", "200 ml", "500 ml"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], esta maniobra de provocación evalúa la reserva peristáltica y la obstrucción mediante la ingesta veloz de 200 ml de agua.<br><br>Perla ENARM: \"Finally, one rapid drink challenge (RDC) with 200 ml water, ingested as fast as possible through a straw, is performed.\"<br><br>Análisis de Distractores: Las opciones A y B son volúmenes insuficientes para estresar adecuadamente la unión esofagogástrica; la D es un volumen excesivo que podría comprometer la tolerancia del paciente al estudio.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 3.1, Página 4." 
            },
            {
                id: 10, 
                question: "¿Cuál es el criterio para el diagnóstico de motilidad esofágica inefectiva en cuanto a tragos fallidos?", 
                options: ["≥ 20%", "≥ 30%", "≥ 50%", "> 70%"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], se ha vuelto más estricto el diagnóstico de IEM, requiriendo que al menos la mitad de los tragos sean completamente fallidos (DCI < 100).<br><br>Perla ENARM: \"Ineffective Esophageal Motility: Normal median IRP, with >70% ineffective swallows or ≥50% failed peristalsis.\"<br><br>Análisis de Distractores: La opción A es el umbral para espasmo; la B no tiene base normativa; la D es el umbral requerido si se incluyen tragos débiles o fragmentados dentro de la cuenta.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 12.1, Página 16." 
            },
            {
                id: 11, 
                question: "¿Qué porcentaje de contracciones prematuras define un diagnóstico manométrico conclusivo de espasmo esofágico distal?", 
                options: ["≥ 10%", "≥ 20%", "≥ 50%", "≥ 80%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], el hallazgo de espasmo debe ser recurrente en al menos el 20% de las degluciones para ser considerado un diagnóstico sólido.<br><br>Perla ENARM: \"A conclusive manometric diagnosis of DES is defined as presence of at least 20% of premature contractions.\"<br><br>Análisis de Distractores: La opción A es insuficiente; las opciones C y D indican mayor severidad pero el umbral mínimo establecido es el 20%.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 10.1, Página 14." 
            },
            {
                id: 12, 
                question: "¿Qué hallazgo en el IRP es indispensable para el diagnóstico de contractilidad ausente?", 
                options: ["IRP anormal supino", "IRP anormal vertical", "IRP normal en ambas posiciones", "IRP limítrofe (10-15 mmHg)"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], la contractilidad ausente se diferencia de la acalasia por la capacidad de la unión esofagogástrica de relajarse normalmente en ambas posiciones de prueba.<br><br>Perla ENARM: \"A conclusive diagnosis for absent contractility is defined as normal median IRP in the supine and upright position and 100% failed peristalsis.\"<br><br>Análisis de Distractores: Las opciones A y B clasificarían el trastorno como acalasia o EGJOO; la D se considera un valor inconcluso que obliga a descartar acalasia tipo I con pruebas de apoyo.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 9, Página 14." 
            },
            {
                id: 13, 
                question: "¿Cuál es el hallazgo adicional necesario en posición supina para el diagnóstico manométrico de obstrucción del tracto de salida de la unión esofagogástrica?", 
                options: ["Presurización panesofágica", "Contracción hipercontráctil", "Presión intrabolo elevada", "Latencia distal reducida"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], la EGJOO manométrica se caracteriza por la resistencia al flujo que genera presurización por delante del bolo en el esófago distal.<br><br>Perla ENARM: \"EGJ Outflow Obstruction: Abnormal median IRP (supine and upright), ≥20% elevated intrabolus pressure (supine), and not meeting criteria for achalasia.\"<br><br>Análisis de Distractores: La opción A define la acalasia tipo II; la B es un patrón de peristalsis que puede o no estar presente; la D define el componente espástico.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Tabla 3, Página 10." 
            },
            {
                id: 14, 
                question: "¿Cuáles son los síntomas cardinales para considerar clínicamente relevante un diagnóstico de esófago hipercontráctil?", 
                options: ["Disfagia y regurgitación", "Disfagia y dolor torácico", "Odinofagia y pirosis", "Regurgitación y eructos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC [Chicago Classification v4.0], este trastorno requiere correlación clínica estricta, pues hallazgos aislados en pacientes asintomáticos carecen de relevancia terapéutica.<br><br>Perla ENARM: \"Clinically relevant symptoms of hypercontractile esophagus include dysphagia and non-cardiac chest pain.\"<br><br>Análisis de Distractores: La regurgitación (A) es más típica de la acalasia; la odinofagia y pirosis (C) sugieren esofagitis o reflujo; los eructos (D) orientan a trastornos funcionales gástricos.", 
                source: "Yadlapati R, et al. Esophageal motility disorders on high-resolution manometry: Chicago classification version 4.0. Neurogastroenterol Motil, 2021, Sección 11.1, Página 15." 
            },
            {
                id: 15, 
                question: "¿Qué valor de la integral contráctil distal define operativamente una peristalsis fallida?", 
                options: ["< 100 mmHg•s•cm", "< 450 mmHg•s•cm", "100-450 mmHg•s•cm", "< 1000 mmHg•s•cm"], 
                answer: 0,

                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass} transition-colors duration-500">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>
                                
                                <div class="mt-8 flex justify-center lg:justify-start">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="Chicago4.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Resumen 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('chicago4Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('chicago4LastQId', currentQuestionId);
                else localStorage.removeItem('chicago4LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('chicago4Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
