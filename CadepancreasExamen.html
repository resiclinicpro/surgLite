            </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
    {
        id: 1, 
        question: "¿Cuál es el mecanismo embriológico subyacente que origina el páncreas anular, patología frecuentemente asociada a obstrucción duodenal y síndrome de Down?", 
        options: ["Fusión prematura de conductos", "Fallo en rotación del brote ventral", "Regresión incompleta del brote dorsal", "Persistencia de la vena umbilical"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento [SAGES Anatomy], el páncreas anular resulta de una falla del brote pancreático ventral para rotar adecuadamente junto con la segunda porción del duodeno durante el desarrollo embriológico, lo que resulta en una envoltura total o parcial del duodeno por tejido pancreático.<br><br>Perla ENARM: \"The prevalence rate of annular pancreas is thought to be 0.01% and results from a failure of the ventral bud to properly rotate with the second portion of the duodenum during embryologic development.\"<br><br>Análisis de Distractores: La fusión prematura o regresión incompleta explican variantes como el páncreas divisum, no el anular. La persistencia de la vena umbilical es un defecto vascular sin relación a la rotación del parénquima glandular pancreático.", 
        source: "The SAGES Manual of Evolving Techniques in Pancreatic Surgery, 2025, Anatomy and Physiology, Página 9." 
    },
    {
        id: 2, 
        question: "¿Qué mutación genética confiere el mayor riesgo para desarrollar adenocarcinoma de páncreas en un paciente con diagnóstico de poliposis hamartomatosa gastrointestinal y máculas melanocíticas?", 
        options: ["Mutación en STK11", "Mutación en BRCA2", "Mutación en PRSS1", "Mutación en CDKN2A"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento [Screening and Diagnosis], la mutación del gen STK11 es la alteración genética responsable del síndrome de Peutz-Jeghers, el cual es uno de los síndromes hereditarios con mayor riesgo documentado para el desarrollo de adenocarcinoma pancreático a lo largo de la vida.<br><br>Perla ENARM: \"The inherited cancer syndromes with the highest risk of developing PDAC include Peutz-jeghers (STK11 gene), Familial Atypical Multiple Mole Melanoma syndrome (CDKN2A gene), and Hereditary pancreatitis (PRSS1, SPINK1 genes).\"<br><br>Análisis de Distractores: BRCA2 se asocia a cáncer de mama/ovario y páncreas familiar, pero no al fenotipo descrito. PRSS1 causa pancreatitis hereditaria. CDKN2A causa el síndrome de melanoma múltiple atípico familiar (FAMMM), no Peutz-Jeghers.", 
        source: "Pancreatic Cancer, 2023, Screening and Early Detection, Página 154." 
    },
    {
        id: 3, 
        question: "En el abordaje de una masa sólida en la cabeza del páncreas, ¿cuál es la causa fenotípica biológica que condiciona niveles indetectables de antígeno carbohidrato 19-9 (≤2 U/ml) a pesar de existir una carga tumoral avanzada?", 
        options: ["Falla en secreción de bilirrubina", "Mutación intrínseca del gen KRAS", "Inactivación de la enzima telomerasa", "Fenotipo antígeno Lewis negativo"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento [NCCN 2026], el antígeno carbohidrato 19-9 no será detectable en pacientes que carecen del antígeno Lewis (fenotipo Lewis negativo), representando aproximadamente el 8% de la población, lo que genera falsos negativos en la evaluación bioquímica de la enfermedad.<br><br>Perla ENARM: \"CA 19-9 will be undetectable in individuals who are Lewis antigen-negative (consider obtaining CEA and CA-125 in patients who are nonsecreting or those with normal CA 19-9 levels).\"<br><br>Análisis de Distractores: La hiperbilirrubinemia eleva falsamente el CA 19-9, no lo suprime. La mutación en KRAS es el motor genético del tumor, independiente de la expresión del marcador de superficie. La inactivación de telomerasa no regula la secreción glucoproteica del antígeno 19-9.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Pancreatic Adenocarcinoma, 2026, Clinical Presentation and Workup, Página PANC-1A." 
    },
    {
        id: 4, 
        question: "En la estadificación tomográfica del adenocarcinoma de páncreas, ¿qué hallazgo anatómico define a la enfermedad como resecable limítrofe respecto al eje de la arteria mesentérica superior?", 
        options: ["Contacto tumoral sólido ≤180 grados", "Contacto tumoral sólido >180 grados", "Invasión vascular con trombosis blanda", "Ausencia total de contacto perivascular"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento [NCCN 2026], la enfermedad limítrofe (borderline resectable) se define por la presencia de contacto tumoral sólido con la arteria mesentérica superior menor o igual a 180 grados de su circunferencia, lo cual permite una resección quirúrgica técnicamente factible pero con alto riesgo de márgenes positivos si no se emplea terapia previa.<br><br>Perla ENARM: \"Borderline resectable: Solid tumor contact with superior mesenteric artery (SMA) ≤180°.\"<br><br>Análisis de Distractores: El contacto >180 grados define a la enfermedad como localmente avanzada (irresecable). La trombosis blanda se evalúa en el eje venoso portomesentérico, no en el arterial. La ausencia de contacto clasifica al tumor como francamente resecable.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Pancreatic Adenocarcinoma, 2026, Criteria Defining Resectability Status, Página PANC-C." 
    },
    {
        id: 5, 
        question: "En un paciente con adenocarcinoma de páncreas clasificado radiológicamente como resecable limítrofe, ¿cuál es la directriz terapéutica inicial de elección recomendada antes de la cirugía?", 
        options: ["Exploración quirúrgica inmediata", "Terapia sistémica neoadyuvante", "Radioterapia ablativa estereotáctica", "Derivación paliativa biliodigestiva"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento [NCCN 2026], los pacientes con enfermedad limítrofe (borderline) deben recibir terapia sistémica neoadyuvante (con o sin quimiorradiación consolidativa) para maximizar la probabilidad de una resección con márgenes negativos (R0) y tratar la enfermedad micrometastásica precoz.<br><br>Perla ENARM: \"Neoadjuvant Therapy (Resectable/Borderline Resectable Disease). If neoadjuvant therapy is considered or recommended, treatment at or coordinated through a high-volume center is preferred.\"<br><br>Análisis de Distractores: La cirugía inmediata (upfront) está contraindicada por el alto riesgo de resección R1. La radioterapia exclusiva se reserva para paliación o adyuvancia, no es primera línea aislada. Las derivaciones paliativas se usan solo en enfermedad irresecable con obstrucción intratable.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Pancreatic Adenocarcinoma, 2026, Borderline Resectable Disease, Página PANC-3 y PANC-G." 
    },
    {
        id: 6, 
        question: "Durante la evaluación transoperatoria de una duodenopancreatectomía cefálica, ¿cuál es la distancia mínima exigida de tejido sano entre el tumor y el margen de sección del cuello pancreático para evitar la ampliación del corte?", 
        options: ["1 mm", "2 mm", "5 mm", "10 mm"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento [NCCN 2026], el análisis por sección congelada del margen del cuello pancreático y del conducto biliar es crítico; si el tumor se encuentra a 5 mm o menos del margen, se requiere excisión adicional para asegurar una distancia segura y evitar el artefacto por electrocauterio.<br><br>Perla ENARM: \"If tumor is located within 5 mm of margins, consider further excision of the pancreas and bile duct to ensure at least 5 mm of clearance.\"<br><br>Análisis de Distractores: Un margen de 1 mm tradicionalmente define una resección R1 en los protocolos de patología británicos, por lo que es inaceptable transoperatoriamente. Distancias de 2 mm son insuficientes. Los 10 mm son ideales pero la directriz quirúrgica estricta para ampliar es ≤5 mm.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Pancreatic Adenocarcinoma, 2026, Principles of Surgical Technique, Página PANC-E 1 of 3." 
    },
    {
        id: 7, 
        question: "Para el diagnóstico de una fístula pancreática posoperatoria a partir del tercer día, ¿cuál es el umbral de elevación de amilasa en el líquido de drenaje respecto al límite superior normal del suero institucional?", 
        options: ["Mayor a 1.5 veces", "Mayor a 2 veces", "Mayor a 3 veces", "Mayor a 5 veces"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento [POPF ISGPS], el diagnóstico bioquímico de una fístula pancreática se define por un nivel de amilasa en el líquido de drenaje superior a tres veces el límite superior de la normalidad institucional, medido en o después del tercer día posoperatorio.<br><br>Perla ENARM: \"Any volume of drain fluid with amylase level >3 times higher than the upper limit of normal (according to the local, institutional thresholds) defines a POPF.\"<br><br>Análisis de Distractores: Valores de 1.5 o 2 veces no alcanzan el umbral de diagnóstico consensuado internacionalmente. Un umbral de 5 veces es excesivo y retrasaría el diagnóstico de una fuga bioquímica asintomática.", 
        source: "The SAGES Manual of Evolving Techniques in Pancreatic Surgery, 2025, Postoperative Pancreatic Fistula, Página 592." 
    },
    {
        id: 8, 
        question: "¿Cuál es el hallazgo histopatológico patognomónico que define a una neoplasia quística mucinosa del páncreas frente a otros tumores quísticos premalignos?", 
        options: ["Epitelio plano rico en glucógeno", "Displasia glandular tipo foveolar", "Estroma subepitelial tipo ovárico", "Infiltración linfoplasmocítica densa"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento [Pathobiology Precursors], la neoplasia quística mucinosa (MCN) es un tumor caracterizado casi exclusivamente en mujeres, compuesto por células productoras de mucina apoyadas directamente sobre un estroma subepitelial de tipo ovárico.<br><br>Perla ENARM: \"MCN is a non-invasive mainly solitary cystic neoplasm composed of mucin-producing cells associated with typical subepithelial ovarian type stroma.\"<br><br>Análisis de Distractores: El epitelio rico en glucógeno define al cistadenoma seroso (tumor benigno). La diferenciación foveolar gástrica se ve en las PanINs y algunos IPMNs. La infiltración linfoplasmocítica IgG4 positiva es clásica de la pancreatitis autoinmune.", 
        source: "Textbook of Pancreatic Cancer, 2021, Pathobiology of Precursors to Pancreatic Cancer, Página 211." 
    },
    {
        id: 9, 
        question: "Durante la disección del ligamento hepatoduodenal en una pancreatectomía, se identifica una arteria hepática derecha reemplazada. ¿De qué vaso principal se origina esta variante anatómica en la mayoría de los casos?", 
        options: ["Arteria gástrica izquierda", "Tronco celíaco directamente", "Arteria mesentérica superior", "Arteria gastroduodenal distal"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento [Open Whipple], una arteria hepática derecha reemplazada o accesoria discurre característicamente posterolateral a la cabeza del páncreas y se origina a partir de la arteria mesentérica superior, exigiendo una disección cuidadosa para evitar isquemia hepática o biliar.<br><br>Perla ENARM: \"The aberrant right hepatic artery usually arises from the superior mesenteric artery and courses posterolateral to the pancreatic head.\"<br><br>Análisis de Distractores: La arteria gástrica izquierda da origen típicamente a la arteria hepática izquierda reemplazada, no a la derecha. El tronco celíaco da origen a la anatomía clásica normal. La arteria gastroduodenal emite ramas pancreatoduodenales, rara vez el flujo hepático principal.", 
        source: "The SAGES Manual of Evolving Techniques in Pancreatic Surgery, 2025, Open Whipple, Página 334." 
    },
    {
        id: 10, 
        question: "De acuerdo con la clasificación internacional, ¿cuál es la etiología predominante de una hemorragia pospancreatectomía clasificada como temprana (menor a 24 horas)?", 
        options: ["Pseudoaneurisma esplénico roto", "Falla técnica en la hemostasia", "Fuga de la anastomosis biliar", "Úlcera en la gastroyeyunostomía"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento [PPH Management], la hemorragia pospancreatectomía temprana (<24 horas) se debe comúnmente a un error técnica en la hemostasia quirúrgica intraoperatoria o a coagulopatía subyacente del paciente, mientras que los sangrados tardíos se asocian a complicaciones como fístulas y pseudoaneurismas.<br><br>Perla ENARM: \"Early PPH is often due to a technical error in intraoperative hemostasis or a coagulopathy (inherent or acquired) present in the patient.\"<br><br>Análisis de Distractores: La rotura de pseudoaneurismas, fístulas biliares/pancreáticas y úlceras en el sitio de anastomosis son causas características de la hemorragia pospancreatectomía tardía (>24 horas), condicionada por la erosión vascular de los jugos digestivos.", 
        source: "The SAGES Manual of Evolving Techniques in Pancreatic Surgery, 2025, Post-Pancreatectomy Hemorrhage, Página 610." 
    },
    {
        id: 11, 
        question: "Tras la confirmación histológica de adenocarcinoma ductal de páncreas en una pieza de resección quirúrgica, ¿qué evaluación complementaria es obligatoria en el posoperatorio sistemático de todos los pacientes independientemente del historial familiar?", 
        options: ["Prueba genética para mutaciones hereditarias", "Perfil de metilación de ADN libre circulante", "Cuantificación de catecolaminas en orina", "Determinación de la mutación BRAF V600E"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento [NCCN 2026], las guías establecen como pauta universal la realización de pruebas genéticas para mutaciones hereditarias en cualquier paciente con confirmación de cáncer de páncreas, para detectar alteraciones en genes de alto riesgo (BRCA1/2, PALB2, STK11).<br><br>Perla ENARM: \"Genetic testing for inherited mutations is recommended for any patient with confirmed pancreatic cancer, using comprehensive gene panels for hereditary cancer syndromes.\"<br><br>Análisis de Distractores: El ADN libre circulante (ctDNA) aún no tiene recomendación de consenso universal para toma de decisiones. Las catecolaminas evalúan tumores neuroendocrinos. BRAF V600E es infrecuente en páncreas y no se realiza como única prueba genómica prioritaria sin perfil molecular completo.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Pancreatic Adenocarcinoma, 2026, Postoperative Adjuvant Treatment, Página PANC-5." 
    },
    {
        id: 12, 
        question: "En la linfadenectomía estandarizada durante una duodenopancreatectomía cefálica con intención curativa, ¿cuál estación ganglionar debe excluirse de la resección en bloque ya que su positividad indica enfermedad metastásica a distancia?", 
        options: ["Estación 8a (hepática común)", "Estación 12c (hilio biliar)", "Estación 13a (retropancreática)", "Estación 16 (paraaórtica)"], 
        answer: 3,

        question: "En un paciente con adenocarcinoma invasor del cuerpo pancreático, se considera realizar una pancreatectomía distal con resección del tronco celíaco (Procedimiento de Appleby). Para garantizar la viabilidad arterial hepática por flujo retrógrado, ¿qué condición tumoral es una contraindicación absoluta para esta cirugía?", 
        options: ["Invasión de la arteria esplénica proximal", "Involucro directo del tronco celíaco", "Invasión de la arteria gastroduodenal", "Trombosis de la vena esplénica secundaria"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento [Complex Surgical Oncology], el procedimiento de Appleby modificado asume la resección del tronco celíaco, pero depende crucialmente del flujo retrógrado desde la arteria mesentérica superior, pasando por la arteria gastroduodenal hacia la arteria hepática propia. Si el tumor infiltra la arteria gastroduodenal o la base del celíaco en la aorta, se pierde esta vía colateral obligatoria, contraindicando la operación.<br><br>Perla ENARM: \"Contraindications include tumor involvement of GDA or base of celiac at aorta.\"<br><br>Análisis de Distractores: La invasión de la arteria esplénica proximal y el involucro del tronco celíaco son, por definición, las indicaciones clásicas para plantear este procedimiento, ya que se extirpan en bloque. La trombosis de la vena esplénica es común por contigüidad y no prohíbe la reconstrucción arterial.", 
        source: "Complex General Surgical Oncology, 2025, Pancreatic Cancer, Página 233." 
    },
    {
        id: 52, 
        question: "Durante el manejo posoperatorio de una duodenopancreatectomía, se evidencia salida de líquido biliar por los drenajes. Según la clasificación del Grupo Internacional de Cirugía de Hígado (ISGLS), ¿qué escenario clínico define formalmente a una fístula biliar como severidad Grado C?", 
        options: ["Mantenimiento prolongado de los drenajes quirúrgicos", "Requerimiento de drenaje transhepático percutáneo", "Relaparotomía necesaria para controlar la fuga", "Administración de nutrición parenteral total"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento [SAGES Short-Term Morbidity], la clasificación de fístulas biliares posoperatorias (ISGLS) evalúa el impacto clínico de la fuga. El Grado C representa el escenario de mayor gravedad, asociado a sepsis o peritonitis, y está definido operativamente por la necesidad estricta de una reintervención quirúrgica (relaparotomía) para el control del defecto.<br><br>Perla ENARM: \"Grade C bile leaks are the most severe and require re-laparotomy to control the leak. Patients often have signs of sepsis, severe abdominal pain, or biliary peritonitis.\"<br><br>Análisis de Distractores: El mantenimiento de los drenajes perfila a una fuga Grado A. El requerimiento de procedimientos diagnósticos/intervencionistas sin laparotomía (como drenaje percutáneo o antibióticos escalados) define al Grado B.",

    {
        id: 53, 
        question: "Durante la disección del ligamento hepatoduodenal en una pancreatoduodenectomía cefálica, ¿qué relevo linfático específico debe ser resecado rutinariamente para permitir la exposición adecuada de la adventicia de la arteria hepática común?", 
        options: ["Estación 8a", "Estación 12p", "Estación 16b1", "Estación 14v"],

    {

        question: "En el algoritmo terapéutico de un adenocarcinoma de páncreas irresecable o metastásico con buena clase funcional, la inmunoterapia puede considerarse excepcionalmente. ¿Cuál es el punto de corte genómico para la carga mutacional tumoral alta (TMB-H) que justifica el uso de Pembrolizumab?",

        justification: "Justificación: De acuerdo al documento [NCCN 2026], el anticuerpo anti-PD-1 Pembrolizumab está aprobado e indicado como terapia en cáncer de páncreas avanzado únicamente si el tumor demuestra inestabilidad de microsatélites alta (MSI-H), deficiencia en proteínas de reparación (dMMR), o una carga mutacional tumoral alta (TMB-H), la cual se define universalmente como mayor o igual a 10 mutaciones por megabase (mut/Mb).<br><br>Perla ENARM: \"Pembrolizumab (if MSI-H, dMMR, or TMB-H [≥10 mut/Mb]).\"<br><br>Análisis de Distractores: Cifras de 5, 20 o 50 mut/Mb no representan el punto de corte clínico aprobado por agencias regulatorias para prescribir bloqueo de puntos de control inmunitario (checkpoint inhibitors) independientes del tipo histológico del tumor sólido.",

    {

        question: "En el contexto del tamizaje y vigilancia de neoplasias quísticas del páncreas, ¿cuál de las siguientes características radiológicas en una neoplasia mucinosa papilar intraductal (IPMN) representa una indicación absoluta para resección quirúrgica por alto riesgo de transformación maligna?", 
        options: ["Localización aislada en el proceso uncinado", "Tamaño estático del quiste de 2.5 cm", "Ausencia de nódulos murales captantes", "Dilatación del conducto principal mayor a 10 mm"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento [Adenocarcinoma de páncreas 2023], el riesgo de que una IPMN albergue o desarrolle un carcinoma invasor se correlaciona con la presencia de \"características de alto riesgo\" (high-risk stigmata), siendo las más determinantes la dilatación del conducto pancreático principal por encima de los 10 mm, la presencia de nódulos murales captantes y el engrosamiento de la pared superior a 5 mm.<br><br>Perla ENARM: \"The risk of PIMN developing a carcinoma depends on the presence or risk characteristics such as dilation of the main duct greater than 10 mm, wall thickening of more than 5 mm...\"<br><br>Análisis de Distractores: Los quistes de rama lateral menores de 3 cm sin características sospechosas se vigilan (worrisome features inician >3 cm). Los nódulos murales elevan el riesgo solo si captan contraste (vascularización sólida). La localización en cabeza confiere riesgo si causa ictericia, no la ubicación aislada en cuerpo o proceso uncinado per se.", 
        source: "Adenocarcinoma de páncreas, estado actual de los métodos de diagnóstico, técnicas quirúrgicas, 2023, Early Diagnosis, Página 58."

    {
        id: 56, 
        question: "Dentro del marco de un protocolo de recuperación acelerada (ERAS) para cirugía de páncreas, ¿cuál es la recomendación sustentada por la evidencia respecto a la administración profiláctica de análogos de somatostatina (como octreotida) para prevenir la fístula pancreática?", 
        options: ["Recomendado rutinariamente en todos los casos", "No está recomendado su uso sistemático", "Obligatorio si el conducto mide más de 5 mm", "Indicado exclusivamente en pancreatogastrostomía"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento [SAGES ERAS], las guías ERAS no recomiendan el uso sistemático de análogos de la somatostatina, basándose en múltiples metaanálisis y estudios aleatorizados doble ciego que han demostrado repetidamente que estos fármacos no reducen la mortalidad ni la incidencia general de fístulas pancreáticas posoperatorias clínicamente relevantes tras resecciones pancreáticas estándar.<br><br>Perla ENARM: \"Somatostatin analogs: Systematic use not recommended.\"<br><br>Análisis de Distractores: La administración rutinaria fue una práctica común en el pasado pero está proscrita por falta de evidencia de beneficio clínico neto. Conductos dilatados (>5 mm) representan glándulas firmes con muy bajo riesgo de fuga, escenario donde el uso profiláctico tiene aún menor utilidad.",

    {
        id: 57, 
        question: "Ante el desarrollo de una fístula pancreática posoperatoria clínicamente relevante (CR-POPF) Grado B, caracterizada por una colección infectada peripancreática e incremento de reactantes de fase aguda, ¿cuál es la intervención de rescate inicial preferida siguiendo la doctrina escalonada (step-up approach)?",

        justification: "Justificación: De acuerdo al documento [SAGES POPF Management], el abordaje estandarizado para la fístula pancreática es el manejo escalonado (step-up approach). La intervención inicial de elección en presencia de colecciones intraabdominales o sospecha de infección, logrando altas tasas de éxito y evitando la elevada mortalidad de una laparotomía temprana, es el drenaje con catéter percutáneo guiado radiológicamente o el drenaje guiado por ultrasonido endoscópico.<br><br>Perla ENARM: \"Requisites for optimal treatment are... when necessary, percutaneous catheter placement to externally drain purulent fluid, therefore obtaining source control.\"<br><br>Análisis de Distractores: La reoperación primaria o pancreatectomía total se asocia a tasas de mortalidad inaceptablemente altas (hasta 60%) y queda estrictamente reservada para el fallo al manejo intervencionista o pacientes con choque refractario/hemorragia masiva incontrolable. La revisión de la anastomosis es fútil por la inflamación aguda de los tejidos.",

    {

        question: "Tras completar terapia neoadyuvante en un paciente con adenocarcinoma limítrofe (borderline resectable), el re-estadiaje tomográfico demuestra una \"respuesta radiológica mínima\" (enfermedad estable según RECIST). Para proceder a la resección quirúrgica en este escenario, ¿qué condición clínica avala continuar con la cirugía?", 
        options: ["Ausencia de mutaciones hereditarias germinales", "Disminución del tamaño tumoral en más del 50%", "Factibilidad técnica de una resección oncológica R0", "Evidencia de necrosis vascular completa en el PET"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento [NCCN 2026], el objetivo fundamental de la terapia neoadyuvante es maximizar la probabilidad de bordes negativos. Aunque la respuesta radiológica sea mínima (estabilización de la enfermedad), si no existe progresión metastásica y la resección R0 es anatómicamente viable sin incrementar desproporcionadamente el riesgo quirúrgico, la recomendación es proceder con la exploración y resección curativa.<br><br>Perla ENARM: \"Minimal: Stable or minimal reduction (RECIST)... Surgical resection considered in select cases in tumors without or with limited vascular involvement... if R0 resection is technically feasible.\"<br><br>Análisis de Distractores: La tomografía infraestima severamente la respuesta patológica (es común ver engrosamiento fibrótico indistinguible del tumor) por lo que no se exige una reducción del 50%. La ausencia de mutaciones genéticas no rige la factibilidad mecánica. La evaluación de necrosis en PET complementa pero no define la conducta quirúrgica anatómica.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Pancreatic Adenocarcinoma, 2026, Criteria for Resection Following Neoadjuvant Therapy, Página PANC-D 2 of 4."

    {

        question: "En el curso clínico de un paciente posoperado de resección pancreática con exteriorización de líquido rico en amilasa por los drenajes, ¿qué parámetro transforma automáticamente una fístula pancreática de Grado B a la categoría de máxima gravedad Grado C, según la actualización 2016 del ISGPS?", 
        options: ["Mantenimiento de catéteres percutáneos por 4 semanas", "Necesidad de reposicionamiento endoscópico", "Desarrollo de fallo orgánico atribuible a la fístula", "Persistencia de signos de infección local localizada"],

        justification: "Justificación: De acuerdo al documento [SAGES POPF Definition], la clasificación del 2016 redefinió severamente los grados de la fístula pancreática. Una CR-POPF escala a Grado C únicamente cuando el impacto fisiológico de la fuga exige una reoperación de urgencia, resulta en una admisión prolongada a cuidados intensivos debido a fallo orgánico (multiorgánico), o desencadena la muerte del paciente.<br><br>Perla ENARM: \"Grade C events include reoperation, intensive care transfer for multiorgan failure or death directly attributable to the fistula.\"<br><br>Análisis de Distractores: El drenaje persistente prolongado (>3 semanas), el soporte nutricional total, los signos de infección aislados o los procedimientos mínimamente invasivos (percutáneos o endoscópicos) representan intervenciones que catalogan a la fístula como un manejo intervencionista Grado B.",

                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';

                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";

        }

                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>

                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="BS06308GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CAPANCREASProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CAPANCREASLastQId', currentQuestionId);
                else localStorage.removeItem('CAPANCREASLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CAPANCREASProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
