    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "De acuerdo a la GPC, ¿cuál es la incidencia de las lesiones de la vía biliar reportada durante las colecistectomías laparoscópicas?", 
                options: ["0.04 a 0.6%", "3 a 20%", "15 a 30%", "26 a 32%"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la incidencia de lesiones de la vía biliar mayor durante los abordajes laparoscópicos oscila entre el 0.04% y el 0.6%, lo que representa una complicación poco frecuente pero potencialmente devastadora si no se maneja de manera oportuna por personal calificado.<br><br>Perla ENARM: \"Las tasas de lesión durante la colecistectomía laparoscópica oscilan entre el 0.04 y el 0.6%.\"<br><br>Análisis de Distractores: La opción B corresponde a la tasa de mortalidad global. La opción C es el porcentaje de lesiones que se detectan de manera intraoperatoria. La opción D corresponde al porcentaje de pacientes que presentan una lesión vascular concomitante.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 4." 
            },
            {
                id: 2, 
                question: "¿Qué porcentaje de pacientes con lesión iatrogénica de la vía biliar presenta una lesión vascular concomitante?", 
                options: ["0.4 a 1.5%", "10 a 15%", "26 a 32%", "40 a 50%"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la alteración vascular simultánea es un factor determinante en el pronóstico y en la decisión del momento quirúrgico, presentándose en el 26 al 32% de los casos. Esta isquemia asociada empeora el riesgo de estenosis y dificulta la reparación inmediata.<br><br>Perla ENARM: \"La lesión vascular concomitante no está incluida en el sistema Strasberg y se reporta presente en el 26-32% de estos pacientes.\"<br><br>Análisis de Distractores: La opción A es la prevalencia reportada en algunos metaanálisis antiguos de lesiones biliares globales. La opción B y D no corresponden a datos epidemiológicos referidos en la GPC para esta complicación.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 4." 
            },
            {
                id: 3, 
                question: "¿Cuál es la tasa de mortalidad asociada a las lesiones mayores de la vía biliar dependiente del diagnóstico y experiencia del centro?", 
                options: ["0.4 a 1.5%", "26 a 32%", "3 a 20%", "40 a 50%"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, a pesar de los avances técnicos, la mortalidad secundaria a sepsis intraabdominal prolongada, falla hepática y disfunción multiorgánica por una lesión biliar grave alcanza cifras de entre el 3% y el 20%.<br><br>Perla ENARM: \"La muerte en estos pacientes se reporta en cualquier lugar del 3 al 20% dependiendo del tiempo, la experiencia y la selección de la cohorte.\"<br><br>Análisis de Distractores: La opción A refleja la tasa de incidencia de la lesión. La opción B refleja la tasa de lesión vascular concomitante. La opción D es un valor irrealmente alto para la mortalidad promedio actual.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 4." 
            },
            {
                id: 4, 
                question: "¿Cuál es la incidencia de estenosis residual en pacientes que recibieron un tratamiento reconstructivo adecuado de la vía biliar?", 
                options: ["2%", "26%", "32%", "10%"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, a pesar de un abordaje quirúrgico especializado y anastomosis bilioentérica exitosa, la fibrosis y el daño isquémico subyacente condicionan que hasta 1 de cada 10 pacientes desarrolle una estenosis residual a largo plazo.<br><br>Perla ENARM: \"Incluso con el tratamiento adecuado puede haber morbilidad a largo plazo secundaria a estenosis que a menudo requiere tratamiento adicional; esto ocurre en aproximadamente el 10% de los pacientes.\"<br><br>Análisis de Distractores: Las opciones B y C corresponden a la incidencia de lesión vascular. La opción A subestima el riesgo documentado de reestenosis.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 5." 
            },
            {
                id: 5, 
                question: "¿Qué porcentaje de las lesiones de la vía biliar se logran identificar de manera intraoperatoria durante el procedimiento índice?", 
                options: ["15 a 30%", "40 a 50%", "60 a 70%", "80 a 90%"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la inmensa mayoría de las lesiones biliares pasan desapercibidas por el cirujano primario durante el evento quirúrgico, detectándose tempranamente solo en el 15 a 30% de los casos. Esto condiciona que la mayoría de los pacientes debute con complicaciones postoperatorias (sepsis, peritonitis biliar).<br><br>Perla ENARM: \"El momento de la terapia depende del diagnóstico, con solo un 15-30% de las lesiones diagnosticadas intraoperatoriamente.\"<br><br>Análisis de Distractores: Las opciones B, C y D sobreestiman drásticamente la capacidad de detección transoperatoria real documentada.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 5." 
            },
            {
                id: 6, 
                question: "De acuerdo a la GPC, ¿cuál es el tiempo mínimo recomendado para el seguimiento clínico e imagenológico en busca de complicaciones tardías tras la reparación biliar?", 
                options: ["6 semanas", "12 meses", "5 años", "10 años"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la principal secuela tardía (estenosis biliar y colangitis esclerosante) puede manifestarse años después del evento reconstructivo. Por ello, el escrutinio debe mantenerse por un periodo muy prolongado.<br><br>Perla ENARM: \"Se recomienda el seguimiento postoperatorio continuo de estos pacientes durante al menos 10 años después del tratamiento quirúrgico.\"<br><br>Análisis de Distractores: La opción A es el punto de corte para definir una cirugía temprana o tardía. Las opciones B y C son insuficientes temporalmente para detectar la reestenosis isquémica tardía.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 5." 
            },
            {
                id: 7, 
                question: "En la clasificación de Strasberg, ¿qué característica define anatómicamente a una lesión tipo A?", 
                options: ["Transección del colédoco", "Estenosis biliar tardía", "Fuga del conducto cístico", "Lesión circunferencial mayor"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, las lesiones clase A son de menor severidad y típicamente se resuelven con manejos no operatorios (como CPRE), ya que la continuidad del árbol biliar principal se encuentra intacta.<br><br>Perla ENARM: \"La clase A es la menos severa y representa una fuga de bilis del conducto cístico o de pequeños conductos en el lecho hepático.\"<br><br>Análisis de Distractores: La opción A y D corresponden a la lesión tipo E de Strasberg (pérdida de continuidad). La opción B es una complicación, no una clasificación inicial de la lesión.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 5." 
            },
            {
                id: 8, 
                question: "¿Cuál de las siguientes categorías de Strasberg indica una lesión circunferencial a un conducto biliar mayor con pérdida de continuidad anatómica?", 
                options: ["Tipo A", "Tipo B", "Tipo C", "Tipo E"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la pérdida total de la continuidad del conducto hepático común o colédoco representa el escenario de mayor complejidad técnica para la reconstrucción (Strasberg E1 a E5) y mandata ineludiblemente intervención quirúrgica por expertos.<br><br>Perla ENARM: \"La clase E es generalmente considerada la más severa ya que es una lesión circunferencial a un conducto biliar mayor con pérdida de continuidad.\"<br><br>Análisis de Distractores: La opción A es fuga del cístico. Las opciones B y C implican oclusión o fuga de conductos aberrantes sin pérdida de continuidad del eje principal.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 5." 
            },
            {
                id: 9, 
                question: "De acuerdo a la GPC, ¿a partir de qué tiempo cronológico se define una reparación quirúrgica tardía en el contexto de una lesión biliar?", 
                options: ["> 72 horas", "> 6 semanas", "> 12 semanas", "> 6 meses"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, esperar un mínimo de 6 semanas confiere una caída drástica en la morbilidad y el fallo de anastomosis, ya que permite la resolución del proceso inflamatorio (peritonitis química/infecciosa) y la clara delimitación del tejido isquémico.<br><br>Perla ENARM: \"El panel sugiere la reparación tardía (mayor a 6 semanas) por un cirujano experimentado en patología HPB para el manejo de la lesión de la vía biliar.\"<br><br>Análisis de Distractores: La opción A es un límite usado en algunas series para definir intervenciones \"inmediatas\". Las opciones C y D son retrasos excesivos e innecesarios una vez alcanzadas las 6 semanas de enfriamiento inflamatorio.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations, Página 8." 
            },
            {
                id: 10, 
                question: "¿Cuál es una contraindicación absoluta para realizar una anastomosis bilioentérica directa de tipo hepaticoduodenostomía?", 
                options: ["Colecciones periepáticas", "Fuga biliar residual", "Paciente con obesidad", "Lesión Strasberg E5"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la hepaticoduodenostomía requiere un conducto lo suficientemente largo para anastomosarse al duodeno sin tensión. En las lesiones E5 (involucro de conductos intrahepáticos separados), la movilización duodenal hasta el techo hepático es mecánicamente imposible o isquémica.<br><br>Perla ENARM: \"Las contraindicaciones para la reparación mediante hepaticoduodenostomía incluyen a los pacientes con lesiones E5 o pancreatitis severa.\"<br><br>Análisis de Distractores: La obesidad (opción C) favorece abordajes específicos (como MIS), pero no contraindica el tipo de anastomosis. Las opciones A y B son indicaciones para retrasar el procedimiento, no contraindicaciones de la técnica anatómica.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 19." 
            },
            {
                id: 11, 
                question: "¿Qué complicación fisiopatológica a largo plazo es la principal responsable de precipitar la necesidad de un trasplante hepático tras una lesión severa de la vía biliar?", 
                options: ["Colangitis esclerosante secundaria", "Síndrome de sumidero", "Estenosis intestinal", "Fuga biliar persistente"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la inflamación crónica, la estenosis repetitiva y los cuadros de colangitis subclínica terminan desarrollando una fibrosis irreversible del parénquima biliar intra y extrahepático (colangitis esclerosante secundaria), destruyendo la función del órgano.<br><br>Perla ENARM: \"En casos severos, puede ocurrir colangitis esclerosante secundaria, lo que requiere un trasplante de hígado y resulta en una tasa de mortalidad marcadamente incrementada.\"<br><br>Análisis de Distractores: La opción B (síndrome de sumidero) es una complicación anatómica local de la hepaticoduodenostomía. La opción C es falsa en este contexto. La opción D (fuga) es una complicación aguda/subaguda, no la causa final del trasplante a largo plazo.", 
                source: "SAGES-AHPBA 2025: a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Introduction, Página 2." 
            },
            {
                id: 12, 
                question: "¿En qué escenario clínico o fenotípico se prefiere el abordaje de mínima invasión (MIS) para la reconstrucción definitiva de la vía biliar?", 
                options: ["Presencia de incisión abierta", "Inflamación severa del lecho", "Índice de masa corporal alto", "Inestabilidad hemodinámica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la obesidad dificulta drásticamente la exposición del hilio hepático en cirugía abierta. La cirugía robótica o laparoscópica brinda una visualización superior y ergonomía en estos pacientes de alto riesgo de complicaciones de pared abdominal.<br><br>Perla ENARM: \"La reparación MIS es preferida en aquellos pacientes que se encuentran estables, con anatomía favorable y en aquellos con alto índice de masa corporal u obesidad.\"<br><br>Análisis de Distractores: Las opciones A, B y D son indicaciones absolutas y explícitas de la guía para preferir el abordaje quirúrgico abierto convencional.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ2, Página 9." 
            },
            {
                id: 13, 
                question: "¿Qué complicación fisiopatológica tardía es propia y exclusiva de la técnica de reconstrucción anatómica mediante hepaticoduodenostomía?", 
                options: ["Síndrome de sumidero", "Colangitis esclerosante", "Biloma infectado", "Cirrosis biliar primaria"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la anastomosis directa al duodeno permite que restos de alimento y material particulado refluyan y se alojen en el remanente biliar ciego (cuando existe), generando estasis, litiasis y colangitis crónica (Sump syndrome).<br><br>Perla ENARM: \"Uno debe también considerar las complicaciones potenciales a largo plazo con la reparación mediante hepaticoduodenostomía, incluyendo el síndrome de sumidero y el reflujo alcalino.\"<br><br>Análisis de Distractores: La opción B puede ocurrir tras cualquier fallo de reparación bilioentérica. La opción C es una complicación aguda pre-reparación. La opción D es una patología autoinmune no relacionada.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 19." 
            },
            {
                id: 14, 
                question: "De acuerdo a la GPC, comparado con el manejo diferido, ¿qué desenlace deletéreo presenta un riesgo 7.4 veces mayor al realizar una reconstrucción temprana (< 6 semanas)?", 
                options: ["Fuga biliar intencionada", "Formación de estenosis", "Reflujo alcalino biliar", "Íleo posoperatorio"], 
                answer: 1,

            {

                question: "En estudios observacionales, ¿qué factor metodológico documentado explica que el abordaje quirúrgico presente una tasa de mortalidad aparentemente mayor frente al endoscópico?", 
                options: ["Sesgo de selección por severidad", "Alergia a los anestésicos", "Infección del sitio quirúrgico", "Mayor tasa de estenosis"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, los pacientes con peores pronósticos (fuga masiva, inestabilidad hemodinámica, lesión vascular extensa) son asignados rutinariamente al grupo quirúrgico abierto por urgencia. Esto crea una falsa estadística de mayor letalidad que no se debe puramente a la técnica quirúrgica, sino a las condiciones basales del paciente.<br><br>Perla ENARM: \"Hubo un sesgo de selección significativo y es probable que la severidad de la lesión desempeñara un papel principal en las tasas de mortalidad más altas observadas en el grupo quirúrgico.\"<br><br>Análisis de Distractores: Las opciones B y C pueden ser complicaciones, pero no explican la desviación masiva de la mortalidad poblacional. La opción D de hecho es peor en el grupo endoscópico, no en el quirúrgico.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ3, Página 18." 
            },
            {
                id: 35, 
                question: "¿Qué sistema de clasificación anatómica aconseja utilizar invariablemente el consenso internacional contemporáneo para evaluar y reportar la severidad de las lesiones de vía biliar?", 
                options: ["Clasificación de Bismuth", "Clasificación de Strasberg", "Clasificación de Hinchey", "Clasificación de Clavien Dindo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, dictaminar el tipo de daño topográfico es el pilar para la toma de decisiones reconstructivas. La clasificación modificada de Strasberg se reconoce globalmente como el sistema estandarizado más completo, abarcando desde fugas menores hasta transecciones hiliares complejas.<br><br>Perla ENARM: \"El consenso internacional más reciente aconseja el uso del sistema de clasificación de Strasberg para evaluar la severidad de las lesiones de la vía biliar.\"<br><br>Análisis de Distractores: La opción A (Bismuth) evalúa tradicionalmente estenosis biliares benignas puras o colangiocarcinomas. La opción C es para diverticulitis aguda. La opción D clasifica complicaciones postoperatorias generales, no el nivel anatómico de la lesión biliar.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury following cholecystectomy, 2025, Introduction, Página 5." 
            },
            {
                id: 36, 
                question: "Para garantizar la seguridad anatómica en la reconstrucción biliar de mínima invasión (MIS) y evitar complicaciones por falta de exposición, el cirujano debe poseer experiencia en:", 
                options: ["Cirugía gastrointestinal y endoscopia", "Cirugía general y radiología", "Cirugía MIS y cirugía hepatopancreatobiliar", "Cirugía bariátrica y trasplante"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la anastomosis biliar intraabdominal exige disección fina y sutura intracorpórea milimétrica. Intentar esto sin habilidades de laparoscopia avanzada (MIS) sumadas a un desconocimiento de la anatomía vascular aberrante del hígado (cirujano HPB) eleva drásticamente el fallo de la reparación.<br><br>Perla ENARM: \"Esta reparación MIS debe ser realizada únicamente por cirujanos con experiencia tanto en MIS como en cirugía hepatopancreatobiliar (HPB).\"<br><br>Análisis de Distractores: Las opciones A, B y D incluyen especialidades ajenas al entrenamiento reconstructivo directo del hilio hepático mediante trocares (Radiología, endoscopia, bariatría).", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ2, Página 11." 
            },
            {
                id: 37, 
                question: "¿Cuál es el principal factor humano de riesgo que históricamente obscurece los beneficios clínicos de intentar una reparación quirúrgica intraoperatoria inmediata?", 
                options: ["La ausencia de un colangiograma", "El uso de anestesia general", "La presión intraabdominal elevada", "La ejecución por cirujanos no HPB"], 
                answer: 3, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, al ocurrir la lesión durante la colecistectomía inicial, el instinto del cirujano general primario es repararla en el acto. Al carecer de destrezas para crear una anastomosis libre de isquemia en el hilio biliar superior, las tasas de estenosis y fuga son exorbitantes frente al envío diferido a un experto.<br><br>Perla ENARM: \"Las ventajas prospectivas de la reparación en la mesa quirúrgica pueden verse oscurecidas por el hecho de que las reparaciones tempranas son intentadas con mayor frecuencia por especialistas no HPB.\"<br><br>Análisis de Distractores: Las opciones A, B y C son variables transoperatorias comunes, pero la literatura demuestra estadísticamente que la experticia técnica del operador es el determinante predictivo de fallo anastomótico primario.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury following cholecystectomy, 2025, Discussion, Página 50." 
            },
            {
                id: 38, 
                question: "En presencia de una lesión vascular concomitante (Ej. sección de la arteria hepática derecha), ¿cuál es el propósito fisiopatológico principal de diferir la reconstrucción biliar?", 
                options: ["Prevenir el síndrome de sumidero", "Disminuir el diámetro del conducto", "Evitar la migración de endoprótesis", "Promover la revascularización del colédoco"],

                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la irrigación de los conductos biliares superiores depende críticamente del plexo arterial circundante. Diferir la cirugía 6 semanas permite que ocurra una neovascularización o clara delimitación del tejido necrosado, asegurando suturar sobre bordes viables y bien perfundidos.<br><br>Perla ENARM: \"Retrasar la reparación permitiría tiempo para la revascularización del colédoco (CBD), reduciendo el riesgo de estenosis postoperatoria... facilitando una evaluación precisa de la extensión de la lesión isquémica.\"<br><br>Análisis de Distractores: La opción A es una complicación mecánica. Las opciones B y C no tienen correlación fisiológica con la isquemia vascular inducida por transección arterial.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Evidence Discussion KQ1, Página 150." 
            },
            {
                id: 39, 
                question: "Además de esperar el mínimo cronológico de 6 semanas, ¿qué requisito clínico sistémico indispensable dictamina proceder con una reparación quirúrgica tardía segura?", 
                options: ["Niveles de albúmina mayores a 4 g/dl", "Ausencia de colelitiasis residual", "Control total de la sepsis intraabdominal", "Dilatación biliar mayor a 10 mm"], 
                answer: 2, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, la existencia de peritonitis biliar activa o colecciones infectadas inhibe sistémicamente la cicatrización e induce un estado catabólico. Sin la previa erradicación microbiológica mediante drenajes intermedios y antibióticos, cualquier anastomosis entérica fallará.<br><br>Perla ENARM: \"Algunos cirujanos hepatobiliares recomiendan posponer la reparación quirúrgica hasta que la sepsis y las complicaciones relacionadas estén bajo control.\"<br><br>Análisis de Distractores: La opción A es ideal pero no es un punto de corte restrictivo absoluto mencionado. La opción B y D no condicionan el éxito metabólico general y anatómico primario comparado con la erradicación del choque séptico y la inflamación purulenta.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury following cholecystectomy, 2025, Introduction, Página 4." 
            },
            {
                id: 40, 
                question: "Desde la perspectiva del paciente reportada por la GPC, ¿cuáles son los dos desenlaces clínicos valorados como más importantes para dictar el éxito tras sufrir una lesión biliar?", 
                options: ["Preservar calidad de vida y minimizar reintervenciones", "Disminuir la estancia hospitalaria y evitar transfusiones", "Evitar cicatrices grandes y reducir el dolor crónico", "Preservar la función hepática y evitar la ictericia"], 
                answer: 0, 
                justification: "Justificación: De acuerdo GPC de SAGES-AHPBA 2025, los reportes en grupos de pacientes confirman que la carga psicológica y física de múltiples cirugías o recambios endoscópicos es inaceptable para ellos; el objetivo primario de la medicina paliativa y reconstructiva debe centrarse en reintegrar prontamente al individuo a su rutina con la menor intervención posible.<br><br>Perla ENARM: \"Todos los pacientes apoyaron firmemente la preservación de la calidad de vida y la minimización de las reintervenciones, y por lo tanto el tiempo total de recuperación, como los resultados más importantes.\"<br><br>Análisis de Distractores: Aunque las opciones B, C y D representan eventos médicos lógicamente deseables para el cirujano general, no reflejan el consenso extraído textualmente del panel de discusión centrado en el paciente y la funcionalidad vital.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Values and Patient Perspective, Página 13." 
            },
            {
                id: 61, 
                question: "De acuerdo a la GPC, si se detecta una lesión biliar severa de forma intraoperatoria y no se cuenta con un cirujano experto, ¿qué medidas de contención transoperatorias están indicadas antes de referir al paciente?", 
                options: ["Hepaticoyeyunostomía en Y de Roux", "Drenaje amplio y derivación biliar", "Cierre primario con sutura monofilamento", "Colocación de tubo en T de urgencia"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, intentar una reconstrucción anatómica sin la experiencia técnica en cirugía hepatobiliar garantiza el fracaso. La prioridad máxima es controlar la sepsis y evitar la acumulación de colecciones.<br><br>Perla ENARM: \"Si la lesión se detecta en la operación índice, las medidas de temporalidad seguras incluyen drenaje amplio para el control de la sepsis y derivación biliar si es posible.\"<br><br>Análisis de Distractores: La opción A es el tratamiento definitivo, el cual está proscrito si no hay un experto. Las opciones C y D aumentan el riesgo de isquemia y estenosis secundaria al no dominar la tensión anastomótica en un lecho friable.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ1, Página 149." 
            },
            {
                id: 62, 
                question: "En el contexto de reconstrucción de mínima invasión, ¿qué limitante técnica específica vuelve al abordaje laparoscópico considerablemente más complejo que la plataforma robótica?", 
                options: ["Imposibilidad de insuflar dióxido de carbono", "Sutura fina intracorpórea en el hilio", "Incapacidad de realizar maniobra de Kocher", "Dificultad para visualizar el lóbulo hepático"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, la anastomosis bilioentérica requiere microdisección y puntos milimétricos en la placa hiliar (porta hepatis). Muy pocos cirujanos dominan la sutura laparoscópica pura en espacios tan reducidos, barrera que la robótica logra sortear con su articulación.<br><br>Perla ENARM: \"Muy pocos cirujanos tienen experiencia adecuada en sutura laparoscópica fina... la sutura robótica puede superar algunos de estos desafíos.\"<br><br>Análisis de Distractores: Las opciones A, C y D son falsas; la laparoscopia permite una adecuada insuflación, visualización hepática y disección del plano duodenal, pero carece de la ergonomía articular del robot para anudar sin tensión.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ2, Página 160."

            {
                id: 63, 
                question: "En la evaluación de la morbilidad global por complicaciones (Clavien Dindo ≥ 3), ¿cuál es el comportamiento estadístico de la reparación quirúrgica temprana frente a la tardía?", 
                options: ["Es sustancialmente mayor en la temprana", "Es estadísticamente similar en ambas", "Es sustancialmente mayor en la tardía", "Depende del uso de profilaxis antibiótica"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, aunque la reparación temprana eleva marcadamente los riesgos de estenosis, reoperación y mortalidad específica, el análisis agrupado para complicaciones globales mayores (Clavien Dindo III-IV) no alcanzó diferencia estadística concluyente entre ambos grupos.<br><br>Perla ENARM: \"La tasa de morbilidad no fue significativamente diferente ni en el RCT (OR: 1.14) ni en el estudio observacional (OR: 0.87) entre la reparación temprana y tardía.\"<br><br>Análisis de Distractores: Las opciones A y C contradicen los resultados de los metaanálisis de este desenlace específico. La opción D es un factor general pero no dictamina la diferencia estadística basal intrínseca a la técnica y su temporalidad.",

            {
                id: 64, 
                question: "Fisiológicamente, ¿cuál es la principal ventaja biomecánica argumentada a favor de la reconstrucción biliar mediante hepaticoduodenostomía?", 
                options: ["Excluye el tránsito de enzimas pancreáticas", "Aísla un asa intestinal en forma de Y", "Conecta la vía biliar directo al duodeno", "Previene la formación del síndrome de sumidero"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC, abocar el conducto directamente a la primera/segunda porción duodenal simula el vaciamiento anatómico natural, siendo una técnica de un solo paso que evita las exclusiones extensas del intestino medio.<br><br>Perla ENARM: \"En comparación, la hepaticoduodenostomía ofrece el beneficio de ser una cirugía técnicamente más fisiológica y proporciona un acceso más fácil a la reparación.\"<br><br>Análisis de Distractores: Las opciones A y B describen la técnica de hepaticoyeyunostomía en Y de Roux. La opción D es falsa, el síndrome de sumidero es precisamente la complicación insigne de la hepaticoduodenostomía.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 182." 
            },
            {
                id: 65, 
                question: "Para garantizar una hepaticoduodenostomía libre de tensión en lesiones biliares proximales o altas, ¿qué maniobra quirúrgica es un requerimiento técnico obligatorio?", 
                options: ["Desvascularización de la curvatura menor", "Movilización extensa del duodeno", "Resección del segmento hepático 4b", "Cierre de la papila de Vater"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, el duodeno es un órgano parcialmente retroperitoneal. Para lograr que alcance el hilio hepático superior sin traccionar la línea de sutura, se requiere despegar profundamente su fijación (maniobra de Kocher). Si hay inflamación, esto es sumamente riesgoso.<br><br>Perla ENARM: \"Mientras más alta sea la lesión, más movilización se requiere para la creación de una anastomosis hepaticoduodenal libre de tensión.\"<br><br>Análisis de Distractores: Las opciones A, C y D no son maniobras estándar para alargar el tracto digestivo hacia el retroperitoneo superior.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 183." 
            },
            {
                id: 66, 
                question: "Históricamente, ¿qué condición estructural de la vía biliar era un requisito absoluto para plantear la eficacia de un abordaje puramente endoscópico?", 
                options: ["Inflamación pélvica coexistente", "Conducto desfuncionalizado totalmente", "Isquemia de la arteria hepática", "Vía biliar en continuidad anatómica"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC, la canulación retrógrada con guía hidrofilica a través de la papila solo es viable si existe un tracto anatómico, por mínimo que sea, que conecte el colédoco inferior con el muñón superior. Las transecciones completas requieren manejo percutáneo o quirúrgico.<br><br>Perla ENARM: \"Históricamente, el tratamiento endoscópico se empleaba a menudo en estos pacientes, pero solo cuando el conducto estaba en continuidad con el resto del árbol biliar.\"<br><br>Análisis de Distractores: La opción B imposibilita el paso del stent. La opción C disminuye el éxito de cicatrización a largo plazo independientemente del método. La opción A es irrelevante anatómicamente.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 103." 
            },
            {
                id: 67, 
                question: "Desde la perspectiva del paciente, ¿cuál es el principal compromiso o carga inaceptable que disuade de elegir la terapia endoscópica frente a la cirugía definitiva?", 
                options: ["Riesgo de cicatrices queloides abdominales", "Necesidad de reintervenciones por meses", "Desarrollo de hernias postincisionales", "Extirpación prolongada de ganglios linfáticos"],

            {

                question: "En el metaanálisis de técnicas de mínima invasión para la restitución biliar, ¿cuál fue el promedio de pérdida sanguínea intraoperatoria documentado?", 
                options: ["135 ml", "400 ml", "850 ml", "50 ml"], 
                answer: 0,

            {

                question: "Según las cohortes internacionales, ¿cuál es el rango de duración quirúrgica operativa promedio para efectuar una anastomosis biliar por mínima invasión?", 
                options: ["60 a 90 minutos", "190 a 330 minutos", "40 a 50 minutos", "400 a 500 minutos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, la disección de adherencias, la identificación anatómica de muñones retraídos isquémicos y la sutura laparoscópica o robótica exigen tiempos operatorios prolongados pero controlados.<br><br>Perla ENARM: \"El promedio de duración operativa osciló entre 190 y 330 minutos, con una estancia hospitalaria media postoperatoria de 6.3 días.\"<br><br>Análisis de Distractores: Las opciones A y C son rangos irreales para una reconstrucción intracorpórea mayor. La opción D indica tiempos excesivos de complicaciones transoperatorias severas, no los promedios reportados universalmente.",

            {

                question: "Al analizar metaanálisis previos clásicos, ¿en qué intervalo cronológico de reparación se observaba paradójicamente la morbilidad posoperatoria más catastrófica?", 
                options: ["Menos de 72 horas", "Entre 2 y 6 semanas", "Más de 8 semanas", "Más de 6 meses"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, este periodo \"intermedio\" representa el clímax de la fase inflamatoria aguda intrabdominal. Los tejidos alcanzan su máxima fragilidad (fase exudativa y de tejido de granulación inmaduro), asegurando el fallo de las suturas.<br><br>Perla ENARM: \"Un metaanálisis previo mostró que la morbilidad posoperatoria fue significativamente mayor en el intervalo intermedio (2-6 semanas) en comparación con la reparación temprana y tardía.\"<br><br>Análisis de Distractores: Las opciones A, C y D representan estadios tisulares donde el tejido está biológicamente menos predispuesto al desgarro sutural inmediato (o pre-inflamación severa, o ya en fibrosis madura).",

            {

                question: "Al evaluar intervenciones en centros de alta especialidad (HPB), ¿cómo resultó la tasa de fallo de la reparación inmediata (intraoperatoria) frente a la diferida posoperatoria?", 
                options: ["Fue drásticamente mayor en intraoperatorias", "Fue idéntica en ambos abordajes", "Fue menor en las intraoperatorias", "Alcanzó el 100% en ambos casos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC, cuando la lesión se identifica en el acto quirúrgico y es reparada por un cirujano verdaderamente especializado en cirugía hepática, se evita la progresión a sepsis peritonial y la retracción fibrótica. En este escenario estrictamente seleccionado, los fallos son numéricamente inferiores (18.9% vs 24.7%).<br><br>Perla ENARM: \"Se observó una tasa más baja de fallo de reparación para las reparaciones en la mesa quirúrgica en comparación con las reparaciones posoperatorias (18.9% vs 24.7%) en centros especializados HPB.\"<br><br>Análisis de Distractores: Las opciones A y B aplican cuando se incluyen en la estadística a cirujanos generales no entrenados, lo cual invierte los resultados. La opción D es biológicamente falsa.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 50."

            {
                id: 72, 
                question: "Desde el análisis de la equidad en salud, ¿qué carencia estructural limita globalmente la adopción universal del manejo no operatorio (endoscópico/radiológico) para lesiones biliares severas?", 
                options: ["Falta de disponibilidad de antibióticos empíricos", "Ausencia de especialistas en endoscopia e intervencionismo", "Escasez de hemoglobina en bancos de sangre", "Carencia de ventiladores mecánicos posquirúrgicos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, la canulación de conductos biliares colapsados o disecados requiere pericia de tercer nivel (CPRE avanzada o radiología percutánea). Hospitales periféricos rurales carecen de estos operadores, restringiendo al paciente a opciones de derivación puramente quirúrgica abierta.<br><br>Perla ENARM: \"Los especialistas en endoscopia y radiología intervencionista pueden no existir o no estar bien versados en las terapias específicas, limitando las opciones disponibles en esas instituciones.\"<br><br>Análisis de Distractores: Las opciones A, C y D representan insumos y equipos de medicina general/crítica que no son exclusivos ni la limitante técnica cardinal para el abordaje de la vía biliar por orificios naturales o percutáneos.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Health Equity, Página 189."

            {
                id: 73, 
                question: "De acuerdo a la GPC, además de la obesidad, ¿qué factor anatómico adquirido del paciente contraindica o dificulta severamente la confección de una hepaticoyeyunostomía?", 
                options: ["Adherencias por cirugía abdominal previa", "Hipertrofia del lóbulo caudado", "Diámetro biliar menor a 5 mm", "Arteria hepática derecha accesoria"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC, para construir una Y de Roux se debe movilizar el intestino delgado desde el ángulo de Treitz, medir asas y subirlas al compartimento supramesocólico. Adherencias pélvicas o mesentéricas previas (síndrome adherencial) impiden esta excursión, favoreciendo el uso de hepaticoduodenostomía.<br><br>Perla ENARM: \"La hepaticoyeyunostomía puede ser extremadamente desafiante en pacientes con... cirugía abdominal previa con adherencias intraabdominales extensas.\"<br><br>Análisis de Distractores: Las opciones B, C y D son variaciones o características hiliares que exigen técnica fina, pero no anclan mecánicamente el ascenso de las asas yeyunales desde el piso inferior del abdomen.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 181." 
            },
            {
                id: 74, 
                question: "¿Qué condición fenotípica anatómica en un paciente con detección temprana de la lesión biliar lo clasifica como un \"mal candidato\" para intervención endoscópica?", 
                options: ["Sistema biliar colapsado o no dilatado", "Índice de masa corporal mayor a 35", "Edad avanzada mayor de 70 años", "Colecciones periepáticas purulentas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC, la fuga biliar activa aguda vacía los conductos, dejándolos de un calibre ínfimo. El endoscopista requiere conductos tensos y dilatados (generalmente por estenosis crónica) para guiar la prótesis adecuadamente sin crear falsas vías o perforaciones coledocianas.<br><br>Perla ENARM: \"Típicamente se necesita una anatomía favorable con un sistema biliar dilatado... aquellos con descubrimiento pronto de la lesión pueden no ser tan buenos candidatos por esta razón.\"<br><br>Análisis de Distractores: Las opciones B y C no interfieren con el acceso transgástrico endoscópico. La opción D mandata control infeccioso, pero no imposibilita mecánicamente la expansión de un stent si la vía estuviera adecuadamente calibrada.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ3, Página 171." 
            },
            {
                id: 75, 
                question: "¿En qué patología obstructiva no relacionada al trauma iatrogénico se evidenció en estudios previos que la hepaticoduodenostomía genera más estenosis que el asa yeyunal?", 
                options: ["Colangiocarcinoma perihiliar", "Enfermedades biliares benignas", "Cáncer de cabeza de páncreas", "Quistes de colédoco tipo I"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, al explorar literatura indirecta (cohorte extraída de indicaciones por litiasis recurrente o disfunción benigna del esfínter), conectar el duodeno al colédoco demostró una propensión intrínseca a estenosis superior a la del yeyuno, posiblemente mediado por el ambiente hostil del flujo pilórico.<br><br>Perla ENARM: \"En un estudio previo sobre pacientes con enfermedades biliares benignas, se demostró que... experimentaron una mayor incidencia de estenosis anastomóticas en comparación con la hepaticoyeyunostomía.\"<br><br>Análisis de Distractores: Las opciones A y C cursan habitualmente con resecciones oncológicas que obligan derivación a yeyuno (Whipple/Hepatectomías). La opción D corresponde a patología congénita pediátrica, no abordada como comparador primario adulto.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 53." 
            },
            {
                id: 76, 
                question: "En el protocolo riguroso de seguimiento clínico para la monitorización e investigación a largo plazo de esta catástrofe, ¿qué métricas deben registrarse obligatoriamente a los 5-10 años?", 
                options: ["Tasa de estenosis y reintervención", "Necesidad de nutrición parenteral", "Incidencia de fístula pancreática", "Marcadores tumorales CA 19-9"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC, la cicatriz isquémica avascular responsable de ocluir la anastomosis puede tardar una década completa en manifestar un compromiso luminal crítico o cirrosis biliar focal, por lo que el éxito del cirujano no puede dictaminarse en el primer año.<br><br>Perla ENARM: \"Los datos de 5 a 10 años con respecto a la tasa de estenosis, la calidad de vida, la mortalidad y la reintervención... serían de una importancia sustancial.\"<br><br>Análisis de Distractores: Las opciones B y C evalúan morbilidades agudas/subagudas propias de resecciones de páncreas o intestino corto. La opción D monitoriza recidiva neoplásica maligna.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Monitoring and evaluation, Página 188." 
            },
            {
                id: 77, 
                question: "Para la generación de recomendaciones en el marco GRADE, ¿qué rango numérico en la escala de valores de utilidad se asignó para representar el peor desenlace clínico posible (Muerte)?", 
                options: ["Valor de 1", "Valor de 100", "Valor de 0", "Valor de -1"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC, la metodología de toma de decisiones empleó valores umbrales cuantitativos precisos. A la muerte se le designó una utilidad absoluta de 0, y al mejor estado de salud vital 1. Las intervenciones se puntuaron matemáticamente en base a este coeficiente de riesgo.<br><br>Perla ENARM: \"Se pidió a los miembros del panel que calificaran la utilidad de cada resultado... en una escala cardinal de 0 a 1... siendo 0 la muerte y 1 el mejor estado de salud posible.\"<br><br>Análisis de Distractores: Las opciones A, B y D son escalas numéricas ficticias no correspondientes al coeficiente de utilidad estandarizado (Quality-Adjusted Life Year / Utility weight) usado formalmente por el panel.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Determining utility values, Página 118." 
            },
            {
                id: 78, 
                question: "Con la finalidad de garantizar una visualización ergonómica e ingreso laparoscópico seguro en pacientes reoperados por lesión biliar, ¿qué técnica de acceso instruye el consenso?", 
                options: ["Entrada abdominal lejos de incisiones previas", "Uso rutinario de técnica de Hasson umbilical", "Insuflación hepática directa transcostal", "Acceso exclusivo con puerto único umbilical"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC, la presencia de cicatrices quirúrgicas augura adherencias de epiplón e intestino al peritoneo parietal. Ingresar los trócares en cuadrantes vírgenes previene perforaciones inadvertidas que contaminarían la cavidad o fugarían el neumoperitoneo.<br><br>Perla ENARM: \"La inquietud puede rodear las reparaciones MIS debido al ingreso en un abdomen reoperado... pero entrar en el abdomen lejos de los sitios de incisión índice es típicamente seguro.\"<br><br>Análisis de Distractores: La opción B suele estar comprometida por la extracción de la vesícula en el procedimiento primario. Las opciones C y D aumentan drásticamente el riesgo de colisión instrumental y falla de exposición.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Evidence discussion KQ2, Página 160." 
            },
            {
                id: 79, 
                question: "Como herramienta tecnológica prioritaria a desarrollar en futuras investigaciones, ¿qué propone el consenso para estandarizar la decisión entre efectuar una cirugía temprana versus tardía?", 
                options: ["Calculadora de riesgo con nomograma", "Algoritmo de inteligencia artificial robótico", "Inmunofluorescencia con verde de indocianina", "Pruebas genómicas de cicatrización"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC, dado que la decisión depende de múltiples variables intrincadas (tiempo, sepsis, nivel de lesión, vascularidad), proveer al cirujano general de una ecuación clínica estructurada mitigará la morbilidad de intervenciones precipitadas y sesgos humanos.<br><br>Perla ENARM: \"Una herramienta de calculadora de riesgo tipo nomograma para facilitar la toma de decisiones entre la reparación temprana y tardía basada en factores del paciente... sería de gran beneficio.\"<br><br>Análisis de Distractores: Las opciones B, C y D representan avances biomédicos costosos y experimentales, ajenos a la estratificación y análisis epidemiológico multivariable solicitado explícitamente en el documento.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Future research, Página 153." 
            },
            {
                id: 80, 
                question: "Dentro del análisis sistemático, ¿qué porcentaje de exclusión máximo se aceptó para pacientes que ya presentaban un intento previo de reparación biliar definitiva fallida?", 
                options: ["Menos del 50%", "Menos del 30%", "Menos del 10%", "Cero absoluto por protocolo"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC, incluir un volumen alto de pacientes reintervenidos ensucia la pureza de la estadística, ya que una segunda o tercera reconstrucción enfrenta una vía biliar densamente necrótica o fibrótica, distorsionando las tasas de éxito de la técnica quirúrgica original en estudio.<br><br>Perla ENARM: \"Las reparaciones debían ser definitivas sin intentos previos de reparación definitiva (se permitía la excepción si representaban menos del 10% de los casos).\"<br><br>Análisis de Distractores: Las opciones A y B diluirían la validación primaria de los desenlaces. La opción D (cero absoluto) fue flexibilizada para no desechar series retrospectivas de vida real enteras que incluyeran casos aislados.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Literature search and eligibility, Página 9." 
            },
            {
                id: 61, 
                question: "De acuerdo a la GPC, si se detecta una lesión biliar severa de forma intraoperatoria y no se cuenta con un cirujano experto, ¿qué medidas de contención transoperatorias están indicadas antes de referir al paciente?", 
                options: ["Hepaticoyeyunostomía en Y de Roux", "Drenaje amplio y derivación biliar", "Cierre primario con sutura monofilamento", "Colocación de tubo en T de urgencia"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, intentar una reconstrucción anatómica sin la experiencia técnica en cirugía hepatobiliar garantiza el fracaso. La prioridad máxima es controlar la sepsis y evitar la acumulación de colecciones.<br><br>Perla ENARM: \"Si la lesión se detecta en la operación índice, las medidas de temporalidad seguras incluyen drenaje amplio para el control de la sepsis y derivación biliar si es posible.\"<br><br>Análisis de Distractores: La opción A es el tratamiento definitivo, el cual está proscrito si no hay un experto. Las opciones C y D aumentan el riesgo de isquemia y estenosis secundaria al no dominar la tensión anastomótica en un lecho friable.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ1, Página 149." 
            },
            {
                id: 62, 
                question: "En el contexto de reconstrucción de mínima invasión, ¿qué limitante técnica específica vuelve al abordaje laparoscópico considerablemente más complejo que la plataforma robótica?", 
                options: ["Imposibilidad de insuflar dióxido de carbono", "Sutura fina intracorpórea en el hilio", "Incapacidad de realizar maniobra de Kocher", "Dificultad para visualizar el lóbulo hepático"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, la anastomosis bilioentérica requiere microdisección y puntos milimétricos en la placa hiliar (porta hepatis). Muy pocos cirujanos dominan la sutura laparoscópica pura en espacios tan reducidos, barrera que la robótica logra sortear con su articulación.<br><br>Perla ENARM: \"Muy pocos cirujanos tienen experiencia adecuada en sutura laparoscópica fina... la sutura robótica puede superar algunos de estos desafíos.\"<br><br>Análisis de Distractores: Las opciones A, C y D son falsas; la laparoscopia permite una adecuada insuflación, visualización hepática y disección del plano duodenal, pero carece de la ergonomía articular del robot para anudar sin tensión.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ2, Página 160." 
            },
            {
                id: 63, 
                question: "En la evaluación de la morbilidad global por complicaciones (Clavien Dindo ≥ 3), ¿cuál es el comportamiento estadístico de la reparación quirúrgica temprana frente a la tardía?", 
                options: ["Es sustancialmente mayor en la temprana", "Es estadísticamente similar en ambas", "Es sustancialmente mayor en la tardía", "Depende del uso de profilaxis antibiótica"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, aunque la reparación temprana eleva marcadamente los riesgos de estenosis, reoperación y mortalidad específica, el análisis agrupado para complicaciones globales mayores (Clavien Dindo III-IV) no alcanzó diferencia estadística concluyente entre ambos grupos.<br><br>Perla ENARM: \"La tasa de morbilidad no fue significativamente diferente ni en el RCT (OR: 1.14) ni en el estudio observacional (OR: 0.87) entre la reparación temprana y tardía.\"<br><br>Análisis de Distractores: Las opciones A y C contradicen los resultados de los metaanálisis de este desenlace específico. La opción D es un factor general pero no dictamina la diferencia estadística basal intrínseca a la técnica y su temporalidad.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Results KQ1, Página 21." 
            },
            {
                id: 64, 
                question: "Fisiológicamente, ¿cuál es la principal ventaja biomecánica argumentada a favor de la reconstrucción biliar mediante hepaticoduodenostomía?", 
                options: ["Excluye el tránsito de enzimas pancreáticas", "Aísla un asa intestinal en forma de Y", "Conecta la vía biliar directo al duodeno", "Previene la formación del síndrome de sumidero"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC, abocar el conducto directamente a la primera/segunda porción duodenal simula el vaciamiento anatómico natural, siendo una técnica de un solo paso que evita las exclusiones extensas del intestino medio.<br><br>Perla ENARM: \"En comparación, la hepaticoduodenostomía ofrece el beneficio de ser una cirugía técnicamente más fisiológica y proporciona un acceso más fácil a la reparación.\"<br><br>Análisis de Distractores: Las opciones A y B describen la técnica de hepaticoyeyunostomía en Y de Roux. La opción D es falsa, el síndrome de sumidero es precisamente la complicación insigne de la hepaticoduodenostomía.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 182." 
            },
            {
                id: 65, 
                question: "Para garantizar una hepaticoduodenostomía libre de tensión en lesiones biliares proximales o altas, ¿qué maniobra quirúrgica es un requerimiento técnico obligatorio?", 
                options: ["Desvascularización de la curvatura menor", "Movilización extensa del duodeno", "Resección del segmento hepático 4b", "Cierre de la papila de Vater"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, el duodeno es un órgano parcialmente retroperitoneal. Para lograr que alcance el hilio hepático superior sin traccionar la línea de sutura, se requiere despegar profundamente su fijación (maniobra de Kocher). Si hay inflamación, esto es sumamente riesgoso.<br><br>Perla ENARM: \"Mientras más alta sea la lesión, más movilización se requiere para la creación de una anastomosis hepaticoduodenal libre de tensión.\"<br><br>Análisis de Distractores: Las opciones A, C y D no son maniobras estándar para alargar el tracto digestivo hacia el retroperitoneo superior.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ4, Página 183." 
            },
            {
                id: 66, 
                question: "Históricamente, ¿qué condición estructural de la vía biliar era un requisito absoluto para plantear la eficacia de un abordaje puramente endoscópico?", 
                options: ["Inflamación pélvica coexistente", "Conducto desfuncionalizado totalmente", "Isquemia de la arteria hepática", "Vía biliar en continuidad anatómica"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC, la canulación retrógrada con guía hidrofilica a través de la papila solo es viable si existe un tracto anatómico, por mínimo que sea, que conecte el colédoco inferior con el muñón superior. Las transecciones completas requieren manejo percutáneo o quirúrgico.<br><br>Perla ENARM: \"Históricamente, el tratamiento endoscópico se empleaba a menudo en estos pacientes, pero solo cuando el conducto estaba en continuidad con el resto del árbol biliar.\"<br><br>Análisis de Distractores: La opción B imposibilita el paso del stent. La opción C disminuye el éxito de cicatrización a largo plazo independientemente del método. La opción A es irrelevante anatómicamente.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Introduction, Página 103." 
            },
            {
                id: 67, 
                question: "Desde la perspectiva del paciente, ¿cuál es el principal compromiso o carga inaceptable que disuade de elegir la terapia endoscópica frente a la cirugía definitiva?", 
                options: ["Riesgo de cicatrices queloides abdominales", "Necesidad de reintervenciones por meses", "Desarrollo de hernias postincisionales", "Extirpación prolongada de ganglios linfáticos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, los testimonios directos de los pacientes enfatizan su aversión a someterse a sedaciones repetidas y recambios de stents, prefiriendo la recuperación intensa de una sola cirugía definitiva.<br><br>Perla ENARM: \"El manejo endoscópico a menudo requiere múltiples reintervenciones durante meses seguidos para tratar completamente la lesión y por lo tanto es potencialmente menos deseable.\"<br><br>Análisis de Distractores: Las opciones A y C son morbilidades asociadas a la cirugía, no a la endoscopia. La opción D corresponde a cirugía oncológica, no reconstructiva benigna.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Recommendations KQ3, Página 174." 
            },
            {
                id: 68, 
                question: "En el metaanálisis de técnicas de mínima invasión para la restitución biliar, ¿cuál fue el promedio de pérdida sanguínea intraoperatoria documentado?", 
                options: ["135 ml", "400 ml", "850 ml", "50 ml"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC, la magnificación óptica y el control hemostático fino inherente a las pinzas bipolares de laparoscopia y robótica mantienen el sangrado intraoperatorio en rangos sumamente bajos durante la confección anastomótica.<br><br>Perla ENARM: \"La revisión sistemática reveló que... el promedio de pérdida de sangre fue de 135.9 ml exhibiendo tasas de morbilidad comparables.\"<br><br>Análisis de Distractores: Las opciones B y C reflejan sangrados más comunes en cirugía abierta compleja o con desgarros hiliares. La opción D subestima el sangrado natural de la disección en la placa hepática.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 51." 
            },
            {
                id: 69, 
                question: "Según las cohortes internacionales, ¿cuál es el rango de duración quirúrgica operativa promedio para efectuar una anastomosis biliar por mínima invasión?", 
                options: ["60 a 90 minutos", "190 a 330 minutos", "40 a 50 minutos", "400 a 500 minutos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, la disección de adherencias, la identificación anatómica de muñones retraídos isquémicos y la sutura laparoscópica o robótica exigen tiempos operatorios prolongados pero controlados.<br><br>Perla ENARM: \"El promedio de duración operativa osciló entre 190 y 330 minutos, con una estancia hospitalaria media postoperatoria de 6.3 días.\"<br><br>Análisis de Distractores: Las opciones A y C son rangos irreales para una reconstrucción intracorpórea mayor. La opción D indica tiempos excesivos de complicaciones transoperatorias severas, no los promedios reportados universalmente.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 51." 
            },
            {
                id: 70, 
                question: "Al analizar metaanálisis previos clásicos, ¿en qué intervalo cronológico de reparación se observaba paradójicamente la morbilidad posoperatoria más catastrófica?", 
                options: ["Menos de 72 horas", "Entre 2 y 6 semanas", "Más de 8 semanas", "Más de 6 meses"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, este periodo \"intermedio\" representa el clímax de la fase inflamatoria aguda intrabdominal. Los tejidos alcanzan su máxima fragilidad (fase exudativa y de tejido de granulación inmaduro), asegurando el fallo de las suturas.<br><br>Perla ENARM: \"Un metaanálisis previo mostró que la morbilidad posoperatoria fue significativamente mayor en el intervalo intermedio (2-6 semanas) en comparación con la reparación temprana y tardía.\"<br><br>Análisis de Distractores: Las opciones A, C y D representan estadios tisulares donde el tejido está biológicamente menos predispuesto al desgarro sutural inmediato (o pre-inflamación severa, o ya en fibrosis madura).", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 43." 
            },
            {
                id: 71, 
                question: "Al evaluar intervenciones en centros de alta especialidad (HPB), ¿cómo resultó la tasa de fallo de la reparación inmediata (intraoperatoria) frente a la diferida posoperatoria?", 
                options: ["Fue drásticamente mayor en intraoperatorias", "Fue idéntica en ambos abordajes", "Fue menor en las intraoperatorias", "Alcanzó el 100% en ambos casos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC, cuando la lesión se identifica en el acto quirúrgico y es reparada por un cirujano verdaderamente especializado en cirugía hepática, se evita la progresión a sepsis peritonial y la retracción fibrótica. En este escenario estrictamente seleccionado, los fallos son numéricamente inferiores (18.9% vs 24.7%).<br><br>Perla ENARM: \"Se observó una tasa más baja de fallo de reparación para las reparaciones en la mesa quirúrgica en comparación con las reparaciones posoperatorias (18.9% vs 24.7%) en centros especializados HPB.\"<br><br>Análisis de Distractores: Las opciones A y B aplican cuando se incluyen en la estadística a cirujanos generales no entrenados, lo cual invierte los resultados. La opción D es biológicamente falsa.", 
                source: "SAGES-AHPBA 2025 a systematic review and meta-analysis on the surgical management of bile duct injury, 2025, Discussion, Página 50." 
            },
            {
                id: 72, 
                question: "Desde el análisis de la equidad en salud, ¿qué carencia estructural limita globalmente la adopción universal del manejo no operatorio (endoscópico/radiológico) para lesiones biliares severas?", 
                options: ["Falta de disponibilidad de antibióticos empíricos", "Ausencia de especialistas en endoscopia e intervencionismo", "Escasez de hemoglobina en bancos de sangre", "Carencia de ventiladores mecánicos posquirúrgicos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC, la canulación de conductos biliares colapsados o disecados requiere pericia de tercer nivel (CPRE avanzada o radiología percutánea). Hospitales periféricos rurales carecen de estos operadores, restringiendo al paciente a opciones de derivación puramente quirúrgica abierta.<br><br>Perla ENARM: \"Los especialistas en endoscopia y radiología intervencionista pueden no existir o no estar bien versados en las terapias específicas, limitando las opciones disponibles en esas instituciones.\"<br><br>Análisis de Distractores: Las opciones A, C y D representan insumos y equipos de medicina general/crítica que no son exclusivos ni la limitante técnica cardinal para el abordaje de la vía biliar por orificios naturales o percutáneos.", 
                source: "SAGES-AHPBA 2025 Guideline for the Surgical Management of Bile Duct Injury Following Cholecystectomy, 2025, Health Equity, Página 189." 
            },
            {
                id: 73, 
                question: "De acuerdo a la GPC, además de la obesidad, ¿qué factor anatómico adquirido del paciente contraindica o dificulta severamente la confección de una hepaticoyeyunostomía?",

                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';

            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }
