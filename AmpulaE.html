    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
    {
        id: 1, 
        question: "¿Cuántas veces es mayor el riesgo de desarrollar cáncer ampular y duodenal en un paciente con Poliposis Adenomatosa Familiar en comparación con la población general?", 
        options: ["50", "100", "330", "500"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Tumores ampulares Guía Francesa, los pacientes con Poliposis Adenomatosa Familiar (PAF) tienen un riesgo hasta 330 veces mayor de desarrollar cáncer duodenal o ampular, siendo esta la segunda causa principal de muerte en esta población específica. La vigilancia estrecha y la toma de decisiones oportunas previene la progresión a carcinoma invasivo.<br><br>Perla ENARM: \"El riesgo de desarrollar cáncer duodenal/ampular en pacientes con PAF es 330 veces mayor que en la población general\".<br><br>Análisis de Distractores: Las opciones 50, 100 y 500 no corresponden al riesgo relativo documentado en la evidencia epidemiológica para esta patología genética. El riesgo de malignización es extraordinariamente alto, justificando protocolos de tamizaje invasivo en vez de observación clínica convencional.", 
        source: "Tumores ampulares Guía de práctica clínica intergrupal francesa, 2024, Epidemiología, Página 466." 
    },
    {
        id: 2, 
        question: "¿Cuál es el estudio de imagen considerado como el estándar de oro para determinar la profundidad de invasión local y extensión ductal de un adenoma ampular?", 
        options: ["Tomografía por emisión de positrones", "Ultrasonido endoscópico", "Tomografía axial computarizada", "Resonancia magnética"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía NCCN Cáncer Ampular, el ultrasonido endoscópico (USE) es el estudio de elección, altamente sensible y obligatorio para determinar la profundidad de la lesión en la pared, la invasión a la capa muscular propia del duodeno y medir objetivamente la extensión intraductal.<br><br>Perla ENARM: \"La ecografía endoscópica (USE) es obligatoria como complemento para descartar invasión pancreática\".<br><br>Análisis de Distractores: La tomografía computarizada y la resonancia magnética carecen de la resolución espacial milimétrica necesaria para distinguir con precisión las capas de la pared duodenal. La tomografía por emisión de positrones carece de utilidad para la estadificación local locorregional de lesiones premalignas en estadio incipiente.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Ampullary Adenocarcinoma, 2026, Workup, Página 125." 
    },
    {
        id: 3, 
        question: "¿Cuál es el porcentaje reportado de falsos negativos para el diagnóstico de adenocarcinoma oculto en las biopsias endoscópicas preoperatorias de adenomas ampulares?", 
        options: ["<5%", "10 a 15%", "20 a 40%", "60 a 80%"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía NCCN Cáncer Ampular, las biopsias endoscópicas preoperatorias tienen una alta tasa de muestreo inadecuado, resultando en un 20% a 40% de falsos negativos para focos de adenocarcinoma invasivo oculto dentro del tejido adenomatoso predominante.<br><br>Perla ENARM: \"Existe un alto riesgo de falsos negativos (hasta 20-40%) para focos de adenocarcinoma oculto dentro de un adenoma\".<br><br>Análisis de Distractores: Cifras menores (A, B) subestiman severamente el riesgo clínico que fundamenta la necesidad estricta de resección total (papilectomía) para asegurar el diagnóstico histopatológico definitivo. La opción D sobreestima matemáticamente el fallo diagnóstico de la pinza de biopsia.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Ampullary Adenocarcinoma, 2026, Discussion, Página 181." 
    },
    {
        id: 4, 
        question: "En la clasificación de Spigelman utilizada en la Poliposis Adenomatosa Familiar, ¿cuál de los siguientes hallazgos histológicos otorga el puntaje máximo de severidad (3 puntos)?", 
        options: ["Adenoma tubular", "Displasia de bajo grado", "Adenoma tubulovelloso", "Adenoma velloso"], 
        answer: 3, 
        justification: "Justificación: De acuerdo al documento Springer Cirugía de Páncreas, la clasificación de Spigelman asigna 3 puntos a los adenomas con arquitectura vellosa pura, al ser el subtipo histológico con el mayor potencial de transformación maligna locorregional documentado en la secuencia adenoma-carcinoma.<br><br>Perla ENARM: \"En la clasificación de Spigelman, la histología se puntúa como Tubular (1 punto), Tubulovelloso (2 puntos), Velloso (3 puntos)\".<br><br>Análisis de Distractores: El adenoma tubular otorga 1 punto y el fenotipo tubulovelloso aporta 2 puntos. La displasia de bajo grado corresponde a la antigua nomenclatura de \"displasia leve\" y únicamente suma 1 punto a la estratificación de riesgo general.", 
        source: "Benign, Premalignant, and Malignant Duodenal Neoplasms, Springer, 2025, Spigelman Classification, Página 43." 
    },
    {
        id: 5, 
        question: "¿Qué opción farmacológica ha demostrado reducir de manera significativa la carga de poliposis duodenal tras 6 meses de uso continuo en pacientes con Poliposis Adenomatosa Familiar poscolectomía?", 
        options: ["Naproxeno", "Celecoxib", "Ácido acetilsalicílico", "Ibuprofeno"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Springer Cirugía de Páncreas, el uso profiláctico del inhibidor selectivo de la COX-2 (Celecoxib) ha comprobado, en ensayos controlados, reducir la proliferación neoplásica y la densidad de pólipos duodenales tras un tratamiento sostenido.<br><br>Perla ENARM: \"El tratamiento con celecoxib ha demostrado una reducción significativa de la poliposis duodenal en pacientes con PAF poscolectomía\".<br><br>Análisis de Distractores: El naproxeno, el ibuprofeno y el ácido acetilsalicílico son antiinflamatorios no esteroideos convencionales que, si bien intervienen en la cascada inflamatoria, no cuentan con el mismo respaldo de evidencia clínica nivel 1 en la regresión medible de pólipos en este síndrome hereditario.", 
        source: "Benign, Premalignant, and Malignant Duodenal Neoplasms, Springer, 2025, Duodenal Adenomas, Página 41." 
    },
    {
        id: 6, 
        question: "Según el consenso del Royal College of Pathologists en Europa, ¿cuál es la distancia libre de tumor circunferencial requerida en la pieza patológica para definir una resección R0 tras una pancreatoduodenectomía?", 
        options: [">0 mm", ">1 mm", ">2 mm", ">5 mm"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Springer Patología, en los protocolos europeos estrictos la resección oncológica R0 se define de manera formal únicamente cuando la distancia celular medida desde el margen invasivo del tumor hasta el borde quirúrgico entintado supera 1 mm de espesor de tejido sano.<br><br>Perla ENARM: \"Para los patólogos europeos y australianos, el margen R1 se define como la presencia de tumor a ≤1 mm del margen quirúrgico\".<br><br>Análisis de Distractores: La regla de >0 mm (A) es el criterio utilizado actualmente en las guías estadounidenses (AJCC/CAP), requiriendo solo ausencia de células en la tinta. Distancias mayores de 2 mm (C) o 5 mm (D) superan las exigencias de cualquier protocolo de estatificación universalmente validado.", 
        source: "Pathology Reporting of Resected Pancreatic/Periampullary Cancer Specimen, Springer, 2025, Margin Involvement, Página 379." 
    },
    {
        id: 7, 
        question: "¿Cuál de los siguientes es un criterio anatómico formal para indicar una ampulectomía quirúrgica transduodenal de primera intención en lugar de una papilectomía endoscópica?", 
        options: ["Tamaño tumoral de 1.5 cm", "Displasia de bajo grado", "Divertículo duodenal yuxtapapilar", "Arquitectura histológica tubular"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Tumores ampulares Guía Francesa, la presencia de alteraciones estructurales complejas como un divertículo duodenal yuxtapapilar es una contraindicación técnica para el manejo endoscópico debido a la alta tasa de perforación y maniobrabilidad reducida, requiriendo abordaje operatorio.<br><br>Perla ENARM: \"Se indicará ampulectomía quirúrgica en presencia de divertículos duodenales que impidan la endoscopia\".<br><br>Análisis de Distractores: Un diámetro de 1.5 cm, la displasia de bajo grado y el patrón tubular confieren un escenario de bajo riesgo, estableciéndolos como los candidatos ideales perfectos para una resección endoscópica curativa curativa ambulatoria.", 
        source: "Tumores ampulares Guía de práctica clínica intergrupal francesa, 2024, Surgical Papillectomy, Página 485." 
    },
    {
        id: 8, 
        question: "En el análisis de inmunohistoquímica del adenocarcinoma ampular, ¿qué proteína de transcripción es típicamente positiva y ayuda a diferenciar y confirmar el subtipo biológico intestinal?", 
        options: ["CDX2", "MUC1", "CK7", "HER2"], 
        answer: 0, 
        justification: "Justificación: De acuerdo al documento Guía NCCN Cáncer Ampular, el fenotipo intestinal manifiesta un perfil biológico idéntico al cáncer de origen colónico, expresando de forma constante inmunorreactividad de membrana para CDX2 y MUC2, permitiendo clasificarlo histopatológicamente.<br><br>Perla ENARM: \"El tipo intestinal típicamente es positivo para CK20, CDX2 o MUC2 y negativo para MUC1\".<br><br>Análisis de Distractores: Los antígenos MUC1 (B) y CK7 (C) orientan inequívocamente al subtipo de diferenciación pancreatobiliar. La amplificación del gen HER2 (D) representa una mutación celular secundaria que no determina el origen epitelial primordial del cáncer.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Ampullary Adenocarcinoma, 2026, Pathologic Analysis, Página 139." 
    },
    {
        id: 9, 
        question: "¿Qué condición eritrocitaria biológica explica la incapacidad celular para elevar los niveles séricos del antígeno carbohidrato 19-9, ocasionando falsos negativos durante el escrutinio de cáncer ampular?", 
        options: ["Ausencia de antígeno Rh", "Fenotipo Duffy nulo", "Fenotipo Lewis negativo", "Ausencia de antígeno Kell"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Guía NCCN Cáncer Ampular, el 5 a 10% de la población general carece del alelo enzimático para sintetizar el antígeno de Lewis (a- b-), resultando biológicamente en la deficiencia absoluta de secreción de CA 19-9, incluso frente a una enorme carga tumoral o carcinomatosis.<br><br>Perla ENARM: \"Aproximadamente el 5% al 10% de la población carece del antígeno de Lewis, incapaces de sintetizar CA 19-9\".<br><br>Análisis de Distractores: Los marcadores de membrana eritrocitaria Rh, Duffy y Kell representan sistemas de aloanticuerpos genéticos irrelevantes que no fungen como precursores bioquímicos para la glucosilación de la cadena del CA 19-9.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Pancreatic Adenocarcinoma, 2026, Tumor Markers, Discussion, Página 24." 
    },
    {
        id: 10, 
        question: "En la linfadenectomía reglada de la pancreatoduodenectomía, ¿qué número de estación ganglionar corresponde topográficamente a los ganglios retropancreáticos (pancreaticoduodenales posteriores superiores)?", 
        options: ["Estación 8a", "Estación 12p", "Estación 13a", "Estación 17b"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Springer Cirugía de Páncreas, según la nomenclatura internacional estandarizada de la Sociedad Japonesa de Páncreas, los relevos linfáticos posteriores y superiores de la arcada pancreaticoduodenal se catalogan como el grupo 13a.<br><br>Perla ENARM: \"La estación 13a agrupa a los ganglios linfáticos pancreaticoduodenales posteriores superiores\".<br><br>Análisis de Distractores: La estación 8a se sitúa a nivel de la arteria hepática común; la estación 12p drena la vena porta posterior al ligamento hepatoduodenal; la estación 17b corresponde anatómicamente a los ganglios pancreaticoduodenales en el surco anterior inferior.", 
        source: "Japanese Classification and Staging for Pancreatic and Periampullary Cancers, Springer, 2025, Regional Lymph Nodes, Página 302." 
    },
    {
        id: 11, 
        question: "De acuerdo con los resultados finales del ensayo prospectivo ESPAC-3, ¿qué agente quimioterapéutico intravenoso se estableció como régimen estándar adyuvante para el adenocarcinoma ampular tras resección completa?", 
        options: ["Nab-paclitaxel", "Gemcitabina", "Irinotecán", "Oxaliplatino"], 
        answer: 1, 
        justification: "Justificación: De acuerdo al documento Guía NCCN Cáncer Ampular, el brazo de intervención del estudio pivotal ESPAC-3 comprobó un beneficio contundente en la supervivencia libre de enfermedad posoperatoria al emplear ciclos sistémicos de gemcitabina o bien fluorouracilo.<br><br>Perla ENARM: \"El ensayo ESPAC-3 demostró mejoras significativas en la supervivencia con el uso de gemcitabina posoperatoria o fluorouracilo\".<br><br>Análisis de Distractores: Fármacos como el nab-paclitaxel, el irinotecán y el oxaliplatino forman el núcleo del tratamiento paliativo intensivo multimodal en estadios irresecables, pero la indicación clase I probada en adyuvancia ampular pura se ciñe a la gemcitabina o 5-FU.", 
        source: "NCCN Clinical Practice Guidelines in Oncology: Ampullary Adenocarcinoma, 2026, Principles of Systemic Therapy, Página 153." 
    },
    {
        id: 12, 
        question: "Durante la fase de resección en una pancreatoduodenectomía cefálica, ¿en qué vaso aferente es mandatorio aplicar oclusión vascular transitoria (clampeo) para evaluar la pulsatilidad arterial intrahepática antes de su sección definitiva?", 
        options: ["Arteria hepática común", "Arteria mesentérica superior", "Arteria gastroduodenal", "Arteria gástrica izquierda"], 
        answer: 2, 
        justification: "Justificación: De acuerdo al documento Springer Cirugía de Páncreas, la prueba vascular sobre la arteria gastroduodenal descarta una estenosis oclusiva silente del tronco celíaco. La ausencia de pulso tras el clampeo previene la isquemia hepática aguda mortal intraoperatoria.<br><br>Perla ENARM: \"Antes de ligar la arteria gastroduodenal, es un imperativo quirúrgico comprobar las pulsaciones en la Arteria Hepática Propia\".<br><br>Análisis de Distractores: Aplicar pinzamiento sobre la arteria mesentérica superior sin puenteo causaría isquemia intestinal catastrófica; interrumpir la hepática común sin colaterales suprimiría el flujo de manera irreversible. La gástrica izquierda aporta a la curvatura menor sin relación fisiológica a este test hepático.", 
        source: "Pancreaticoduodenectomy (Whipple Procedure), Springer, 2025, Surgical Technique, Página 77." 
    },
    {
        id: 13, 
        question: "Según la estratificación oncológica de la octava edición del sistema TNM (AJCC), ¿cuál hallazgo microscópico de progresión vertical patológica clasifica a un tumor ampular como estadio pT1b?",

        options: ["Suministro hipercalórico exclusivo por yeyunostomía percutánea", "Líquidos claros y avance a dieta normal sin restricciones según tolerancia", "Sonda nasogástrica abierta y nutrición parenteral total suplementada", "Infusión hídrica estéril seguida de microdietas prebióticas"],

        question: "Durante el análisis de fase arterial tomográfica para estatificar un adenocarcinoma periampular incipiente, ¿cuál de los siguientes hallazgos se clasifica de forma consensuada en la guía NCCN como indicio categórico de irresecabilidad local?",
        options: ["Extensión focal a rama primaria yeyunal de la arteria mesentérica", "Compresión venosa de VMS y PV reparable con injertos autólogos", "Dilatación extrínseca tangencial de arteria hepática común de 90°", "Extensión tumoral al tronco celíaco con contacto ≥ 180° o afección aórtica"],

        question: "Durante una pancreatoduodenectomía cefálica por un tumor masivo del proceso uncinado, el cirujano requiere una movilización total del intestino medio para exponer y controlar la confluencia venosa y la arteria mesentérica superior. ¿Qué maniobra técnica logra este objetivo al liberar las fijaciones desde el ciego hasta el ligamento de Treitz?",

        justification: "Justificación: De acuerdo a la Guía Libro Cirugía, en tumores que involucran extensamente el proceso uncinado y exigen resección vascular, se requiere la movilización de la totalidad del intestino delgado y el mesenterio del colon derecho hasta el ángulo de Treitz. Esto expone sin tensión todo el eje portomesentérico anterior.<br><br>Perla ENARM: \"Para aproximar mejor los dos extremos venosos sin tensión, la movilización completa de la raíz del mesenterio mediante la maniobra de Cattell-Braasch es un paso fundamental\".<br><br>Análisis de Distractores: La maniobra de Kocher (A) solo moviliza el marco duodenal y la cabeza del páncreas hacia la línea media, sin liberar el mesenterio distal. La maniobra de Mattox (B) corresponde a la movilización visceral izquierda. La maniobra de Pringle (D) controla el flujo de entrada en el ligamento hepatoduodenal y no provee exposición mesentérica.",

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {

                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ampulaeProgress');
                localStorage.removeItem('ampulaeLastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');

                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }

                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {

                overlay.classList.add('hidden');

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);

            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>

                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">

                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ampulaeProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ampulaeLastQId', currentQuestionId);
                else localStorage.removeItem('ampulaeLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ampulaeProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
